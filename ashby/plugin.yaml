source: github.com/valon-technologies/gestalt-plugins/ashby
version: 0.0.1-alpha.2
display_name: Ashby
description: Candidates, applications, jobs, offers, interviews, departments, locations, users, and reports.
icon_file: assets/icon.svg
provider:
  allowed_operations:
    candidate.list: {}
    candidate.info: {}
    candidate.search: {}
    candidate.create: {}
    candidate.update: {}
    candidate.createNote: {}
    application.info: {}
    application.create: {}
    application.changeStage: {}
    job.list: {}
    job.info: {}
    offer.info: {}
    report.synchronous: {}
    report.generate: {}
    interviewSchedule.list: {}
    interview.info: {}
    interviewStage.info: {}
    department.info: {}
    department.list: {}
    location.list: {}
    user.list: {}
  response_mapping:
    data_path: results
    pagination:
      has_more_path: moreDataAvailable
      cursor_path: nextCursor
  surfaces:
    openapi:
      document: openapi.yaml
