source: github.com/valon-technologies/gestalt-providers/app/google_admin_datatransfer
version: 0.0.1-alpha.1
displayName: Google Admin Data Transfer
description: Transfer data between Google Workspace users using the Admin SDK Data Transfer API.
iconFile: assets/icon.svg
kind: app
spec:
  configSchemaPath: schemas/config.schema.yaml
  surfaces:
    openapi:
      document: https://api.apis.guru/v2/specs/googleapis.com/admin/datatransfer_v1/openapi.json
  allowedOperations:
    datatransfer.applicationTransfers.list: {}
    datatransfer.applications.list: {}
    datatransfer.transfers.get: {}
    datatransfer.transfers.insert: {}
    datatransfer.transfers.list: {}
  connections:
    default:
      auth:
        type: oauth2
        authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
        tokenUrl: https://oauth2.googleapis.com/token
        scopes:
          - https://www.googleapis.com/auth/admin.datatransfer
        authorizationParams:
          access_type: offline
          prompt: consent
