---
source: github.com/valon-technologies/gestalt-providers/app/linear
version: 0.0.1-alpha.1
displayName: Linear
description: Manage issues, projects, and teams.
iconFile: assets/icon.svg
kind: app
spec:
  surfaces:
    graphql:
      connection: OAuth
      url: https://api.linear.app/graphql
    mcp:
      connection: OAuth
      url: https://mcp.linear.app/mcp
  connections:
    OAuth:
      mode: user
      auth:
        type: oauth2
        authorizationUrl: https://linear.app/oauth/authorize
        tokenUrl: https://api.linear.app/oauth/token
        acceptHeader: application/json
        scopes:
        - read
        - write
  allowedOperations:
    issue:
      graphql:
        operationName: Issue
        document: |
          query Issue(
            $id: String!
          ) {
            issue(id: $id) {
              id
              identifier
              title
              url
              createdAt
              updatedAt
              description
              priority
              priorityLabel
              estimate
              state { id name type color }
              team { id name key displayName }
              assignee { id name displayName email url }
              creator { id name displayName email url }
              project { id name url slugId icon color }
            }
          }
    searchIssues:
      graphql:
        operationName: SearchIssues
        document: |
          query SearchIssues(
            $filter: IssueFilter
            $before: String
            $after: String
            $first: Int
            $last: Int
            $includeArchived: Boolean
            $orderBy: PaginationOrderBy
            $term: String!
            $includeComments: Boolean
            $teamId: String
          ) {
            searchIssues(filter: $filter, before: $before, after: $after, first: $first, last: $last, includeArchived: $includeArchived, orderBy: $orderBy, term: $term, includeComments: $includeComments, teamId: $teamId) {
              nodes { id identifier title url createdAt updatedAt description priority priorityLabel estimate state { id name type color } team { id name key displayName } assignee { id name displayName email url } creator { id name displayName email url } project { id name url slugId icon color } }
              pageInfo { hasNextPage endCursor }
              totalCount
            }
          }
    issueLabels:
      graphql:
        operationName: IssueLabels
        document: |
          query IssueLabels(
            $filter: IssueLabelFilter
            $before: String
            $after: String
            $first: Int
            $last: Int
            $includeArchived: Boolean
            $orderBy: PaginationOrderBy
          ) {
            issueLabels(filter: $filter, before: $before, after: $after, first: $first, last: $last, includeArchived: $includeArchived, orderBy: $orderBy) {
              nodes { id name description color isGroup team { id name key displayName } }
              pageInfo { hasNextPage endCursor }
            }
          }
    issues:
      graphql:
        operationName: Issues
        document: |
          query Issues(
