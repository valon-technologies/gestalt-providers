            $orderBy: PaginationOrderBy
            $sort: [IssueSortInput!]
          ) {
            issues(filter: $filter, before: $before, after: $after, first: $first, last: $last, includeArchived: $includeArchived, orderBy: $orderBy, sort: $sort) {
