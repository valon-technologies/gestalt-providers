source: github.com/valon-technologies/gestalt-providers/app/slack_v2
version: 0.0.1-alpha.6
displayName: Slack v2
description: Minimal Slack webhook app.
kind: app
install:
  command: [uv, sync, --frozen]
build:
  command: [uv, run, python, -m, gestalt._build]
entrypoint:
  artifactPath: .gestalt/build/slack_v2
spec:
  defaultConnection: default
  mcp: true
  connections:
    default:
      mode: none
  securitySchemes:
    unchecked:
      type: none
  http:
    events:
      path: /events
      method: POST
      credentialMode: none
      security: unchecked
      target: handle_slack_event
      requestBody:
        required: false
        content:
          application/json: {}
          application/x-www-form-urlencoded: {}
    smoke_run:
      path: /debug/smoke-run
      method: POST
      credentialMode: none
      security: unchecked
      target: debug_record_smoke_run
      requestBody:
        required: false
        content:
          application/json: {}
    smoke_run_payload_get:
      path: /debug/smoke-run/payload
      method: POST
      credentialMode: none
      security: unchecked
      target: debug_get_smoke_run_payload
      requestBody:
        required: false
        content:
          application/json: {}
    smoke_run_payload_ids:
      path: /debug/smoke-run/payloads
      method: POST
      credentialMode: none
      security: unchecked
      target: debug_list_smoke_run_payload_ids
      requestBody:
        required: false
        content:
          application/json: {}
