source: github.com/valon-technologies/gestalt-providers/app/modern_treasury
version: 0.0.1-alpha.1
displayName: Modern Treasury
description: Create payment orders, manage external accounts, and inspect treasury activity in Modern Treasury.
iconFile: assets/icon.svg
kind: app
spec:
  surfaces:
    openapi:
      connection: default
      document: openapi.yaml
  allowedOperations:
    listCounterparties:
      paginate: true
    getCounterparty:
    createCounterparty:
    updateCounterparty:
    listExternalAccounts:
      paginate: true
    getExternalAccount:
    createExternalAccount:
    updateExternalAccount:
    listInternalAccounts:
      paginate: true
    getInternalAccount:
    listPaymentOrders:
      paginate: true
    getPaymentOrder:
    createPaymentOrder:
    updatePaymentOrder:
      description: Update a payment order. To cancel a payment order, set `status` to `cancelled`.
    listTransactions:
      paginate: true
    getTransaction:
    listReturns:
      paginate: true
    getReturn:
    listIncomingPaymentDetails:
      paginate: true
    getIncomingPaymentDetail:
    updateIncomingPaymentDetail:
    listBalanceReports:
      paginate: true
    getBalanceReport:
    validateRoutingNumber:
  connections:
    default:
      mode: subject
      auth:
        type: manual
        credentials:
        - name: organization_id
          label: Organization ID
          description: Find this in Modern Treasury under Developers > API Keys.
        - name: api_key
          label: API Key
          description: Create a key in [Settings > API keys](https://app.moderntreasury.com/settings/api_keys).
        authMapping:
          basic:
            username:
              valueFrom:
                credentialFieldRef:
                  name: organization_id
            password:
              valueFrom:
                credentialFieldRef:
                  name: api_key
  pagination:
    style: cursor
    cursorParam: after_cursor
    cursor:
      source: header
      path: X-After-Cursor
    limitParam: per_page
    resultsPath: ''
    defaultLimit: 100
