source: github.com/valon-technologies/gestalt-providers/app/dbt_cloud
version: 0.0.1-alpha.1
displayName: dbt Cloud
description: Manage accounts, projects, jobs, and runs.
iconFile: assets/icon.svg
kind: app
spec:
  surfaces:
    openapi:
      connection: default
      document: https://raw.githubusercontent.com/dbt-labs/dbt-cloud-openapi-spec/master/openapi-v2.yaml
  allowedOperations:
    "List Accounts":
      alias: listAccounts
    "Retrieve Account":
      alias: retrieveAccount
    "List Projects":
      alias: listProjects
    "Retrieve Project":
      alias: retrieveProject
    "List Jobs":
      alias: listJobs
    "Retrieve Job":
      alias: retrieveJob
    "Trigger Job Run":
      alias: triggerJobRun
    "List Runs":
      alias: listRuns
    "Retrieve Run":
      alias: retrieveRun
    "Cancel Run":
      alias: cancelRun
    "Retry Run":
      alias: retryRun
  connections:
    default:
      auth:
        type: manual
        credentials:
        - name: token
          label: API Token
          description: See [Profile settings](https://cloud.getdbt.com/settings/profile#api-tokens) to retrieve your token
