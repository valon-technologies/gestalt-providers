source: github.com/valon-technologies/gestalt-providers/app/nice_incontact
version: 0.0.1-alpha.1
displayName: NICE CXone
description: Access NICE CXone / NICE inContact Admin, Agent, Reporting, Digital Engagement, WFM, and related public REST APIs.
iconFile: assets/icon.svg
kind: app
spec:
  configSchemaPath: schemas/config.schema.yaml
  surfaces:
    openapi:
      connection: oauth
      document: openapi.yaml
  connections:
    oauth:
      displayName: NICE CXone OAuth
      mode: subject
      auth:
        type: oauth2
        authorizationUrl: https://cxone.niceincontact.com/auth/authorize
        tokenUrl: https://cxone.niceincontact.com/auth/token
        clientAuth: header
        scopes:
        - openid
      params:
        api_host:
          required: true
          description: Tenant API host from NICE API discovery, for example api-na1.niceincontact.com. Do not include the scheme.
