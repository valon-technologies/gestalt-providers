- bearerAuth: []
paths:
  /.well-known/cxone-configuration:
    get:
      operationId: global_authentication_api.getcxoneconfig
      parameters:
      - in: query
        name: tenantId
        required: true
        schema:
          format: uuid
          type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                properties:
                  acdDomain:
                    type: string
                  api_endpoint:
                    format: url
                    type: string
                  area:
                    type: string
                  auth_endpoint:
                    format: url
                    type: string
                  cluster:
                    type: string
                  domain:
                    type: string
                  globaldomain:
                    type: string
                  private:
                    type: boolean
                  tenantId:
                    type: string
                  uhDomain:
                    type: string
                  ui_endpoint:
                    format: url
                    type: string
                required:
                - private
                - ui_endpoint
                - auth_endpoint
                - api_endpoint
                - region
                - domain
                - uhDomain
                type: object
        '404': {}
      security: []
      servers:
      - url: https://cxone.niceincontact.com
      summary: Retrieve the standard discovery document for a tenant.
      tags:
      - Discovery
  /.well-known/openid-configuration:
    get:
      operationId: global_authentication_api.getoidcconfig
      responses:
        '200':
          content:
            application/json:
