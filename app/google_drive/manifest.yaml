source: github.com/valon-technologies/gestalt-providers/app/google_drive
version: 0.0.1-alpha.2
displayName: Google Drive
description: Read, create, update, and share files in Google Drive.
iconFile: assets/icon.svg
kind: app
spec:
  configSchemaPath: schemas/config.schema.yaml
  surfaces:
    openapi:
      connection: default
      document: https://api.apis.guru/v2/specs/googleapis.com/drive/v3/openapi.json
  allowedOperations:
    drive.files.list:
      alias: files.list
    drive.files.get:
      alias: files.get
    drive.files.create:
      alias: files.create
    drive.files.update:
      alias: files.update
    drive.files.delete:
      alias: files.delete
    drive.files.copy:
      alias: files.copy
    drive.files.export:
      alias: files.export
    drive.permissions.list:
      alias: permissions.list
    drive.permissions.create:
      alias: permissions.create
    drive.permissions.update:
      alias: permissions.update
    drive.permissions.delete:
      alias: permissions.delete
    drive.about.get:
      alias: about.get
    drive.comments.list:
      alias: comments.list
    drive.comments.get:
      alias: comments.get
    drive.comments.create:
      alias: comments.create
    drive.comments.update:
      alias: comments.update
    drive.comments.delete:
      alias: comments.delete
    drive.replies.list:
      alias: replies.list
    drive.replies.get:
      alias: replies.get
    drive.replies.create:
      alias: replies.create
    drive.replies.update:
      alias: replies.update
    drive.replies.delete:
      alias: replies.delete
  connections:
    default:
      auth:
        type: oauth2
        authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
        tokenUrl: https://oauth2.googleapis.com/token
        scopes:
        - https://www.googleapis.com/auth/drive
        authorizationParams:
          access_type: offline
          prompt: consent
