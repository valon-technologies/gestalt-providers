source: github.com/valon-technologies/gestalt-providers/app/slack
version: 0.0.1-alpha.1
displayName: Slack
description: Read public and private conversations, DMs, and group DMs; send messages; and manage channels.
iconFile: assets/icon.svg
kind: app
install:
  command: [uv, sync, --frozen]
build:
  command: [uv, run, gestalt, build]
run:
  command: [uv, run, gestalt, run, ., provider:app]
spec:
  defaultConnection: default
  mcp: true
  securitySchemes:
    slack:
      type: hmac
      secret:
        env: SLACK_SIGNING_SECRET
      signatureHeader: X-Slack-Signature
      signaturePrefix: v0=
      payloadTemplate: "v0:{header:X-Slack-Request-Timestamp}:{raw_body}"
      timestampHeader: X-Slack-Request-Timestamp
      maxAgeSeconds: 300
  http:
    event:
      path: /event
      method: POST
      credentialMode: none
      security: slack
      target: events.handle
      requestBody:
        required: true
        content:
          application/json: {}
    interactions:
      path: /interactions
      method: POST
      credentialMode: none
      security: slack
      target: interactions.handle
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded: {}
          application/json: {}
  surfaces:
    rest:
      connection: default
      baseUrl: https://slack.com
      operations:
      - name: conversations.list
        description: List conversations/channels. Do not use this to resolve Slack permalinks; prefer conversations.getMessage or conversations.getThreadContext with the URL.
        method: GET
        path: /api/conversations.list
        connectionSelector:
          parameter: actor
          default: user
          values:
            bot: bot
            user: default
        parameters:
        - name: actor
          type: string
          description: "Slack credential actor to use: bot or user"
          in: query
          internal: true
        - name: limit
          type: int
          in: query
        - name: cursor
          type: string
          in: query
        - name: types
          type: string
          in: query
      - name: chat.update
        description: Update a message in a channel
        method: POST
        path: /api/chat.update
        parameters:
        - name: channel
          type: string
          in: body
          required: true
        - name: ts
          type: string
          in: body
          required: true
        - name: text
          type: string
          in: body
          required: true
      - name: chat.delete
        description: Delete a message from a channel
        method: POST
        path: /api/chat.delete
        parameters:
        - name: channel
          type: string
          in: body
          required: true
        - name: ts
          type: string
          in: body
          required: true
      - name: assistant.threads.setStatus
        description: Set the native Slack assistant thread status
        method: POST
        path: /api/assistant.threads.setStatus
        connection: bot
        parameters:
        - name: channel_id
          type: string
          in: body
          required: true
        - name: thread_ts
          type: string
          in: body
          required: true
        - name: status
          type: string
          in: body
          required: true
        - name: loading_messages
          type: array
          in: body
        - name: icon_emoji
          type: string
          in: body
        - name: icon_url
          type: string
          in: body
        - name: username
          type: string
          in: body
      - name: assistant.threads.setTitle
        description: Set the native Slack assistant thread title
        method: POST
        path: /api/assistant.threads.setTitle
        connection: bot
        parameters:
        - name: channel_id
          type: string
          in: body
          required: true
        - name: thread_ts
          type: string
          in: body
          required: true
        - name: title
          type: string
          in: body
          required: true
      - name: assistant.threads.setSuggestedPrompts
        description: Set native Slack assistant suggested prompts
        method: POST
        path: /api/assistant.threads.setSuggestedPrompts
        connection: bot
        parameters:
        - name: channel_id
          type: string
          in: body
          required: true
        - name: thread_ts
          type: string
          in: body
          required: true
        - name: prompts
          type: array
          in: body
          required: true
        - name: title
          type: string
          in: body
      - name: chat.startStream
        description: Start a native Slack streaming message
        method: POST
        path: /api/chat.startStream
        connection: bot
        parameters:
        - name: channel
          type: string
          in: body
          required: true
        - name: thread_ts
          type: string
          in: body
          required: true
        - name: markdown_text
          type: string
          in: body
        - name: chunks
          type: array
          in: body
        - name: recipient_user_id
          type: string
          in: body
        - name: recipient_team_id
          type: string
          in: body
        - name: task_display_mode
          type: string
          in: body
        - name: icon_emoji
          type: string
          in: body
        - name: icon_url
          type: string
          in: body
        - name: username
          type: string
          in: body
      - name: chat.appendStream
        description: Append content to a native Slack streaming message
        method: POST
        path: /api/chat.appendStream
        connection: bot
        parameters:
        - name: channel
          type: string
          in: body
          required: true
        - name: ts
          type: string
          in: body
          required: true
        - name: markdown_text
          type: string
          in: body
        - name: chunks
          type: array
          in: body
      - name: chat.stopStream
        description: Stop and finalize a native Slack streaming message
        method: POST
        path: /api/chat.stopStream
        connection: bot
        parameters:
        - name: channel
          type: string
          in: body
          required: true
        - name: ts
          type: string
          in: body
          required: true
        - name: markdown_text
          type: string
          in: body
        - name: chunks
          type: array
          in: body
        - name: blocks
          type: array
          in: body
        - name: metadata
          type: object
          in: body
      - name: users.list
        description: List workspace users
        method: GET
        path: /api/users.list
        parameters:
        - name: limit
          type: int
          in: query
        - name: cursor
          type: string
          in: query
      - name: conversations.open
        description: Open or resume a direct message or group direct message
        method: POST
        path: /api/conversations.open
        connectionSelector:
          parameter: actor
          default: user
          values:
            bot: bot
            user: default
        parameters:
        - name: actor
          type: string
          description: "Slack credential actor to use: bot or user"
          in: body
          internal: true
        - name: users
          type: string
          in: body
        - name: channel
          type: string
          in: body
        - name: return_im
          type: bool
          in: body
        - name: prevent_creation
          type: bool
          in: body
      - name: conversations.history
        description: Read message history for a channel. For Slack permalinks, prefer conversations.getMessage or conversations.getThreadContext with the URL instead of listing channels or scanning history.
        method: GET
        path: /api/conversations.history
        connectionSelector:
          parameter: actor
          default: user
          values:
            bot: bot
            user: default
        parameters:
        - name: actor
          type: string
          description: "Slack credential actor to use: bot or user"
          in: query
          internal: true
        - name: channel
          type: string
          in: query
          required: true
        - name: limit
          type: int
          in: query
        - name: cursor
          type: string
          in: query
        - name: oldest
          type: string
          in: query
        - name: latest
          type: string
          in: query
        - name: inclusive
          type: bool
          in: query
      - name: search.messages
        description: Search messages across the workspace
        method: GET
        path: /api/search.messages
        connection: default
        parameters:
        - name: query
          type: string
          in: query
          required: true
        - name: count
          type: int
          in: query
        - name: page
          type: int
          in: query
      - name: users.info
        description: Get profile information for a Slack user
        method: GET
        path: /api/users.info
        parameters:
        - name: user
          type: string
          in: query
          required: true
      - name: users.lookupByEmail
        description: Find a Slack user by their email address
        method: GET
        path: /api/users.lookupByEmail
        parameters:
        - name: email
          type: string
          in: query
          required: true
      - name: files.info
        description: Get Slack file metadata
        method: GET
        path: /api/files.info
        parameters:
        - name: file
          type: string
          in: query
          required: true
      - name: conversations.replies
        description: Read replies for a thread
        method: GET
        path: /api/conversations.replies
        connectionSelector:
          parameter: actor
          default: user
          values:
            bot: bot
            user: default
        parameters:
        - name: actor
          type: string
          description: "Slack credential actor to use: bot or user"
          in: query
          internal: true
        - name: channel
          type: string
          in: query
          required: true
        - name: ts
          type: string
          in: query
          required: true
        - name: limit
          type: int
          in: query
        - name: cursor
          type: string
          in: query
        - name: oldest
          type: string
          in: query
        - name: latest
          type: string
          in: query
        - name: inclusive
          type: bool
          in: query
      - name: chat.scheduleMessage
        description: Schedule a message to be sent later
        method: POST
        path: /api/chat.scheduleMessage
        parameters:
        - name: channel
          type: string
          in: body
          required: true
        - name: text
          type: string
          in: body
          required: true
        - name: post_at
          type: int
          in: body
          required: true
        - name: thread_ts
          type: string
          in: body
      - name: reactions.add
        description: Add an emoji reaction to a message
        method: POST
        path: /api/reactions.add
        parameters:
        - name: channel
          type: string
          in: body
          required: true
        - name: timestamp
          type: string
          in: body
          required: true
        - name: name
          type: string
          in: body
          required: true
      - name: reactions.remove
        description: Remove an emoji reaction from a message
        method: POST
        path: /api/reactions.remove
        parameters:
        - name: channel
          type: string
          in: body
          required: true
        - name: timestamp
          type: string
          in: body
          required: true
        - name: name
          type: string
          in: body
          required: true
      - name: conversations.setTopic
        description: Set a channel topic
        method: POST
        path: /api/conversations.setTopic
        parameters:
        - name: channel
          type: string
          in: body
          required: true
        - name: topic
          type: string
          in: body
          required: true
      - name: conversations.create
        description: Create a new Slack channel
        method: POST
        path: /api/conversations.create
        parameters:
        - name: name
          type: string
          in: body
          required: true
        - name: is_private
          type: bool
          in: body
      - name: conversations.invite
        description: Invite users to a channel
        method: POST
        path: /api/conversations.invite
        parameters:
        - name: channel
          type: string
          in: body
          required: true
        - name: users
          type: string
          in: body
          required: true
      - name: chat.postEphemeral
        description: Send an ephemeral message visible only to a specific user
        method: POST
        path: /api/chat.postEphemeral
        parameters:
        - name: channel
          type: string
          in: body
          required: true
        - name: text
          type: string
          in: body
          required: true
        - name: user
          type: string
          in: body
          required: true
        - name: thread_ts
          type: string
          in: body
      - name: canvases.create
        description: Create a Slack canvas
        method: POST
        path: /api/canvases.create
        parameters:
        - name: title
          type: string
          in: body
          required: true
        - name: document_content
          type: object
          in: body
  connections:
    default:
      auth:
        type: oauth2
        authorizationUrl: https://slack.com/oauth/v2/authorize
        tokenUrl: https://slack.com/api/oauth.v2.access
        accessTokenPath: authed_user.access_token
        scopeParam: user_scope
        scopeSeparator: ','
        scopes:
        - channels:read
        - channels:history
        - groups:read
        - groups:history
        - im:read
        - im:history
        - im:write
        - mpim:read
        - mpim:history
        - mpim:write
        - search:read
        - users:read
        - users:read.email
        - files:read
        - files:write
        - chat:write
        - reactions:write
        - channels:write
        - groups:write
        - canvases:write
    bot:
      displayName: Bot
      auth:
        type: bearer
