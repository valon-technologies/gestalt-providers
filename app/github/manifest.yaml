source: github.com/valon-technologies/gestalt-providers/app/github
version: 0.0.1-alpha.2
displayName: GitHub
description: Repository, issue, pull request, workflow, and code search operations.
iconFile: assets/icon.svg
kind: app
spec:
  configSchemaPath: schemas/config.schema.yaml
  securitySchemes:
    github_app:
      type: hmac
      secret:
        env: GITHUB_WEBHOOK_SECRET
      signatureHeader: X-Hub-Signature-256
      signaturePrefix: sha256=
      payloadTemplate: "{raw_body}"
  http:
    event:
      path: /event
      method: POST
      credentialMode: none
      security: github_app
      target: events.handle
      requestBody:
        required: true
        content:
          application/json: {}
