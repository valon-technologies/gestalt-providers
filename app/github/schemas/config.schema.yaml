type: object
properties:
  clientId:
    type: string
    description: GitHub OAuth app client ID used for subject-owned user identity connections.
  clientSecret:
    type: string
    description: GitHub OAuth app client secret used for subject-owned user identity connections.
  appId:
    type: string
    description: GitHub App ID used for webhook and installation-token API calls.
  appPrivateKey:
    type: string
    description: PEM-encoded GitHub App private key. GITHUB_APP_PRIVATE_KEY is also supported.
  appPrivateKeyEnv:
    type: string
    description: Environment variable containing the PEM-encoded GitHub App private key.
  appPrivateKeyPath:
    type: string
    description: >-
      Filesystem path to the PEM-encoded GitHub App private key.
      GITHUB_APP_PRIVATE_KEY_PATH is also supported.
  apiBaseUrl:
    type: string
    description: GitHub REST API base URL. Defaults to https://api.github.com.
  graphqlBaseUrl:
    type: string
    description: >-
      GitHub GraphQL API URL for GitHub App bot operations. Defaults to
      https://api.github.com/graphql. For GitHub Enterprise Server, it is
      derived from apiBaseUrl when omitted.
  webBaseUrl:
    type: string
    description: GitHub web base URL used to build commit links. Defaults to https://github.com.
  webhookEvents:
    type: array
    description: >-
      GitHub webhook event types that should publish workflow events. Defaults
      to check_run, check_suite, issue_comment, issues, pull_request,
      pull_request_review, pull_request_review_comment, and workflow_run.
    items:
      type: string
  workflow:
    type: object
    description: Workflow provider used for GitHub App webhook event publishing.
    additionalProperties: false
    properties:
      provider:
        type: string
        minLength: 1
        description: Workflow provider name that receives GitHub App webhook events.
    required:
      - provider
  ignoreBotSender:
    type: boolean
    description: >-
      Ignore webhook payloads sent by the derived GitHub App bot login.
      Defaults to true.
required:
  - clientId
  - clientSecret
  - workflow
additionalProperties: false
