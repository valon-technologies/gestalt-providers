name: github
operations:
- id: events.handle
  method: POST
  description: Handle GitHub App webhook callbacks by delivering canonical workflow
    events
  visible: false
- id: maintenance.reconcileCache
  method: POST
  description: Reconcile a bounded set of expired GitHub cache entries
  visible: false
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: max_entries
    type: integer
    description: Maximum expired cache entries to replay, from 1 through 100
    default: 25
- id: identity.linkSelf
  method: POST
  description: Link the current Gestalt user subject to the GitHub user proven by
    the current GitHub credential
  tags: [identity]
- id: bot.getRepository
  method: GET
  description: Get repository metadata using a GitHub App installation token
  tags: [repo, repository]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
- id: bot.searchCode
  method: GET
  description: Search code in one repository using a GitHub App installation token
  tags: [repo, code, search]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: query
    type: string
    description: GitHub code search query
    required: true
  - name: path
    type: string
    description: Optional repository-relative path prefix to search within
    default: ''
  - name: per_page
    type: integer
    description: Results per page, from 1 through 100
    default: 10
  - name: page
    type: integer
    description: Page number, starting at 1
    default: 0
- id: bot.getContent
  method: GET
  description: Get UTF-8 file content using a GitHub App installation token
  tags: [repo, code, content]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: path
    type: string
    description: Repository-relative file path
    required: true
  - name: ref
    type: string
    description: Git ref, branch, or SHA. Defaults to the repository default branch.
    default: ''
  - name: max_bytes
    type: integer
    description: Maximum UTF-8 bytes to return
    default: 80000
- id: bot.listCommits
  method: GET
  description: List commits on a repository using a GitHub App installation token
  tags: [repo, code, history]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: sha
    type: string
    description: SHA or branch to start listing commits from.
    default: ''
  - name: path
    type: string
    description: Only commits containing this file path.
    default: ''
  - name: author
    type: string
    description: GitHub username or email to filter by author.
    default: ''
  - name: since
    type: string
    description: ISO 8601 timestamp; only commits after this date.
    default: ''
  - name: until
    type: string
    description: ISO 8601 timestamp; only commits before this date.
    default: ''
  - name: per_page
    type: integer
    description: Results per page, from 1 through 100
    default: 30
  - name: page
    type: integer
    description: Page number, starting at 1
    default: 0
- id: bot.compareRefs
  method: GET
  description: Compare two refs using a GitHub App installation token
  tags: [repo, code, history]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: base
    type: string
    description: Base ref, branch, or SHA
    required: true
  - name: head
    type: string
    description: Head ref, branch, or SHA
    required: true
- id: bot.commitFiles
  method: POST
  description: Create a Git commit on a branch using a GitHub App installation token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: message
    type: string
    description: Commit message
    required: true
  - name: files
    type: array
    description: Files to create, update, or delete. Each item accepts path, content,
      content_base64, delete, and executable.
    required: true
  - name: branch
    type: string
    description: Branch to create or update. Defaults to a generated branch.
    default: ''
  - name: base_branch
    type: string
    description: Base branch for a newly-created branch. Defaults to the repository
      default branch.
    default: ''
  - name: expected_head_sha
    type: string
    description: Require the target branch to still point at this commit SHA before
      writing.
    default: ''
  - name: coauthors
    type: array
    description: Co-authors to append as commit trailers. Each item accepts name and
      email.
  - name: include_bot_coauthor
    type: boolean
    description: Append the GitHub App bot as a co-author when its no-reply identity
      can be derived
    default: true
  - name: author_name
    type: string
    description: Optional Git commit author name. Delegated agent calls use the invoking user's linked GitHub identity instead when available.
    default: ''
  - name: author_email
    type: string
    description: Optional Git commit author email. Delegated agent calls use the invoking user's linked GitHub identity instead when available.
    default: ''
  - name: committer_name
    type: string
    description: Optional Git commit committer name
    default: ''
  - name: committer_email
    type: string
    description: Optional Git commit committer email
    default: ''
  - name: force
    type: boolean
    description: Force-update the branch ref
    default: false
  - name: allow_base_update
    type: boolean
    description: Allow updating the base branch directly
    default: false
- id: bot.openPullRequest
  method: POST
  description: Open a pull request using a GitHub App installation token
  tags: [pr, prs]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: title
    type: string
    description: Pull request title
    required: true
  - name: head
    type: string
    description: Head branch name
    required: true
  - name: base
    type: string
    description: Base branch name
    required: true
  - name: body
    type: string
    description: Pull request body
    default: ''
  - name: head_owner
    type: string
    description: Optional owner for cross-repository pull requests
    default: ''
  - name: draft
    type: boolean
    description: Create the pull request as a draft
    default: false
  - name: maintainer_can_modify
    type: boolean
    description: Allow maintainers to modify the pull request branch
    default: true
- id: bot.closePullRequest
  method: POST
  description: Close a pull request using a GitHub App installation token
  tags: [pr, prs]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: pull_number
    type: integer
    description: Pull request number
    required: true
- id: bot.createPullRequest
  method: POST
  description: Commit file changes to a branch and open a pull request using a GitHub
    App installation token
  tags: [pr, prs]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: title
    type: string
    description: Pull request title
    required: true
  - name: message
    type: string
    description: Commit message
    required: true
  - name: files
    type: array
    description: Files to create, update, or delete. Each item accepts path, content,
      content_base64, delete, and executable.
    required: true
  - name: body
    type: string
    description: Pull request body
    default: ''
  - name: branch
    type: string
    description: Head branch to create or update. Defaults to a generated branch.
    default: ''
  - name: base
    type: string
    description: Base branch. Defaults to the repository default branch.
    default: ''
  - name: coauthors
    type: array
    description: Co-authors to append as commit trailers. Each item accepts name and
      email.
  - name: include_bot_coauthor
    type: boolean
    description: Append the GitHub App bot as a co-author when its no-reply identity
      can be derived
    default: true
  - name: author_name
    type: string
    description: Optional Git commit author name. Delegated agent calls use the invoking user's linked GitHub identity instead when available.
    default: ''
  - name: author_email
    type: string
    description: Optional Git commit author email. Delegated agent calls use the invoking user's linked GitHub identity instead when available.
    default: ''
  - name: committer_name
    type: string
    description: Optional Git commit committer name
    default: ''
  - name: committer_email
    type: string
    description: Optional Git commit committer email
    default: ''
  - name: force
    type: boolean
    description: Force-update the head branch ref
    default: false
  - name: draft
    type: boolean
    description: Create the pull request as a draft
    default: false
  - name: maintainer_can_modify
    type: boolean
    description: Allow maintainers to modify the pull request branch
    default: true
- id: bot.getPullRequest
  method: GET
  description: Get pull request metadata using a GitHub App installation token
  tags: [pr, prs, review]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: pull_number
    type: integer
    description: Pull request number
    required: true
- id: bot.listPullRequestFiles
  method: GET
  description: List pull request changed files and bounded patches using a GitHub App
    installation token
  tags: [pr, prs, review, diff]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: pull_number
    type: integer
    description: Pull request number
    required: true
  - name: per_page
    type: integer
    description: Results per page, from 1 through 100
    default: 0
  - name: page
    type: integer
    description: Page number, starting at 1
    default: 0
- id: bot.listPullRequestCommits
  method: GET
  description: List commits on a pull request using a GitHub App installation token
  tags: [pr, prs, history]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: pull_number
    type: integer
    description: Pull request number
    required: true
  - name: per_page
    type: integer
    description: Results per page, from 1 through 100
    default: 0
  - name: page
    type: integer
    description: Page number, starting at 1
    default: 0
- id: bot.createPullRequestReview
  method: POST
  description: Create a pull request review with inline comments using a GitHub App
    installation token
  tags: [pr, prs, review]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: pull_number
    type: integer
    description: Pull request number
    required: true
  - name: body
    type: string
    description: Pull request review body
    required: true
  - name: comments
    type: array
    description: Inline review comments. Each item accepts path, body, line, side,
      start_line, and start_side.
    required: true
  - name: commit_id
    type: string
    description: Optional commit SHA to review. Defaults to GitHub's latest PR commit.
    default: ''
- id: bot.listPullRequestReviews
  method: GET
  description: List pull request reviews using a GitHub App installation token
  tags: [pr, prs, review]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: pull_number
    type: integer
    description: Pull request number
    required: true
  - name: per_page
    type: integer
    description: Results per page, from 1 through 100
    default: 0
  - name: page
    type: integer
    description: Page number, starting at 1
    default: 0
- id: bot.listPullRequestReviewThreads
  method: GET
  description: List pull request review threads and their first comments using a GitHub
    App installation token
  tags: [pr, prs, review]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: pull_number
    type: integer
    description: Pull request number
    required: true
  - name: first
    type: integer
    description: Number of review threads to fetch, from 1 through 100
    default: 100
  - name: after
    type: string
    description: Optional GitHub GraphQL reviewThreads page cursor
    default: ''
  - name: comments_first
    type: integer
    description: Number of comments to fetch per thread, from 1 through 50
    default: 20
- id: bot.resolvePullRequestReviewThread
  method: POST
  description: Resolve a pull request review thread after verifying it belongs to
    the requested pull request
  tags: [pr, prs, review]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: pull_number
    type: integer
    description: Pull request number
    required: true
  - name: thread_id
    type: string
    description: GitHub GraphQL pull request review thread node ID
    required: true
- id: bot.createPullRequestConversationComment
  method: POST
  description: Create a pull request conversation comment using a GitHub App installation
    token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: pull_number
    type: integer
    description: Pull request number
    required: true
  - name: body
    type: string
    description: Comment body
    required: true
- id: bot.createIssueComment
  method: POST
  description: Create an issue comment using a GitHub App installation token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: issue_number
    type: integer
    description: Issue number
    required: true
  - name: body
    type: string
    description: Comment body
    required: true
- id: bot.createIssue
  method: POST
  description: Create an issue using a GitHub App installation token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: title
    type: string
    description: Issue title
    required: true
  - name: body
    type: string
    description: Issue body
    required: false
  - name: labels
    type: array
    description: Label names to apply
    required: false
  - name: assignees
    type: array
    description: GitHub usernames to assign
    required: false
- id: bot.updateIssue
  method: POST
  description: Update an issue using a GitHub App installation token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: issue_number
    type: integer
    description: Issue number
    required: true
  - name: title
    type: string
    description: Issue title
    required: false
  - name: body
    type: string
    description: Issue body
    required: false
  - name: state
    type: string
    description: Issue state, open or closed
    required: false
  - name: labels
    type: array
    description: Label names to apply
    required: false
  - name: assignees
    type: array
    description: GitHub usernames to assign
    required: false
- id: bot.getIssue
  method: GET
  description: Get an issue using a GitHub App installation token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: issue_number
    type: integer
    description: Issue number
    required: true
- id: bot.listIssues
  method: GET
  description: List repository issues using a GitHub App installation token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: state
    type: string
    description: Issue state filter, open, closed, or all
    required: false
  - name: per_page
    type: integer
    description: Results per page (1-100)
    required: false
  - name: page
    type: integer
    description: Page number
    required: false
- id: bot.addReaction
  method: POST
  description: Add a reaction using a GitHub App installation token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: subject_type
    type: string
    description: Reaction target type, one of issue, pull_request, issue_comment,
      or pull_request_review_comment
    required: true
  - name: content
    type: string
    description: Reaction content, one of +1, -1, laugh, confused, heart, hooray,
      rocket, or eyes
    required: true
  - name: issue_number
    type: integer
    description: Issue number when subject_type is issue
    default: 0
  - name: pull_number
    type: integer
    description: Pull request number when subject_type is pull_request
    default: 0
  - name: comment_id
    type: integer
    description: Comment ID when subject_type is issue_comment or pull_request_review_comment
    default: 0
- id: bot.addLabels
  method: POST
  description: Add labels to an issue or pull request using a GitHub App installation
    token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: subject_type
    type: string
    description: Label target type, one of issue or pull_request
    required: true
  - name: labels
    type: array
    description: Label names to add
    required: true
  - name: issue_number
    type: integer
    description: Issue number when subject_type is issue
    default: 0
  - name: pull_number
    type: integer
    description: Pull request number when subject_type is pull_request
    default: 0
- id: bot.removeLabels
  method: POST
  description: Remove labels from an issue or pull request using a GitHub App installation
    token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: subject_type
    type: string
    description: Label target type, one of issue or pull_request
    required: true
  - name: labels
    type: array
    description: Label names to remove
    required: true
  - name: issue_number
    type: integer
    description: Issue number when subject_type is issue
    default: 0
  - name: pull_number
    type: integer
    description: Pull request number when subject_type is pull_request
    default: 0
- id: bot.requestReviewers
  method: POST
  description: Request individual or team reviewers on a pull request using a GitHub
    App installation token
  tags: [pr, prs, review]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: pull_number
    type: integer
    description: Pull request number
    required: true
  - name: reviewers
    type: array
    description: GitHub usernames to request as reviewers
    default: []
  - name: team_reviewers
    type: array
    description: GitHub team slugs to request as reviewers
    default: []
- id: bot.getCheckRun
  method: GET
  description: Get a GitHub check run using a GitHub App installation token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: check_run_id
    type: integer
    description: GitHub check run ID
    required: true
- id: bot.createCheckRun
  method: POST
  description: Create a GitHub check run using a GitHub App installation token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: name
    type: string
    description: Check run name
    required: true
  - name: head_sha
    type: string
    description: Git commit SHA to attach the check run to
    required: true
  - name: status
    type: string
    description: Check run status, usually in_progress or completed
    default: in_progress
  - name: conclusion
    type: string
    description: Completed check conclusion
    default: ''
  - name: details_url
    type: string
    description: Optional details URL
    default: ''
  - name: external_id
    type: string
    description: Optional caller-owned external ID
    default: ''
  - name: output
    type: object
    description: Optional check run output
    default: null
- id: bot.updateCheckRun
  method: POST
  description: Update a GitHub check run using a GitHub App installation token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: check_run_id
    type: integer
    description: GitHub check run ID
    required: true
  - name: name
    type: string
    description: Optional replacement check run name
    default: ''
  - name: status
    type: string
    description: Optional check run status
    default: ''
  - name: conclusion
    type: string
    description: Optional completed check conclusion
    default: ''
  - name: details_url
    type: string
    description: Optional details URL
    default: ''
  - name: output
    type: object
    description: Optional check run output
    default: null
  - name: completed_at
    type: string
    description: Optional ISO timestamp for completed check runs
    default: ''
- id: bot.listCheckSuiteCheckRuns
  method: GET
  description: List check runs in a GitHub check suite using a GitHub App installation
    token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: check_suite_id
    type: integer
    description: GitHub check suite ID
    required: true
  - name: check_name
    type: string
    description: Optional check run name filter
    default: ''
  - name: status
    type: string
    description: Optional check run status filter
    default: ''
  - name: filter
    type: string
    description: GitHub check runs filter, either latest or all
    default: ''
  - name: per_page
    type: integer
    description: Results per page, from 1 through 100
    default: 0
  - name: page
    type: integer
    description: Page number, starting at 1
    default: 0
- id: bot.listCommitCheckRuns
  method: GET
  description: List check runs for a commit ref using a GitHub App installation token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: ref
    type: string
    description: Commit SHA or branch name
    required: true
  - name: check_name
    type: string
    description: Optional check run name filter
    default: ''
  - name: status
    type: string
    description: Optional check run status filter
    default: ''
  - name: filter
    type: string
    description: GitHub check runs filter, either latest or all
    default: ''
  - name: per_page
    type: integer
    description: Results per page, from 1 through 100
    default: 0
  - name: page
    type: integer
    description: Page number, starting at 1
    default: 0
- id: bot.listCheckRunAnnotations
  method: GET
  description: List annotations for a GitHub check run using a GitHub App installation
    token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: check_run_id
    type: integer
    description: GitHub check run ID
    required: true
  - name: per_page
    type: integer
    description: Results per page, from 1 through 100
    default: 0
  - name: page
    type: integer
    description: Page number, starting at 1
    default: 0
- id: bot.getWorkflowRun
  method: GET
  description: Get a GitHub Actions workflow run using a GitHub App installation token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: run_id
    type: integer
    description: GitHub Actions workflow run ID
    required: true
- id: bot.listWorkflowRunJobs
  method: GET
  description: List jobs for a GitHub Actions workflow run using a GitHub App installation
    token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
