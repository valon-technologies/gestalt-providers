source: github.com/valon-technologies/gestalt-providers/app/gong
version: 0.0.1-alpha.1
displayName: Gong
description: Access the Gong public API v2 for calls, users, stats, settings, CRM, library, coaching, and data privacy workflows.
kind: app
spec:
  defaultConnection: default
  mcp: true
  surfaces:
    openapi:
      connection: default
      document: openapi.yaml
  allowedOperations:
    listCalls: {}
    addCall: {}
    addCallRecording: {}
    getCall:
      alias: get_call
    listCallsExtensive:
      alias: list_calls
      description: Search Gong calls with filters and optional cursor pagination.
    getPermissionProfile: {}
    updatePermissionProfile: {}
    createPermissionProfile: {}
    updateMeeting: {}
    deleteMeeting: {}
    contentViewed: {}
    contentShared: {}
    customAction: {}
    listGenericCrmIntegration: {}
    registerGenericCrmIntegration: {}
    deleteGenericCrmIntegration: {}
    addUsersAccessToCalls: {}
    getUsersAccessToCalls: {}
    deleteUsersAccessToCalls: {}
    listMultipleUsers: {}
    listTasks: {}
    listInteractionStats: {}
    listAnsweredScorecards: {}
    listMultipleUsersDayByDayActivity: {}
    listMultipleUsersAggregateActivity: {}
    listMultipleUsersAggregateByPeriod: {}
    addMeeting: {}
    integrationStatus: {}
    integrationSettings: {}
    getProspectsAssignedFlows: {}
    unassignFlows: {}
    unassignProspectFlows: {}
    submitFlowProspectsBulkAssignment: {}
    assignProspects: {}
    assignProspectsCoolOffOverrides: {}
    addDigitalInteraction: {}
    purgePhoneNumber: {}
    purgeEmailAddress: {}
    listCrmSchemaFields: {}
    uploadCrmSchemaField: {}
    getCrmObjects: {}
    uploadCrmData: {}
    getCallTranscripts:
      alias: get_call_transcripts
      description: Retrieve transcripts for calls matching the supplied filters.
    updateReminder: {}
    listWorkspaces: {}
    listUsers:
      alias: list_users
    getUser: {}
    getUserHistory: {}
    listTrackers: {}
    listScorecards: {}
    listPermissionProfileUsers: {}
    listLogs: {}
    getLibraryStructure: {}
    getCallsInSpecificFolder: {}
    listFlows: {}
    getFlowProspectsBulkAssignment: {}
    listFlowsFolders: {}
    generateBrief: {}
    askEntity: {}
    findAllReferencesToPhoneNumber: {}
    findAllReferencesToEmailAddress:
      alias: get_data_for_email_address
      description: Retrieve Gong data references associated with an email address.
    getRequestStatus: {}
    listUsers_1: {}
    listCallOutcomes: {}
    listPermissionProfile: {}
  connections:
    default:
      displayName: API key
      mode: subject
      auth:
        type: manual
        credentials:
        - name: access_key_id
          label: Access Key ID
          description: Gong API access key ID. In Gong, this is the Basic auth username.
        - name: secret_key
          label: Access Key Secret
          description: Gong API access key secret. In Gong, this is the Basic auth password.
        authMapping:
          basic:
            username:
              valueFrom:
                credentialFieldRef:
                  name: access_key_id
            password:
              valueFrom:
                credentialFieldRef:
                  name: secret_key
