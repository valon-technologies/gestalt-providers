kind: app
source: github.com/valon-technologies/gestalt-providers/app/excalidraw
version: 0.0.1-alpha.1
displayName: Excalidraw
description: Read, search, and edit Excalidraw+ scenes via the official hosted MCP server.
spec:
  surfaces:
    mcp:
      connection: default
      url: https://api.excalidraw.com/api/v1/mcp
  connections:
    default:
      displayName: MCP
      mode: subject
      auth:
        type: bearer
        credentials:
        - name: token
          label: Excalidraw+ API Key
          description: Create in Excalidraw Plus workspace settings. Personal keys act as you; workspace keys suit shared integrations.
