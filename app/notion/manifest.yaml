source: github.com/valon-technologies/gestalt-providers/app/notion
version: 0.0.1-alpha.1
displayName: Notion
description: Current Notion REST operations plus the official Notion MCP tool surface.
iconFile: assets/icon.svg
kind: app
spec:
  headers:
    Notion-Version: '2026-03-11'
  surfaces:
    openapi:
      document: openapi.yaml
    mcp:
      connection: MCP
      url: https://mcp.notion.com/mcp
  connections:
    OAuth:
      mode: subject
      auth:
        type: oauth2
        authorizationUrl: https://api.notion.com/v1/oauth/authorize
        tokenUrl: https://api.notion.com/v1/oauth/token
        clientAuth: header
        tokenExchange: json
        acceptHeader: application/json
        authorizationParams:
          owner: user
    ApiKey:
      displayName: API key
      mode: subject
      auth:
        type: manual
        credentials:
        - name: token
          label: Internal integration secret
          description: Create an internal integration at [notion.so/profile/integrations](https://www.notion.so/profile/integrations) and copy its secret, then share the relevant pages or databases with the integration
    PAT:
      displayName: Personal access token
      mode: subject
      auth:
        type: bearer
        credentials:
        - name: token
          label: Personal access token
          description: Create a PAT in the [Notion Developer portal](https://www.notion.so/developers/tokens) with the Notion API capability. A PAT acts as you and expires one year after creation; rotate it before expiry.
    MCP:
      mode: subject
      auth:
        type: mcp_oauth
