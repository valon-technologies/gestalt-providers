source: github.com/valon-technologies/gestalt-providers/ui/default
version: 0.0.2-alpha.2
displayName: Default UI
description: Default Gestalt UI bundle served at /.
iconFile: assets/icon.svg
kind: ui
build:
  command:
    - sh
    - ./build.sh
  inputs:
    - build.sh
    - eslint.config.mjs
    - next.config.mjs
    - package-lock.json
    - package.json
    - postcss.config.mjs
    - public
    - shared
    - source-assets
    - src
    - tailwind.config.ts
    - tsconfig.json
spec:
  assetRoot: out
