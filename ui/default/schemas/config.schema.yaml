type: object
properties:
  theme:
    type: object
    description: >-
      Serve-time tenant theme. gestaltd serves the stylesheet at /theme.css
      under the mount (empty 200 when unconfigured) and the assets directory
      under /theme/. Paths resolve relative to the deployment config file.
      See THEMING.md.
    additionalProperties: false
    properties:
      stylesheet:
        type: string
        minLength: 1
        description: >-
          Tenant theme stylesheet, served at /theme.css. May only re-declare
          the tokens documented in THEMING.md (never with !important).
      assetsDir:
        type: string
        minLength: 1
        description: >-
          Directory of theme assets (e.g. font files referenced by @font-face
          rules in the stylesheet), served under /theme/.
additionalProperties: false
