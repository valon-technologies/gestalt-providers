<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GitHub Settings</title>
    <script>
      (() => {
        const basePath = window.location.pathname.replace(/\/+$/, "") || "/";
        const assetBase = basePath === "/" ? "" : basePath;
        window.__GITHUB_UI_BASE_PATH__ = assetBase;

        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = `${assetBase}/styles.css`;
        document.head.appendChild(stylesheet);

        const script = document.createElement("script");
        script.defer = true;
        script.src = `${assetBase}/app.js`;
        document.head.appendChild(script);
      })();
    </script>
  </head>
  <body>
    <main id="app" class="app-shell">
      <section class="panel" aria-live="polite">
        <div class="panel-header">
          <div>
            <p class="eyebrow">GitHub</p>
            <h1>GitHub Bot Actions</h1>
          </div>
          <a class="back-link" href="/integrations">Integrations</a>
        </div>
        <p class="muted">Loading...</p>
      </section>
    </main>
  </body>
</html>
