version: 2
updates:
  - package-ecosystem: "gomod"
    directories:
      - "/auth"
      - "/cache"
      - "/s3/s3"
      - "/indexeddb/relationaldb"
      - "/secrets"
      - "/s3/gcs"
    groups:
      go-dependencies:
        patterns:
          - "*"
        group-by: "dependency-name"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"

  - package-ecosystem: "uv"
    directories:
      - "/app/bigquery"
      - "/app/gmail"
      - "/app/slack"
    groups:
      python-dependencies:
        patterns:
          - "*"
        group-by: "dependency-name"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
