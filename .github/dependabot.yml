version: 2
updates:
  - package-ecosystem: "gomod"
    directories:
      - "/auth"
      - "/cache"
      - "/indexeddb/dynamodb"
      - "/indexeddb/mongodb"
      - "/indexeddb/relationaldb"
      - "/secrets"
    groups:
      go-dependencies:
        patterns:
          - "*"
        group-by: "dependency-name"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"

  - package-ecosystem: "cargo"
    directories:
      - "/indexeddb/internal/rust_sqlstore"
      - "/indexeddb/mysql"
      - "/indexeddb/postgres"
      - "/indexeddb/sqlite"
    groups:
      rust-dependencies:
        patterns:
          - "*"
        group-by: "dependency-name"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"

  - package-ecosystem: "uv"
    directories:
      - "/plugins/bigquery"
      - "/plugins/gmail"
      - "/plugins/slack"
    groups:
      python-dependencies:
        patterns:
          - "*"
        group-by: "dependency-name"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/New_York"
