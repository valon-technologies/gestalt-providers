name: Request Cross-Repo Integration

on:
  workflow_dispatch:
    inputs:
      gestalt_ref:
        description: Gestalt ref or SHA to test
        required: true
        default: main
        type: string
      toolshed_ref:
        description: Toolshed ref or SHA to run
        required: true
        default: main
        type: string
      mode:
        description: Which integration lane to run
        required: true
        default: full
        type: choice
        options:
          - source
          - package
          - full

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch private integration workflow
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
          WORKFLOW_REF: ${{ inputs.toolshed_ref }}
          GESTALT_REF: ${{ inputs.gestalt_ref }}
          PROVIDERS_REF: ${{ github.sha }}
          TOOLSHED_REF: ${{ inputs.toolshed_ref }}
          MODE: ${{ inputs.mode }}
        run: |
          payload="$(jq -n \
            --arg ref "$WORKFLOW_REF" \
            --arg gestalt_ref "$GESTALT_REF" \
            --arg providers_ref "$PROVIDERS_REF" \
            --arg toolshed_ref "$TOOLSHED_REF" \
            --arg mode "$MODE" \
            '{ref: $ref, inputs: {gestalt_ref: $gestalt_ref, providers_ref: $providers_ref, toolshed_ref: $toolshed_ref, mode: $mode}}')"

          curl -fsS -X POST \
            -H "Authorization: Bearer ${PAT_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/valon-technologies/toolshed/actions/workflows/gestalt-cross-repo-integration.yml/dispatches" \
            -d "$payload"

          {
            echo "Triggered \`valon-technologies/toolshed/.github/workflows/gestalt-cross-repo-integration.yml\`"
            echo
            echo "- \`gestalt_ref\`: \`${GESTALT_REF}\`"
            echo "- \`providers_ref\`: \`${PROVIDERS_REF}\`"
            echo "- \`toolshed_ref\`: \`${TOOLSHED_REF}\`"
            echo "- \`mode\`: \`${MODE}\`"
          } >> "$GITHUB_STEP_SUMMARY"
