name: Release Gestalt Provider Package

on:
  workflow_call:
    inputs:
      plugin-dir:
        description: Path to plugin directory containing manifest.yaml
        type: string
        default: '.'
      version:
        description: Semantic version for the release
        type: string
        required: true
      gestalt-ref:
        description: Pinned Gestalt git ref used to build gestaltd for packaging
        type: string
        required: true

permissions:
  contents: write

env:
  PYTHON_ALPINE_VERSION: "3.23"

jobs:
  metadata:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      plugin-tag: ${{ steps.plugin.outputs.tag }}
      prerelease: ${{ steps.plugin.outputs.prerelease }}
      root: ${{ steps.plugin.outputs.root }}
      has-go: ${{ steps.detect.outputs.has-go }}
      has-python: ${{ steps.detect.outputs.has-python }}
      has-rust: ${{ steps.detect.outputs.has-rust }}
      has-typescript: ${{ steps.detect.outputs.has-typescript }}
      source-language: ${{ steps.detect.outputs.source-language }}
      python-version: ${{ steps.detect.outputs.python-version }}
      version: ${{ steps.version.outputs.release }}
    steps:
      - uses: actions/checkout@v4
      - name: Normalize version
        id: version
        run: echo "release=$(echo '${{ inputs.version }}' | sed 's/^v//')" >> "$GITHUB_OUTPUT"
      - name: Resolve plugin metadata
        id: plugin
        run: |
          set -euo pipefail
          PLUGIN_DIR="${{ inputs.plugin-dir }}"
          if [ ! -f "${PLUGIN_DIR}/manifest.yaml" ]; then echo "ERROR: manifest.yaml not found"; exit 1; fi
          SOURCE="$(sed -nE "s/^[[:space:]]*source:[[:space:]]*['\"]?([^'\"[:space:]]+)['\"]?[[:space:]]*$/\\1/p" "${PLUGIN_DIR}/manifest.yaml" | head -n1)"
          if [ -z "$SOURCE" ]; then echo "ERROR: unable to parse source"; exit 1; fi
          VERSION="${{ steps.version.outputs.release }}"
          MANIFEST_VERSION="$(sed -nE "s/^[[:space:]]*version:[[:space:]]*['\"]?([^'\"[:space:]]+)['\"]?[[:space:]]*$/\\1/p" "${PLUGIN_DIR}/manifest.yaml" | head -n1)"
          if [ -z "$MANIFEST_VERSION" ]; then echo "ERROR: unable to parse version"; exit 1; fi
          if [ "$MANIFEST_VERSION" != "$VERSION" ]; then
            echo "ERROR: manifest version ${MANIFEST_VERSION} does not match release version ${VERSION}"
            exit 1
          fi
          PRERELEASE=false
          case "$VERSION" in *-alpha*|*-beta*|*-rc*) PRERELEASE=true ;; esac
          { echo "name=${SOURCE##*/}"; echo "tag=${PLUGIN_DIR}/v${VERSION}"; echo "prerelease=${PRERELEASE}"; echo "root=${PLUGIN_DIR%%/*}"; } >> "$GITHUB_OUTPUT"
      - name: Detect provider language
        id: detect
        run: |
          set -euo pipefail
          d="${{ inputs.plugin-dir }}"
          root="${d%%/*}"
          has_go=false; has_python=false; has_rust=false; has_typescript=false
          python_version=""
          find "$d" -maxdepth 1 -name '*.go' | grep -q . && has_go=true
          [ -f "$d/pyproject.toml" ] && has_python=true
          [ -f "$d/Cargo.toml" ] && has_rust=true
          if [ "$root" != "ui" ] && [ -f "$d/package.json" ]; then
            if python3 -c 'import json, pathlib, sys; data = json.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8")); provider = (data.get("gestalt") or {}).get("provider"); sys.exit(0 if provider else 1)' "$d/package.json"; then
              has_typescript=true
            fi
          fi
          if [ "$has_python" = true ]; then
            python_version="$(
              python3 -c 'import pathlib, re, sys, tomllib; data = tomllib.loads(pathlib.Path(sys.argv[1]).read_text(encoding="utf-8")); project = data.get("project") or {}; requires_python = str(project.get("requires-python") or "").strip(); match = re.fullmatch(r"==\s*(\d+\.\d+)\.\*", requires_python); assert match is not None, "project.requires-python must pin an exact Python minor like ==3.13.* for release packaging"; print(match.group(1))' "$d/pyproject.toml"
            )"
          fi
          source_language=generic
          if [ "$has_go" = true ]; then
            source_language=go
          elif [ "$has_rust" = true ]; then
            source_language=rust
          elif [ "$has_python" = true ]; then
            source_language=python
          elif [ "$has_typescript" = true ]; then
            source_language=typescript
          fi
          {
            echo "has-go=${has_go}"
            echo "has-python=${has_python}"
            echo "has-rust=${has_rust}"
            echo "has-typescript=${has_typescript}"
            echo "source-language=${source_language}"
            echo "python-version=${python_version}"
          } >> "$GITHUB_OUTPUT"

  build-linux-amd64:
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GESTALT_REPOSITORY: valon-technologies/gestalt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        if: needs.metadata.outputs.root == 'ui'
        with:
          node-version: '25'
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        if: needs.metadata.outputs.source-language == 'python'
      - uses: oven-sh/setup-bun@v2
        if: needs.metadata.outputs.source-language == 'typescript'
      - uses: dtolnay/rust-toolchain@1.88.0
        if: needs.metadata.outputs.source-language == 'rust'
      - name: Install Rust musl target
        if: needs.metadata.outputs.source-language == 'rust'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          rustup target add "$(uname -m)-unknown-linux-musl"
      - name: Install Python
        if: needs.metadata.outputs.source-language == 'python'
        run: uv python install "${{ needs.metadata.outputs.python-version }}"
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN" && echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ inputs.gestalt-ref }}"
          echo "GESTALT_CHECKOUT=$toolchain_dir" >> "$GITHUB_ENV"
          (cd "$toolchain_dir/gestaltd" && CGO_ENABLED=0 go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)

      # -- Tests (amd64 only) --
      - name: Test Go plugin
        if: needs.metadata.outputs.has-go == 'true'
        run: |
          case "${{ inputs.plugin-dir }}" in
            indexeddb/*)
              . .github/scripts/setup_go_indexeddb_test_env.sh "${{ inputs.plugin-dir }}"
              ;;
          esac
          case "${{ inputs.plugin-dir }}" in
            cache/*)
              . .github/scripts/setup_go_cache_test_env.sh "${{ inputs.plugin-dir }}"
              ;;
          esac
          cd "${{ inputs.plugin-dir }}" && go test ./...
      - name: Test Rust plugin
        if: needs.metadata.outputs.source-language == 'rust'
        run: |
          . .github/scripts/setup_rust_datastore_test_env.sh "${{ inputs.plugin-dir }}"
          cd "${{ inputs.plugin-dir }}" && cargo test
      - name: Validate Python plugin
        if: needs.metadata.outputs.source-language == 'python'
        run: python3 .github/scripts/validate_python_plugin.py "${{ inputs.plugin-dir }}"
      - name: Test TypeScript plugin
        if: needs.metadata.outputs.source-language == 'typescript'
        run: |
          cd "${{ inputs.plugin-dir }}"
          bun install --frozen-lockfile
          bun run check

      # -- Native/generic package --
      - name: Package provider
        run: |
          cd "${{ inputs.plugin-dir }}"
          if [ "${{ needs.metadata.outputs.source-language }}" = "python" ]; then
            rm -rf .venv
            uv sync --frozen --no-dev
            uv pip install "$GESTALT_CHECKOUT/sdk/python"
          fi
          gestaltd provider release --version "${{ needs.metadata.outputs.version }}"
      - name: Package Rust linux/amd64 artifact
        if: needs.metadata.outputs.source-language == 'rust'
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ needs.metadata.outputs.version }}" --platform linux/amd64
      - name: Package Python linux/amd64 artifact
        if: needs.metadata.outputs.source-language == 'python'
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          python_image="python:${{ needs.metadata.outputs.python-version }}-alpine${{ env.PYTHON_ALPINE_VERSION }}"
          .github/scripts/package_python_docker.sh linux/amd64 "${python_image}" gestaltd GESTALT_PYTHON_LINUX_AMD64 linux/amd64 "${{ inputs.plugin-dir }}" "${{ needs.metadata.outputs.version }}"
      - name: Package TypeScript linux/amd64 artifact
        if: needs.metadata.outputs.source-language == 'typescript'
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ needs.metadata.outputs.version }}" --platform linux/amd64
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-amd64
          path: ${{ inputs.plugin-dir }}/dist/*.tar.gz
          if-no-files-found: error

  build-linux-arm64:
    needs: metadata
    if: ${{ needs.metadata.outputs.source-language == 'go' || needs.metadata.outputs.source-language == 'python' || needs.metadata.outputs.source-language == 'typescript' }}
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    env:
      GESTALT_REPOSITORY: valon-technologies/gestalt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        if: needs.metadata.outputs.source-language == 'python'
      - uses: oven-sh/setup-bun@v2
        if: needs.metadata.outputs.source-language == 'typescript'
      - name: Install Python
        if: needs.metadata.outputs.source-language == 'python'
        run: uv python install "${{ needs.metadata.outputs.python-version }}"
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN" && echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ inputs.gestalt-ref }}"
          echo "GESTALT_CHECKOUT=$toolchain_dir" >> "$GITHUB_ENV"
          (cd "$toolchain_dir/gestaltd" && CGO_ENABLED=0 go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - name: Package Go linux/arm64 provider
        if: needs.metadata.outputs.source-language == 'go'
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ needs.metadata.outputs.version }}" --platform linux/arm64
      - name: Package Python linux/arm64 artifact
        if: needs.metadata.outputs.source-language == 'python'
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          python_image="python:${{ needs.metadata.outputs.python-version }}-alpine${{ env.PYTHON_ALPINE_VERSION }}"
          .github/scripts/package_python_docker.sh linux/arm64 "${python_image}" gestaltd GESTALT_PYTHON_LINUX_ARM64 linux/arm64 "${{ inputs.plugin-dir }}" "${{ needs.metadata.outputs.version }}"
      - name: Package TypeScript linux/arm64 artifact
        if: needs.metadata.outputs.source-language == 'typescript'
        run: |
          cd "${{ inputs.plugin-dir }}"
          bun install --frozen-lockfile
          gestaltd provider release --version "${{ needs.metadata.outputs.version }}" --platform linux/arm64
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-arm64
          path: ${{ inputs.plugin-dir }}/dist/*.tar.gz
          if-no-files-found: error

  build-linux-arm64-rust:
    needs: metadata
    if: needs.metadata.outputs.source-language == 'rust'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GESTALT_REPOSITORY: valon-technologies/gestalt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Install Rust ARM64 toolchain
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu
          rustup target add aarch64-unknown-linux-musl
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN" && echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ inputs.gestalt-ref }}"
          echo "GESTALT_CHECKOUT=$toolchain_dir" >> "$GITHUB_ENV"
          (cd "$toolchain_dir/gestaltd" && CGO_ENABLED=0 go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - name: Package Rust linux/arm64 artifact
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ needs.metadata.outputs.version }}" --platform linux/arm64
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-arm64
          path: ${{ inputs.plugin-dir }}/dist/*.tar.gz
          if-no-files-found: error

  build-linux-armv7:
    needs: metadata
    if: ${{ needs.metadata.outputs.source-language == 'go' || (needs.metadata.outputs.source-language == 'python' && inputs.plugin-dir != 'agent/claude') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GESTALT_REPOSITORY: valon-technologies/gestalt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        if: needs.metadata.outputs.source-language == 'python'
      - uses: dtolnay/rust-toolchain@1.88.0
        if: needs.metadata.outputs.source-language == 'rust'
      - name: Install Rust ARMv7 toolchain
        if: needs.metadata.outputs.source-language == 'rust'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools gcc-arm-linux-gnueabihf
          rustup target add armv7-unknown-linux-musleabihf
      - name: Install Python
        if: needs.metadata.outputs.source-language == 'python'
        run: uv python install "${{ needs.metadata.outputs.python-version }}"
      - name: Set up QEMU for ARMv7 emulation
        if: needs.metadata.outputs.source-language == 'python'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN" && echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ inputs.gestalt-ref }}"
          echo "GESTALT_CHECKOUT=$toolchain_dir" >> "$GITHUB_ENV"
          (cd "$toolchain_dir/gestaltd" && CGO_ENABLED=0 go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - name: Cross-compile gestaltd for ARMv7
        if: needs.metadata.outputs.source-language == 'python'
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: (cd "${GITHUB_WORKSPACE}/../gestalt/gestaltd" && CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -o "$GOBIN/gestaltd-armv7" ./cmd/gestaltd)
      - name: Package Go linux/arm provider
        if: needs.metadata.outputs.source-language == 'go'
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ needs.metadata.outputs.version }}" --platform linux/arm
      - name: Package Rust linux/arm artifact
        if: needs.metadata.outputs.source-language == 'rust'
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_MUSLEABIHF_LINKER: arm-linux-gnueabihf-gcc
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ needs.metadata.outputs.version }}" --platform linux/arm
      - name: Package Python linux/arm artifact
        if: needs.metadata.outputs.source-language == 'python'
        env:
          RUNNER_TEMP: ${{ runner.temp }}
        run: |
          .github/scripts/package_python_docker.sh linux/arm/v7 "python:${{ needs.metadata.outputs.python-version }}-slim" gestaltd-armv7 GESTALT_PYTHON_LINUX_ARM linux/arm "${{ inputs.plugin-dir }}" "${{ needs.metadata.outputs.version }}"
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux-armv7
          path: ${{ inputs.plugin-dir }}/dist/*.tar.gz
          if-no-files-found: error

  build-darwin-arm64:
    needs: metadata
    if: ${{ needs.metadata.outputs.source-language == 'go' || (needs.metadata.outputs.source-language == 'typescript' && inputs.plugin-dir != 'agent/cursor') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GESTALT_REPOSITORY: valon-technologies/gestalt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: oven-sh/setup-bun@v2
        if: needs.metadata.outputs.source-language == 'typescript'
      - name: Install rcodesign
        run: |
          set -euo pipefail
          version="0.29.0"
          archive="apple-codesign-${version}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL "https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign/${version}/${archive}" | tar xz -C /usr/local/bin --strip-components=1 "apple-codesign-${version}-x86_64-unknown-linux-musl/rcodesign"
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN" && echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ inputs.gestalt-ref }}"
          echo "GESTALT_CHECKOUT=$toolchain_dir" >> "$GITHUB_ENV"
          (cd "$toolchain_dir/gestaltd" && CGO_ENABLED=0 go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - name: Package Go darwin/arm64 provider
        if: needs.metadata.outputs.source-language == 'go'
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ needs.metadata.outputs.version }}" --platform darwin/arm64
      - name: Package TypeScript darwin/arm64 provider
        if: needs.metadata.outputs.source-language == 'typescript'
        run: |
          cd "${{ inputs.plugin-dir }}"
          bun install --frozen-lockfile
          gestaltd provider release --version "${{ needs.metadata.outputs.version }}" --platform darwin/arm64
      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin-arm64
          path: ${{ inputs.plugin-dir }}/dist/*.tar.gz
          if-no-files-found: error

  build-darwin-amd64:
    needs: metadata
    if: ${{ needs.metadata.outputs.source-language == 'go' || (needs.metadata.outputs.source-language == 'typescript' && inputs.plugin-dir != 'agent/cursor') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GESTALT_REPOSITORY: valon-technologies/gestalt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: oven-sh/setup-bun@v2
        if: needs.metadata.outputs.source-language == 'typescript'
      - name: Install rcodesign
        run: |
          set -euo pipefail
          version="0.29.0"
          archive="apple-codesign-${version}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL "https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign/${version}/${archive}" | tar xz -C /usr/local/bin --strip-components=1 "apple-codesign-${version}-x86_64-unknown-linux-musl/rcodesign"
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN" && echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ inputs.gestalt-ref }}"
          echo "GESTALT_CHECKOUT=$toolchain_dir" >> "$GITHUB_ENV"
          (cd "$toolchain_dir/gestaltd" && CGO_ENABLED=0 go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - name: Package Go darwin/amd64 provider
        if: needs.metadata.outputs.source-language == 'go'
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ needs.metadata.outputs.version }}" --platform darwin/amd64
      - name: Package TypeScript darwin/amd64 provider
        if: needs.metadata.outputs.source-language == 'typescript'
        run: |
          cd "${{ inputs.plugin-dir }}"
          bun install --frozen-lockfile
          gestaltd provider release --version "${{ needs.metadata.outputs.version }}" --platform darwin/amd64
      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin-amd64
          path: ${{ inputs.plugin-dir }}/dist/*.tar.gz
          if-no-files-found: error

  build-macos-arm64-python:
    needs: metadata
    if: needs.metadata.outputs.source-language == 'python'
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      GESTALT_REPOSITORY: valon-technologies/gestalt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Install Python
        run: uv python install "${{ needs.metadata.outputs.python-version }}"
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN" && echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ inputs.gestalt-ref }}"
          echo "GESTALT_CHECKOUT=$toolchain_dir" >> "$GITHUB_ENV"
          (cd "$toolchain_dir/gestaltd" && CGO_ENABLED=0 go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - name: Package Python darwin/arm64 provider
        run: |
          cd "${{ inputs.plugin-dir }}"
          rm -rf .venv
          uv sync --frozen --no-dev
          uv pip install "$GESTALT_CHECKOUT/sdk/python"
          GESTALT_PYTHON_DARWIN_ARM64="$PWD/.venv/bin/python" \
            gestaltd provider release --version "${{ needs.metadata.outputs.version }}" --platform darwin/arm64
      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin-arm64
          path: ${{ inputs.plugin-dir }}/dist/*.tar.gz
          if-no-files-found: error

  build-macos-amd64-python:
    needs: metadata
    if: needs.metadata.outputs.source-language == 'python'
    runs-on: macos-15-intel
    timeout-minutes: 30
    env:
      GESTALT_REPOSITORY: valon-technologies/gestalt
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Install Python
        run: uv python install "${{ needs.metadata.outputs.python-version }}"
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN" && echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ inputs.gestalt-ref }}"
          echo "GESTALT_CHECKOUT=$toolchain_dir" >> "$GITHUB_ENV"
          (cd "$toolchain_dir/gestaltd" && CGO_ENABLED=0 go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - name: Package Python darwin/amd64 provider
        run: |
          cd "${{ inputs.plugin-dir }}"
          rm -rf .venv
          uv sync --frozen --no-dev
          uv pip install "$GESTALT_CHECKOUT/sdk/python"
          GESTALT_PYTHON_DARWIN_AMD64="$PWD/.venv/bin/python" \
            gestaltd provider release --version "${{ needs.metadata.outputs.version }}" --platform darwin/amd64
      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin-amd64
          path: ${{ inputs.plugin-dir }}/dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs:
      - metadata
      - build-linux-amd64
      - build-linux-arm64
      - build-linux-arm64-rust
      - build-linux-armv7
      - build-darwin-arm64
      - build-darwin-amd64
      - build-macos-arm64-python
      - build-macos-amd64-python
    if: ${{ !cancelled() && needs.build-linux-amd64.result == 'success' && (needs.build-linux-arm64.result == 'success' || needs.build-linux-arm64.result == 'skipped') && (needs.build-linux-arm64-rust.result == 'success' || needs.build-linux-arm64-rust.result == 'skipped') && (needs.build-linux-armv7.result == 'success' || needs.build-linux-armv7.result == 'skipped') && (needs.build-darwin-arm64.result == 'success' || needs.build-darwin-arm64.result == 'skipped') && (needs.build-darwin-amd64.result == 'success' || needs.build-darwin-amd64.result == 'skipped') && (needs.build-macos-arm64-python.result == 'success' || needs.build-macos-arm64-python.result == 'skipped') && (needs.build-macos-amd64-python.result == 'success' || needs.build-macos-amd64-python.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist
          merge-multiple: true
      - name: Generate provider release metadata
        run: |
          set -euo pipefail
          python3 .github/scripts/write_provider_release_metadata.py \
            --manifest "${{ inputs.plugin-dir }}/manifest.yaml" \
            --output-dir dist \
            --version "${{ needs.metadata.outputs.version }}"
      - name: Write checksums and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd dist && sha256sum ./*.tar.gz > checksums.txt && cd ..

          args=(release create "${{ needs.metadata.outputs.plugin-tag }}" --generate-notes)
          if [ "${{ needs.metadata.outputs.prerelease }}" = "true" ]; then
            args+=(--prerelease)
          fi
          args+=(dist/*)
          gh "${args[@]}"

  publish-agent-simple-runtime-image:
    needs:
      - metadata
      - build-linux-amd64
      - build-linux-arm64
      - publish
    if: ${{ !cancelled() && inputs.plugin-dir == 'agent/simple' && needs.publish.result == 'success' && needs.build-linux-amd64.result == 'success' && needs.build-linux-arm64.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-linux-*
          path: dist
          merge-multiple: true
      - name: Prepare runtime image context
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p runtime-image-dist

          select_archive() {
            local arch="$1"
            local -a musl exact
            musl=(dist/gestalt-plugin-simple_*_linux_"${arch}"_musl.tar.gz)
            exact=(dist/gestalt-plugin-simple_*_linux_"${arch}".tar.gz)

            if [ "${#musl[@]}" -eq 1 ]; then
              printf '%s\n' "${musl[0]}"
              return
            fi
            if [ "${#musl[@]}" -gt 1 ]; then
              printf 'expected at most one linux/%s musl Simple Agent archive, found %s\n' "$arch" "${#musl[@]}" >&2
              exit 1
            fi
            if [ "${#exact[@]}" -eq 1 ]; then
              printf '%s\n' "${exact[0]}"
              return
            fi
            if [ "${#exact[@]}" -gt 1 ]; then
              printf 'expected at most one linux/%s Simple Agent archive, found %s\n' "$arch" "${#exact[@]}" >&2
              exit 1
            fi
            printf 'missing linux/%s Simple Agent archive\n' "$arch" >&2
            exit 1
          }

          amd64="$(select_archive amd64)"
          arm64="$(select_archive arm64)"

          cp "$amd64" runtime-image-dist/gestalt-plugin-simple_linux_amd64.tar.gz
          cp "$arm64" runtime-image-dist/gestalt-plugin-simple_linux_arm64.tar.gz
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/build-push-action@v6
        id: build-runtime-image
        with:
          context: .
          file: agent/simple/Dockerfile.runtime
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            ALPINE_VERSION=${{ env.PYTHON_ALPINE_VERSION }}
          tags: |
            ghcr.io/valon-technologies/agent-simple-runtime:${{ needs.metadata.outputs.version }}
          labels: |
            org.opencontainers.image.source=https://github.com/valon-technologies/gestalt-providers
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}
            org.opencontainers.image.title=Gestalt Simple Agent Runtime
      - name: Check runtime image contract
        env:
          RUNTIME_IMAGE: ghcr.io/valon-technologies/agent-simple-runtime:${{ needs.metadata.outputs.version }}
        run: .github/scripts/check_agent_simple_runtime_image.sh "${RUNTIME_IMAGE}"
      - name: Summarize runtime image
        env:
          RUNTIME_IMAGE: ghcr.io/valon-technologies/agent-simple-runtime:${{ needs.metadata.outputs.version }}
          RUNTIME_IMAGE_DIGEST: ${{ steps.build-runtime-image.outputs.digest }}
        run: |
          {
            echo "### Simple Agent runtime image"
            echo
            echo "- Image: \`${RUNTIME_IMAGE}\`"
            echo "- Digest: \`${RUNTIME_IMAGE_DIGEST}\`"
            echo "- Platforms: \`linux/amd64\`, \`linux/arm64\`"
            echo "- Launch contract: \`/gestalt-plugin-simple\` and \`/app/gestalt-plugin-simple\` are executable; \`./gestalt-plugin-simple\` execs from \`/\`."
          } >> "${GITHUB_STEP_SUMMARY}"
