name: Release Gestalt Provider Package

on:
  workflow_call:
    inputs:
      plugin-dir:
        description: Path to plugin directory containing manifest.yaml
        type: string
        default: '.'
      version:
        description: Semantic version for the release
        type: string
        required: true
      gestalt-ref:
        description: Pinned Gestalt git ref used to build gestaltd for packaging
        type: string
        required: true
    secrets:
      PAT_TOKEN:
        required: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
    outputs:
      plugin-tag: ${{ steps.plugin.outputs.tag }}
      prerelease: ${{ steps.plugin.outputs.prerelease }}
      has-python: ${{ steps.detect.outputs.has-python }}
      version: ${{ steps.version.outputs.release }}
    env:
      GESTALT_REPOSITORY: valon-technologies/gestalt
      GOPRIVATE: github.com/valon-technologies/*
      GONOSUMDB: github.com/valon-technologies/*
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      UV_PYTHON: "3.14"
      UV_VERSION: "0.7.13"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Normalize version
        id: version
        run: echo "release=$(echo '${{ inputs.version }}' | sed 's/^v//')" >> "$GITHUB_OUTPUT"
      - name: Resolve plugin metadata
        id: plugin
        run: |
          set -euo pipefail
          PLUGIN_DIR="${{ inputs.plugin-dir }}"
          if [ ! -f "${PLUGIN_DIR}/manifest.yaml" ]; then echo "ERROR: manifest.yaml not found"; exit 1; fi
          SOURCE="$(sed -nE "s/^[[:space:]]*source:[[:space:]]*['\"]?([^'\"[:space:]]+)['\"]?[[:space:]]*$/\\1/p" "${PLUGIN_DIR}/manifest.yaml" | head -n1)"
          if [ -z "$SOURCE" ]; then echo "ERROR: unable to parse source"; exit 1; fi
          VERSION="${{ steps.version.outputs.release }}"
          PRERELEASE=false
          case "$VERSION" in *-alpha*|*-beta*|*-rc*) PRERELEASE=true ;; esac
          { echo "name=${SOURCE##*/}"; echo "tag=${PLUGIN_DIR}/v${VERSION}"; echo "prerelease=${PRERELEASE}"; echo "root=${PLUGIN_DIR%%/*}"; } >> "$GITHUB_OUTPUT"
      - name: Detect provider language
        id: detect
        run: |
          d="${{ inputs.plugin-dir }}"
          has_go=false; has_python=false; has_rust=false
          find "$d" -maxdepth 1 -name '*.go' | grep -q . && has_go=true
          [ -f "$d/pyproject.toml" ] && has_python=true
          [ -f "$d/Cargo.toml" ] && has_rust=true
          { echo "has-go=${has_go}"; echo "has-python=${has_python}"; echo "has-rust=${has_rust}"; } >> "$GITHUB_OUTPUT"

      # -- Toolchain setup (shared across architectures) --
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.26'
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        if: steps.plugin.outputs.root == 'web'
        with:
          node-version: '25'
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        if: steps.detect.outputs.has-python == 'true'
        with:
          version: ${{ env.UV_VERSION }}
      - uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c # 1.88.0
        if: steps.detect.outputs.has-rust == 'true'
      - name: Install Rust musl target
        if: steps.detect.outputs.has-rust == 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          rustup target add "$(uname -m)-unknown-linux-musl"
      - name: Install ARM cross-compilation toolchains
        if: steps.detect.outputs.has-rust == 'true'
        run: |
          sudo apt-get install -y gcc-arm-linux-gnueabihf gcc-aarch64-linux-gnu
          rustup target add armv7-unknown-linux-musleabihf aarch64-unknown-linux-musl
      - name: Install Python
        if: steps.detect.outputs.has-python == 'true'
        run: uv python install 3.14
      - name: Resolve Python SDK revision
        if: steps.detect.outputs.has-python == 'true'
        id: python-sdk
        run: |
          set -euo pipefail
          plugin_dir="${{ inputs.plugin-dir }}"
          sdk_ref=""
          if [ -f "${plugin_dir}/uv.lock" ]; then
            sdk_ref="$(sed -nE 's/.*https:\/\/github\.com\/valon-technologies\/gestalt\.git\?[^"]*rev=([0-9a-f]{40}).*/\1/p' "${plugin_dir}/uv.lock" | head -n1)"
          fi
          if [ -z "${sdk_ref}" ] && [ -f "${plugin_dir}/pyproject.toml" ]; then
            sdk_ref="$(sed -nE 's/.*gestalt = \{[^}]*rev = "([0-9a-f]{40})".*/\1/p' "${plugin_dir}/pyproject.toml" | head -n1)"
          fi
          if [ -z "${sdk_ref}" ]; then
            echo "ERROR: unable to resolve the Gestalt Python SDK revision for ${plugin_dir}" >&2
            exit 1
          fi
          echo "ref=${sdk_ref}" >> "$GITHUB_OUTPUT"
      - name: Stage Python SDK source
        if: steps.detect.outputs.has-python == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: ${{ env.GESTALT_REPOSITORY }}
          token: ${{ secrets.PAT_TOKEN }}
          ref: ${{ steps.python-sdk.outputs.ref }}
          path: .toolchain/gestalt-sdk
          fetch-depth: 1
          persist-credentials: false
      - name: Set up QEMU for ARM emulation
        if: steps.detect.outputs.has-python == 'true'
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          platforms: arm,arm64
      - name: Configure private Gestalt repository access
        if: steps.detect.outputs.has-go == 'true' || steps.detect.outputs.has-python == 'true' || steps.detect.outputs.has-rust == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: .github/scripts/configure_private_github.sh
      - name: Install rcodesign
        run: |
          set -euo pipefail
          version="0.29.0"
          archive="apple-codesign-${version}-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL "https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign/${version}/${archive}" | tar xz -C /usr/local/bin --strip-components=1 "apple-codesign-${version}-x86_64-unknown-linux-musl/rcodesign"
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN" && echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ inputs.gestalt-ref }}"
          (cd "$toolchain_dir/gestaltd" && CGO_ENABLED=0 go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - name: Cross-compile gestaltd for ARMv7
        if: steps.detect.outputs.has-python == 'true'
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: (cd "${GITHUB_WORKSPACE}/../gestalt/gestaltd" && CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -o "$GOBIN/gestaltd-armv7" ./cmd/gestaltd)
      - name: Cross-compile gestaltd for ARM64
        if: steps.detect.outputs.has-python == 'true'
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: (cd "${GITHUB_WORKSPACE}/../gestalt/gestaltd" && CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o "$GOBIN/gestaltd-arm64" ./cmd/gestaltd)

      # -- Tests (amd64 only) --
      - name: Test Go plugin
        if: steps.detect.outputs.has-go == 'true'
        run: cd "${{ inputs.plugin-dir }}" && go test ./...
      - name: Test Rust plugin
        if: steps.detect.outputs.has-rust == 'true'
        run: |
          . .github/scripts/setup_rust_datastore_test_env.sh "${{ inputs.plugin-dir }}"
          cd "${{ inputs.plugin-dir }}" && cargo test
      - name: Validate Python plugin
        if: steps.detect.outputs.has-python == 'true'
        run: python3 .github/scripts/validate_python_plugin.py "${{ inputs.plugin-dir }}"

      # -- Package native architecture --
      - name: Package provider
        run: |
          if [ "${{ steps.plugin.outputs.root }}" = "web" ]; then
            export GESTALT_CHECKOUT="${GITHUB_WORKSPACE}/../gestalt"
          fi
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ steps.version.outputs.release }}"
      - name: Package Rust artifact
        if: steps.detect.outputs.has-rust == 'true'
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ steps.version.outputs.release }}" --platform "linux/amd64"
      - name: Package Python artifact
        if: steps.detect.outputs.has-python == 'true'
        env:
          GESTALT_SDK_DIR: ${{ github.workspace }}/.toolchain/gestalt-sdk
          RUNNER_TEMP: ${{ runner.temp }}
          UV_VERSION: ${{ env.UV_VERSION }}
        run: |
          .github/scripts/package_python_docker.sh "linux/amd64" "ghcr.io/astral-sh/uv:python3.14-alpine@sha256:be28b44a377567c053ab1817da02ba6721264a9e3880ec8fe197180ae8b19f41" gestaltd "GESTALT_PYTHON_LINUX_$(echo 'amd64' | tr '[:lower:]' '[:upper:]')" "linux/amd64" "${{ inputs.plugin-dir }}" "${{ steps.version.outputs.release }}"

      # -- Package ARM64 cross-compiled artifacts (amd64 runner only) --
      - name: Package Go ARM64 provider
        if: steps.detect.outputs.has-go == 'true' && steps.detect.outputs.has-rust != 'true' && steps.detect.outputs.has-python != 'true'
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ steps.version.outputs.release }}" --platform linux/arm64
      - name: Package Rust ARM64 artifact
        if: steps.detect.outputs.has-rust == 'true'
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-gnu-gcc
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ steps.version.outputs.release }}" --platform linux/arm64/musl
      - name: Package Python ARM64 artifact
        if: steps.detect.outputs.has-python == 'true'
        env:
          GESTALT_SDK_DIR: ${{ github.workspace }}/.toolchain/gestalt-sdk
          RUNNER_TEMP: ${{ runner.temp }}
          UV_VERSION: ${{ env.UV_VERSION }}
        run: |
          .github/scripts/package_python_docker.sh linux/arm64 "ghcr.io/astral-sh/uv:python3.14-alpine@sha256:be28b44a377567c053ab1817da02ba6721264a9e3880ec8fe197180ae8b19f41" gestaltd-arm64 GESTALT_PYTHON_LINUX_ARM64 linux/arm64/musl "${{ inputs.plugin-dir }}" "${{ steps.version.outputs.release }}"

      # -- Package Darwin cross-compiled artifacts (Go only) --
      - name: Package Go darwin/arm64 provider
        if: steps.detect.outputs.has-go == 'true' && steps.detect.outputs.has-rust != 'true' && steps.detect.outputs.has-python != 'true'
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ steps.version.outputs.release }}" --platform darwin/arm64
      - name: Package Go darwin/amd64 provider
        if: steps.detect.outputs.has-go == 'true' && steps.detect.outputs.has-rust != 'true' && steps.detect.outputs.has-python != 'true'
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ steps.version.outputs.release }}" --platform darwin/amd64

      # -- Package ARMv7 cross-compiled artifacts (amd64 runner only) --
      - name: Package Go ARMv7 provider
        if: steps.detect.outputs.has-go == 'true' && steps.detect.outputs.has-rust != 'true' && steps.detect.outputs.has-python != 'true'
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ steps.version.outputs.release }}" --platform linux/arm
      - name: Package Rust ARMv7 artifact
        if: steps.detect.outputs.has-rust == 'true'
        env:
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_MUSLEABIHF_LINKER: arm-linux-gnueabihf-gcc
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ steps.version.outputs.release }}" --platform linux/arm/musl
      - name: Package Python ARMv7 artifact
        if: steps.detect.outputs.has-python == 'true'
        env:
          GESTALT_SDK_DIR: ${{ github.workspace }}/.toolchain/gestalt-sdk
          RUNNER_TEMP: ${{ runner.temp }}
          UV_VERSION: ${{ env.UV_VERSION }}
        run: |
          .github/scripts/package_python_docker.sh linux/arm/v7 "python:3.14-slim@sha256:bc389f7dfcb21413e72a28f491985326994795e34d2b86c8ae2f417b4e7818aa" gestaltd-armv7 GESTALT_PYTHON_LINUX_ARM linux/arm "${{ inputs.plugin-dir }}" "${{ steps.version.outputs.release }}"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist
          path: ${{ inputs.plugin-dir }}/dist/*.tar.gz
          if-no-files-found: ignore

  build-macos:
    needs: build
    if: needs.build.outputs.has-python == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      GESTALT_REPOSITORY: valon-technologies/gestalt
      GOPRIVATE: github.com/valon-technologies/*
      GONOSUMDB: github.com/valon-technologies/*
      UV_PYTHON: "3.14"
      UV_VERSION: "0.7.13"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: '1.26'
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install Python
        run: uv python install 3.14
      - name: Configure private Gestalt repository access
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: .github/scripts/configure_private_github.sh
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN" && echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ inputs.gestalt-ref }}"
          (cd "$toolchain_dir/gestaltd" && CGO_ENABLED=0 go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - name: Package Python darwin/arm64 provider
        run: |
          cd "${{ inputs.plugin-dir }}"
          uv sync
          GESTALT_PYTHON_DARWIN_ARM64="$PWD/.venv/bin/python" \
            gestaltd provider release --version "${{ needs.build.outputs.version }}" --platform darwin/arm64
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: dist-macos
          path: ${{ inputs.plugin-dir }}/dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs:
      - build
      - build-macos
    if: ${{ !cancelled() && needs.build.result == 'success' && (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dist
          path: dist
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        if: needs.build-macos.result == 'success'
        with:
          name: dist-macos
          path: dist
      - name: Write checksums and publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd dist && sha256sum ./*.tar.gz > checksums.txt && cd ..

          args=(release create "${{ needs.build.outputs.plugin-tag }}" --generate-notes)
          if [ "${{ needs.build.outputs.prerelease }}" = "true" ]; then
            args+=(--prerelease)
          fi
          args+=(dist/*)
          gh "${args[@]}"
