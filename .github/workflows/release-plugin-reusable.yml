name: Release Gestalt Plugin

on:
  workflow_call:
    inputs:
      plugin-dir:
        description: Path to plugin directory containing plugin.yaml
        type: string
        default: '.'
      version:
        description: Semantic version for the release
        type: string
        required: true
      gestalt-ref:
        description: Pinned Gestalt git ref used to build gestaltd for packaging
        type: string
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GESTALT_REPOSITORY: valon-technologies/gestalt
      GOPRIVATE: github.com/valon-technologies/*
      GONOSUMDB: github.com/valon-technologies/*
      UV_PYTHON: "3.14"
    steps:
      - uses: actions/checkout@v4
      - name: Normalize version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          echo "release=${VERSION#v}" >> "$GITHUB_OUTPUT"
      - name: Resolve plugin metadata
        id: plugin
        run: |
          set -euo pipefail

          PLUGIN_DIR="${{ inputs.plugin-dir }}"
          MANIFEST_PATH="${PLUGIN_DIR}/plugin.yaml"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "ERROR: ${MANIFEST_PATH} not found"
            exit 1
          fi

          SOURCE="$(sed -nE "s/^[[:space:]]*source:[[:space:]]*['\"]?([^'\"[:space:]]+)['\"]?[[:space:]]*$/\\1/p" "$MANIFEST_PATH" | head -n1)"
          if [ -z "$SOURCE" ]; then
            echo "ERROR: unable to parse source from ${MANIFEST_PATH}"
            exit 1
          fi

          PLUGIN_NAME="${SOURCE##*/}"
          VERSION="${{ steps.version.outputs.release }}"
          PRERELEASE=false
          case "$VERSION" in
            *-alpha*|*-beta*|*-rc*) PRERELEASE=true ;;
          esac

          {
            echo "name=${PLUGIN_NAME}"
            echo "tag=${PLUGIN_NAME}/v${VERSION}"
            echo "prerelease=${PRERELEASE}"
          } >> "$GITHUB_OUTPUT"
          if [ -f "${PLUGIN_DIR}/go.mod" ]; then
            echo "has-go-mod=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-go-mod=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f "${PLUGIN_DIR}/pyproject.toml" ]; then
            echo "has-python-project=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-python-project=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        if: steps.plugin.outputs.has-python-project == 'true'
      - name: Install Python
        if: steps.plugin.outputs.has-python-project == 'true'
        run: uv python install 3.14
      - name: Configure private Gestalt repository access
        if: steps.plugin.outputs.has-go-mod == 'true' || steps.plugin.outputs.has-python-project == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${PAT_TOKEN}" ]; then
            echo "PAT_TOKEN secret is required to fetch private Gestalt dependencies"
            exit 1
          fi

          cat > "${HOME}/.netrc" <<EOF
          machine github.com
            login x-access-token
            password ${PAT_TOKEN}
          EOF
          chmod 600 "${HOME}/.netrc"

          git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://github.com/".insteadOf "git@github.com:"
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN"
          echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${RUNNER_TEMP}/gestalt"
          if [ -z "${PAT_TOKEN}" ]; then
            echo "PAT_TOKEN secret is required to fetch private Gestalt dependencies"
            exit 1
          fi
          toolchain_url="https://x-access-token:${PAT_TOKEN}@github.com/${GESTALT_REPOSITORY}.git"
          git clone "$toolchain_url" "$toolchain_dir"
          git -C "$toolchain_dir" fetch --depth 1 origin "${{ inputs.gestalt-ref }}"
          git -C "$toolchain_dir" checkout FETCH_HEAD
          (cd "$toolchain_dir/gestaltd" && go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - uses: actions/setup-go@v5
        if: steps.plugin.outputs.has-go-mod == 'true'
        with:
          go-version-file: ${{ inputs.plugin-dir }}/go.mod
      - name: Test compiled plugin
        if: steps.plugin.outputs.has-go-mod == 'true'
        run: |
          cd "${{ inputs.plugin-dir }}"
          go test ./...
      - name: Sync and validate Python plugin
        if: steps.plugin.outputs.has-python-project == 'true'
        run: |
          python3 .github/scripts/validate_python_plugin.py "${{ inputs.plugin-dir }}"
      - name: Package plugin
        run: |
          cd "${{ inputs.plugin-dir }}"
          if [ "${{ steps.plugin.outputs.has-python-project }}" = "true" ]; then
            gestaltd plugin release --version "${{ steps.version.outputs.release }}" --platform linux/amd64/glibc
          else
            gestaltd plugin release --version "${{ steps.version.outputs.release }}"
          fi
      - name: Package Python musl artifact
        if: steps.plugin.outputs.has-python-project == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          workspace="$PWD"

          docker run --rm \
            -e PAT_TOKEN \
            -e GESTALT_REPOSITORY="${GESTALT_REPOSITORY}" \
            -e GOPRIVATE="${GOPRIVATE}" \
            -e GONOSUMDB="${GONOSUMDB}" \
            -e UV_PYTHON="${UV_PYTHON}" \
            -e INPUT_PLUGIN_DIR="${{ inputs.plugin-dir }}" \
            -e INPUT_GESTALT_REF="${{ inputs.gestalt-ref }}" \
            -e INPUT_VERSION="${{ steps.version.outputs.release }}" \
            -v "${workspace}:/workspace" \
            -w /workspace \
            ghcr.io/astral-sh/uv:python3.14-alpine \
            bash -ceu '
              apk add --no-cache bash build-base ca-certificates curl git
              curl -fsSL https://go.dev/dl/go1.26.1.linux-amd64.tar.gz | tar -C /usr/local -xz

              printf "machine github.com\n  login x-access-token\n  password %s\n" "${PAT_TOKEN}" > "${HOME}/.netrc"
              chmod 600 "${HOME}/.netrc"

              git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
              git config --global url."https://github.com/".insteadOf "git@github.com:"

              mkdir -p /tmp/bin
              export PATH="/usr/local/go/bin:/tmp/bin:$PATH"
              toolchain_dir="/tmp/gestalt"
              git clone "https://x-access-token:${PAT_TOKEN}@github.com/${GESTALT_REPOSITORY}.git" "$toolchain_dir"
              git -C "$toolchain_dir" fetch --depth 1 origin "${INPUT_GESTALT_REF}"
              git -C "$toolchain_dir" checkout FETCH_HEAD
              (cd "$toolchain_dir/gestaltd" && go build -o /tmp/bin/gestaltd ./cmd/gestaltd)

              cd "${INPUT_PLUGIN_DIR}"
              rm -rf .venv
              uv sync
              export GESTALT_PYTHON_LINUX_AMD64="$PWD/.venv/bin/python"
              gestaltd plugin release --version "${INPUT_VERSION}" --platform linux/amd64/musl
              chmod -R a+rX dist
            '
      - name: Write release checksums
        run: |
          cd "${{ inputs.plugin-dir }}/dist"
          sha256sum ./*.tar.gz > checksums.txt
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.plugin.outputs.tag }}
          PLUGIN_DIR: ${{ inputs.plugin-dir }}
          PRERELEASE: ${{ steps.plugin.outputs.prerelease }}
        run: |
          set -euo pipefail

          args=(release create "$TAG" --generate-notes)
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          args+=("${PLUGIN_DIR}"/dist/*)
          gh "${args[@]}"
