name: Release Gestalt Plugin

on:
  workflow_call:
    inputs:
      plugin-dir:
        description: Path to plugin directory containing plugin.yaml
        type: string
        default: '.'
      version:
        description: Semantic version for the release
        type: string
        required: true
      gestaltd-version:
        description: Pinned Gestalt commit, tag, or SHA used to build gestaltd
        type: string
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: valon-technologies/gestalt
          ref: ${{ inputs.gestaltd-version }}
          path: .gestalt-toolchain
      - name: Normalize version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          echo "release=${VERSION#v}" >> "$GITHUB_OUTPUT"
      - name: Resolve plugin metadata
        id: plugin
        run: |
          set -euo pipefail

          PLUGIN_DIR="${{ inputs.plugin-dir }}"
          MANIFEST_PATH="${PLUGIN_DIR}/plugin.yaml"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "ERROR: ${MANIFEST_PATH} not found"
            exit 1
          fi

          SOURCE="$(sed -nE "s/^[[:space:]]*source:[[:space:]]*['\"]?([^'\"[:space:]]+)['\"]?[[:space:]]*$/\\1/p" "$MANIFEST_PATH" | head -n1)"
          if [ -z "$SOURCE" ]; then
            echo "ERROR: unable to parse source from ${MANIFEST_PATH}"
            exit 1
          fi

          PLUGIN_NAME="${SOURCE##*/}"
          VERSION="${{ steps.version.outputs.release }}"
          PRERELEASE=false
          case "$VERSION" in
            *-alpha*|*-beta*|*-rc*) PRERELEASE=true ;;
          esac

          echo "name=${PLUGIN_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=plugin/${PLUGIN_NAME}/v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          if [ -f "${PLUGIN_DIR}/go.mod" ]; then
            echo "has-go-mod=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-go-mod=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-go@v5
        with:
          go-version-file: .gestalt-toolchain/server/go.mod
      - name: Configure GitHub auth for private modules
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config --global url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "https://github.com/"
          go env -w GOPRIVATE=github.com/valon-technologies/*
      - name: Build gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          mkdir -p "$GOBIN"
          echo "$GOBIN" >> "$GITHUB_PATH"
          cd .gestalt-toolchain/server
          go build -o "$GOBIN/gestaltd" ./cmd/gestaltd
      - uses: actions/setup-go@v5
        if: steps.plugin.outputs.has-go-mod == 'true'
        with:
          go-version-file: ${{ inputs.plugin-dir }}/go.mod
      - name: Test compiled plugin
        if: steps.plugin.outputs.has-go-mod == 'true'
        run: |
          cd "${{ inputs.plugin-dir }}"
          go test ./...
      - name: Package plugin
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd plugin release --version "${{ steps.version.outputs.release }}"
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.plugin.outputs.tag }}
          PLUGIN_DIR: ${{ inputs.plugin-dir }}
          PRERELEASE: ${{ steps.plugin.outputs.prerelease }}
        run: |
          set -euo pipefail

          args=(release create "$TAG" --generate-notes)
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          args+=("${PLUGIN_DIR}"/dist/*)

          gh "${args[@]}"
