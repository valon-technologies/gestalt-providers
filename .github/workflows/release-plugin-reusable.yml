name: Release Gestalt Provider Package

on:
  workflow_call:
    inputs:
      plugin-dir:
        description: Path to plugin directory containing provider.yaml
        type: string
        default: '.'
      version:
        description: Semantic version for the release
        type: string
        required: true
      gestalt-ref:
        description: Pinned Gestalt git ref used to build gestaltd for packaging
        type: string
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GESTALT_REPOSITORY: valon-technologies/gestalt
      GOPRIVATE: github.com/valon-technologies/*
      GONOSUMDB: github.com/valon-technologies/*
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      UV_PYTHON: "3.14"
    steps:
      - uses: actions/checkout@v4
      - name: Normalize version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          echo "release=${VERSION#v}" >> "$GITHUB_OUTPUT"
      - name: Resolve plugin metadata
        id: plugin
        run: |
          set -euo pipefail

          PLUGIN_DIR="${{ inputs.plugin-dir }}"
          MANIFEST_PATH="${PLUGIN_DIR}/provider.yaml"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "ERROR: ${MANIFEST_PATH} not found"
            exit 1
          fi

          SOURCE="$(sed -nE "s/^[[:space:]]*source:[[:space:]]*['\"]?([^'\"[:space:]]+)['\"]?[[:space:]]*$/\\1/p" "$MANIFEST_PATH" | head -n1)"
          if [ -z "$SOURCE" ]; then
            echo "ERROR: unable to parse source from ${MANIFEST_PATH}"
            exit 1
          fi

          PLUGIN_NAME="${SOURCE##*/}"
          VERSION="${{ steps.version.outputs.release }}"
          PRERELEASE=false
          case "$VERSION" in
            *-alpha*|*-beta*|*-rc*) PRERELEASE=true ;;
          esac

          {
            echo "name=${PLUGIN_NAME}"
            echo "tag=${PLUGIN_DIR}/v${VERSION}"
            echo "prerelease=${PRERELEASE}"
            echo "root=${PLUGIN_DIR%%/*}"
          } >> "$GITHUB_OUTPUT"
          if find "${PLUGIN_DIR}" -maxdepth 1 -type f -name '*.go' | grep -q .; then
            echo "has-go-sources=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-go-sources=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f "${PLUGIN_DIR}/pyproject.toml" ]; then
            echo "has-python-project=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-python-project=false" >> "$GITHUB_OUTPUT"
          fi
          if [ -f "${PLUGIN_DIR}/Cargo.toml" ]; then
            echo "has-rust-project=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-rust-project=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        if: steps.plugin.outputs.root == 'web'
        with:
          node-version: '25'
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        if: steps.plugin.outputs.has-python-project == 'true'
      - uses: dtolnay/rust-toolchain@1.88.0
        if: steps.plugin.outputs.has-rust-project == 'true'
      - name: Install Rust musl toolchain
        if: steps.plugin.outputs.has-rust-project == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add x86_64-unknown-linux-musl
      - name: Install Python
        if: steps.plugin.outputs.has-python-project == 'true'
        run: uv python install 3.14
      - name: Configure private Gestalt repository access
        if: steps.plugin.outputs.has-go-sources == 'true' || steps.plugin.outputs.has-python-project == 'true' || steps.plugin.outputs.has-rust-project == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          .github/scripts/configure_private_github.sh
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN"
          echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ inputs.gestalt-ref }}"
          (cd "$toolchain_dir/gestaltd" && go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - name: Test compiled plugin
        if: steps.plugin.outputs.has-go-sources == 'true'
        run: |
          cd "${{ inputs.plugin-dir }}"
          go test ./...
      - name: Test Rust plugin
        if: steps.plugin.outputs.has-rust-project == 'true'
        run: |
          plugin_dir="${{ inputs.plugin-dir }}"
          . .github/scripts/setup_rust_datastore_test_env.sh "$plugin_dir"
          cd "$plugin_dir"
          cargo test
      - name: Sync and validate Python plugin
        if: steps.plugin.outputs.has-python-project == 'true'
        run: |
          python3 .github/scripts/validate_python_plugin.py "${{ inputs.plugin-dir }}"
      - name: Package provider
        run: |
          if [ "${{ steps.plugin.outputs.root }}" = "web" ]; then
            export GESTALT_CHECKOUT="${GITHUB_WORKSPACE}/../gestalt"
          fi
          cd "${{ inputs.plugin-dir }}"
          if [ "${{ steps.plugin.outputs.has-python-project }}" = "true" ]; then
            gestaltd provider release --version "${{ steps.version.outputs.release }}" --platform linux/amd64/glibc
          else
            gestaltd provider release --version "${{ steps.version.outputs.release }}"
          fi
      - name: Package Rust musl artifact
        if: steps.plugin.outputs.has-rust-project == 'true'
        run: |
          cd "${{ inputs.plugin-dir }}"
          gestaltd provider release --version "${{ steps.version.outputs.release }}" --platform linux/amd64/musl
      - name: Package Python musl artifact
        if: steps.plugin.outputs.has-python-project == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail

          workspace="$PWD"

          docker run --rm \
            -e PAT_TOKEN \
            -e GESTALT_REPOSITORY="${GESTALT_REPOSITORY}" \
            -e GOPRIVATE="${GOPRIVATE}" \
            -e GONOSUMDB="${GONOSUMDB}" \
            -e UV_PYTHON="${UV_PYTHON}" \
            -e INPUT_PLUGIN_DIR="${{ inputs.plugin-dir }}" \
            -e INPUT_GESTALT_REF="${{ inputs.gestalt-ref }}" \
            -e INPUT_VERSION="${{ steps.version.outputs.release }}" \
            -v "${workspace}:/workspace" \
            -w /workspace \
            ghcr.io/astral-sh/uv:python3.14-alpine \
            sh -ceu '
              apk add --no-cache bash build-base ca-certificates curl git
              curl -fsSL https://go.dev/dl/go1.26.1.linux-amd64.tar.gz | tar -C /usr/local -xz

              printf "machine github.com\n  login x-access-token\n  password %s\n" "${PAT_TOKEN}" > "${HOME}/.netrc"
              chmod 600 "${HOME}/.netrc"

              git config --global url."https://github.com/".insteadOf "ssh://git@github.com/"
              git config --global url."https://github.com/".insteadOf "git@github.com:"

              chmod +x .github/scripts/checkout_gestalt_ref.sh
              mkdir -p /tmp/bin
              export PATH="/usr/local/go/bin:/tmp/bin:$PATH"
              toolchain_dir="/tmp/gestalt"
              bash .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${INPUT_GESTALT_REF}"
              (cd "$toolchain_dir/gestaltd" && go build -o /tmp/bin/gestaltd ./cmd/gestaltd)

              cd "${INPUT_PLUGIN_DIR}"
              rm -rf .venv
              uv sync
              export GESTALT_PYTHON_LINUX_AMD64="$PWD/.venv/bin/python"
              gestaltd provider release --version "${INPUT_VERSION}" --platform linux/amd64/musl
              chmod -R a+rX dist
            '
      - name: Write release checksums
        run: |
          cd "${{ inputs.plugin-dir }}/dist"
          sha256sum ./*.tar.gz > checksums.txt
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.plugin.outputs.tag }}
          PLUGIN_DIR: ${{ inputs.plugin-dir }}
          PRERELEASE: ${{ steps.plugin.outputs.prerelease }}
        run: |
          set -euo pipefail

          args=(release create "$TAG" --generate-notes)
          if [ "$PRERELEASE" = "true" ]; then
            args+=(--prerelease)
          fi
          args+=("${PLUGIN_DIR}"/dist/*)
          gh "${args[@]}"
