name: Publish Provider Snapshot

on:
  workflow_dispatch:
    inputs:
      provider-ref:
        description: Full gestalt-providers commit SHA to publish
        required: true
        type: string
      gestalt-ref:
        description: Full Gestalt commit SHA used to build gestaltd
        required: true
        type: string
      provider-dirs:
        description: Comma or newline separated provider directories
        required: true
        type: string
      dry-run:
        description: Validate and print uploads without writing to GCS
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  GESTALT_REPOSITORY: valon-technologies/gestalt
  PYTHON_ALPINE_VERSION: "3.23"

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      providers: ${{ steps.discover.outputs.providers }}
      darwin-providers: ${{ steps.discover.outputs.darwin-providers }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.provider-ref }}
      - name: Verify provider ref
        run: |
          test "$(git rev-parse HEAD)" = "${{ inputs.provider-ref }}"
      - name: Discover requested providers
        id: discover
        env:
          PROVIDER_DIRS: ${{ inputs.provider-dirs }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import pathlib
          import re
          import tomllib

          roots = {"agent", "runtime", "app", "auth", "authorization", "externalcredentials", "s3", "indexeddb", "workflow", "cache", "secrets"}
          requested = [part.strip() for part in re.split(r"[\n,]+", os.environ["PROVIDER_DIRS"]) if part.strip()]
          providers = []
          for raw in requested:
              path = pathlib.PurePosixPath(raw)
              if path.is_absolute() or ".." in path.parts or len(path.parts) < 2 or path.parts[0] not in roots:
                  raise SystemExit(f"invalid provider directory: {raw}")
              manifest = pathlib.Path(path.as_posix()) / "manifest.yaml"
              if not manifest.is_file():
                  raise SystemExit(f"{manifest} not found")
              package_json = pathlib.Path(path.as_posix()) / "package.json"
              has_typescript = False
              has_frontend = False
              if package_json.is_file():
                  data = json.loads(package_json.read_text(encoding="utf-8"))
                  has_typescript = bool((data.get("gestalt") or {}).get("provider"))
                  has_frontend = True
              pyproject = pathlib.Path(path.as_posix()) / "pyproject.toml"
              python_version = ""
              if pyproject.is_file():
                  project = tomllib.loads(pyproject.read_text(encoding="utf-8")).get("project") or {}
                  requires_python = str(project.get("requires-python") or "").strip()
                  match = re.fullmatch(r"==\s*(\d+\.\d+)\.\*", requires_python)
                  if match is None:
                      raise SystemExit(f"{pyproject}: project.requires-python must pin ==X.Y.*")
                  python_version = match.group(1)
              provider = {
                  "dir": path.as_posix(),
                  "key": path.as_posix().replace("/", "__"),
                  "root": path.parts[0],
                  "has_go": any(candidate.suffix == ".go" for candidate in pathlib.Path(path.as_posix()).glob("*.go")),
                  "has_python": pyproject.is_file(),
                  "has_rust": (pathlib.Path(path.as_posix()) / "Cargo.toml").is_file(),
                  "has_typescript": has_typescript,
                  "has_frontend": has_frontend,
                  "python_version": python_version,
              }
              providers.append(provider)
          print("providers=" + json.dumps(providers))
          # Frontend-only app packages publish generic archives. A second macOS
          # build emits the same filename as linux/amd64 and corrupts merged
          # publish artifacts.
          darwin_providers = [
              provider
              for provider in providers
              if not provider["has_frontend"]
              and (
                  provider["has_go"]
                  or provider["has_python"]
                  or provider["has_rust"]
                  or provider["has_typescript"]
              )
          ]
          print("darwin-providers=" + json.dumps(darwin_providers))
          PY

  build-gestaltd:
    needs: discover
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.provider-ref }}
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ inputs.gestalt-ref }}"
          test "$(git -C "$toolchain_dir" rev-parse HEAD)" = "${{ inputs.gestalt-ref }}"
          (cd "$toolchain_dir/gestaltd" && CGO_ENABLED=0 go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - uses: actions/upload-artifact@v4
        with:
          name: gestaltd-linux-amd64
          path: ${{ runner.temp }}/bin/gestaltd
          if-no-files-found: error

  build-linux-amd64:
    needs:
      - discover
      - build-gestaltd
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJson(needs.discover.outputs.providers) }}
    name: Build ${{ matrix.provider.dir }} linux/amd64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.provider-ref }}
      - name: Verify provider ref
        run: |
          test "$(git rev-parse HEAD)" = "${{ inputs.provider-ref }}"
      - uses: actions/setup-go@v5
        if: matrix.provider.has_go
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        if: matrix.provider.has_frontend && !matrix.provider.has_typescript
        with:
          node-version: '25'
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        if: matrix.provider.has_python
      - uses: oven-sh/setup-bun@v2
        if: matrix.provider.has_typescript
        with:
          token: ${{ github.token }}
      - uses: dtolnay/rust-toolchain@1.88.0
        if: matrix.provider.has_rust
      - name: Install Rust linux/amd64 release target
        if: matrix.provider.has_rust
        run: |
          sudo apt-get update && sudo apt-get install -y musl-tools
          rustup target add "$(uname -m)-unknown-linux-musl"
      - name: Install Python
        if: matrix.provider.has_python
        run: uv python install "${{ matrix.provider.python_version }}"
      - name: Prepare sibling Gestalt checkout for local SDK packaging
        if: matrix.provider.has_go || matrix.provider.has_python
        run: |
          set -euo pipefail
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ inputs.gestalt-ref }}"
          test "$(git -C "$toolchain_dir" rev-parse HEAD)" = "${{ inputs.gestalt-ref }}"
      - uses: actions/download-artifact@v4
        with:
          name: gestaltd-linux-amd64
          path: ${{ runner.temp }}/bin
      - name: Add gestaltd to PATH
        run: |
          chmod +x "${RUNNER_TEMP}/bin/gestaltd"
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"
      - name: Package linux/amd64 snapshot
        env:
          PROVIDER_DIR: ${{ matrix.provider.dir }}
          SNAPSHOT_VERSION: 0.0.0-snapshot.g${{ inputs.provider-ref }}
          RUNNER_TEMP: ${{ runner.temp }}
          GESTALT_SDK_HOST_DIR: ${{ github.workspace }}/../gestalt/sdk/python
        run: |
          set -euo pipefail
          rm -rf "${PROVIDER_DIR}/dist"
          if [ "${{ matrix.provider.has_typescript }}" = "true" ]; then
            (cd "$PROVIDER_DIR" && bun install --frozen-lockfile)
          fi
          if [ "${{ matrix.provider.has_frontend }}" = "true" ] && [ "${{ matrix.provider.has_typescript }}" != "true" ]; then
            (cd "$PROVIDER_DIR" && npm ci)
          fi
          if [ "${{ matrix.provider.has_python }}" = "true" ]; then
            python_image="python:${{ matrix.provider.python_version }}-alpine${{ env.PYTHON_ALPINE_VERSION }}"
            .github/scripts/package_python_docker.sh linux/amd64 "${python_image}" gestaltd GESTALT_PYTHON_LINUX_AMD64 linux/amd64 "$PROVIDER_DIR" "$SNAPSHOT_VERSION"
          else
            (cd "$PROVIDER_DIR" && gestaltd provider package --version "$SNAPSHOT_VERSION" --platform linux/amd64)
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-dist-${{ matrix.provider.key }}-linux-amd64
          path: ${{ matrix.provider.dir }}/dist/*.tar.gz
          if-no-files-found: error

  build-darwin-arm64:
    needs: discover
    if: needs.discover.outputs.darwin-providers != '[]'
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJson(needs.discover.outputs.darwin-providers) }}
    name: Build ${{ matrix.provider.dir }} darwin/arm64
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.provider-ref }}
      - name: Verify provider ref
        run: |
          test "$(git rev-parse HEAD)" = "${{ inputs.provider-ref }}"
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        if: matrix.provider.has_python
      - uses: oven-sh/setup-bun@v2
        if: matrix.provider.has_typescript
        with:
          token: ${{ github.token }}
      - name: Install Python
        if: matrix.provider.has_python
        run: uv python install "${{ matrix.provider.python_version }}"
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN"
          echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ inputs.gestalt-ref }}"
          test "$(git -C "$toolchain_dir" rev-parse HEAD)" = "${{ inputs.gestalt-ref }}"
          (cd "$toolchain_dir/gestaltd" && CGO_ENABLED=0 go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - name: Package darwin/arm64 snapshot
        env:
          PROVIDER_DIR: ${{ matrix.provider.dir }}
          SNAPSHOT_VERSION: 0.0.0-snapshot.g${{ inputs.provider-ref }}
          GESTALT_SDK_HOST_DIR: ${{ github.workspace }}/../gestalt/sdk/python
        run: |
          set -euo pipefail
          rm -rf "${PROVIDER_DIR}/dist"
          if [ "${{ matrix.provider.has_typescript }}" = "true" ]; then
            (cd "$PROVIDER_DIR" && bun install --frozen-lockfile)
          fi
          if [ "${{ matrix.provider.has_frontend }}" = "true" ] && [ "${{ matrix.provider.has_typescript }}" != "true" ]; then
            (cd "$PROVIDER_DIR" && npm ci)
          fi
          if [ "${{ matrix.provider.has_python }}" = "true" ]; then
            cd "$PROVIDER_DIR"
            uv sync --frozen --no-dev
            if [ ! -d "${GESTALT_SDK_HOST_DIR}" ]; then
              echo "GESTALT_SDK_HOST_DIR does not exist: ${GESTALT_SDK_HOST_DIR}" >&2
              exit 1
            fi
            rm -rf /tmp/gestalt-sdk
            cp -R "${GESTALT_SDK_HOST_DIR}" /tmp/gestalt-sdk
            uv pip install --python "$PWD/.venv/bin/python" --reinstall --no-deps /tmp/gestalt-sdk
            GESTALT_PYTHON_DARWIN_ARM64="$PWD/.venv/bin/python" \
              gestaltd provider package --version "$SNAPSHOT_VERSION" --platform darwin/arm64
          else
            (cd "$PROVIDER_DIR" && gestaltd provider package --version "$SNAPSHOT_VERSION" --platform darwin/arm64)
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: snapshot-dist-${{ matrix.provider.key }}-darwin-arm64
          path: ${{ matrix.provider.dir }}/dist/*.tar.gz
          if-no-files-found: error

  publish:
    needs:
      - discover
      - build-gestaltd
      - build-linux-amd64
      - build-darwin-arm64
    if: ${{ always() && !cancelled() && needs.discover.result == 'success' && needs.build-gestaltd.result == 'success' && needs.build-linux-amd64.result == 'success' && (needs.build-darwin-arm64.result == 'success' || needs.build-darwin-arm64.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJson(needs.discover.outputs.providers) }}
    name: Publish ${{ matrix.provider.dir }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.provider-ref }}
      - name: Verify provider ref
        run: |
          test "$(git rev-parse HEAD)" = "${{ inputs.provider-ref }}"
      - uses: actions/download-artifact@v4
        with:
          name: gestaltd-linux-amd64
          path: ${{ runner.temp }}/bin
      - name: Add gestaltd to PATH
        run: |
          chmod +x "${RUNNER_TEMP}/bin/gestaltd"
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"
      - uses: actions/download-artifact@v4
        with:
          pattern: snapshot-dist-${{ matrix.provider.key }}-*
          path: ${{ matrix.provider.dir }}/dist
          merge-multiple: true
      - uses: google-github-actions/auth@v2
        if: ${{ !inputs.dry-run }}
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@v2
        if: ${{ !inputs.dry-run }}
      - name: Publish snapshot
        env:
          DRY_RUN: ${{ inputs.dry-run }}
          PROVIDER_DIR: ${{ matrix.provider.dir }}
          SNAPSHOT_VERSION: 0.0.0-snapshot.g${{ inputs.provider-ref }}
        run: |
          set -euo pipefail
          manifest="${PROVIDER_DIR}/manifest.yaml"
          if [ ! -f "$manifest" ]; then
            manifest="${PROVIDER_DIR}/manifest.json"
          fi
          publish_args=(
            --config .github/provider-snapshot-publish.yaml
            --repo valon
            --manifest "$manifest"
            --version "$SNAPSHOT_VERSION"
            --ref "${{ inputs.provider-ref }}"
            --dist-dir "${PROVIDER_DIR}/dist"
          )
          if [ "$DRY_RUN" = "true" ]; then
            publish_args+=(--dry-run --format json)
          fi

          gestaltd provider publish "${publish_args[@]}"
