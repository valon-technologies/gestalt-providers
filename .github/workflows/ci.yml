name: Validate Plugins

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.gitignore'
      - 'README.md'
      - '*/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.gitignore'
      - 'README.md'
      - '*/**'

permissions:
  contents: read

env:
  GESTALT_REPOSITORY: valon-technologies/gestalt
  GESTALT_REF: 89cf7dceca1804a340fe14f066337c2518236f55
  VALIDATION_VERSION: 0.0.1-alpha.1
  GOPRIVATE: github.com/valon-technologies/*
  GONOSUMDB: github.com/valon-technologies/*
  UV_PYTHON: "3.14"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install Python
        run: uv python install 3.14
      - name: Configure private Gestalt repository access
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ -z "${PAT_TOKEN}" ]; then
            echo "PAT_TOKEN secret is required to fetch private Gestalt dependencies"
            exit 1
          fi
          git config --global url."https://x-access-token:${PAT_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${PAT_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"
          git config --global url."https://x-access-token:${PAT_TOKEN}@github.com/".insteadOf "git@github.com:"
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN"
          echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${RUNNER_TEMP}/gestalt"
          if [ -z "${PAT_TOKEN}" ]; then
            echo "PAT_TOKEN secret is required to fetch private Gestalt dependencies"
            exit 1
          fi
          toolchain_url="https://x-access-token:${PAT_TOKEN}@github.com/${GESTALT_REPOSITORY}.git"
          git clone "$toolchain_url" "$toolchain_dir"
          git -C "$toolchain_dir" fetch --depth 1 origin "${GESTALT_REF}"
          git -C "$toolchain_dir" checkout FETCH_HEAD
          (cd "$toolchain_dir/gestaltd" && go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - name: Validate every plugin
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/dist
        run: |
          set -euo pipefail
          mkdir -p "$OUTPUT_ROOT"

          while IFS= read -r plugin_manifest; do
            plugin_dir="$(dirname "$plugin_manifest")"
            plugin_name="$(basename "$plugin_dir")"
            echo "::group::${plugin_name}"

            if [ -f "${plugin_dir}/go.mod" ]; then
              (cd "$plugin_dir" && go test ./...)
            fi

            if [ -f "${plugin_dir}/pyproject.toml" ]; then
              if [ "$plugin_name" = "bigquery" ]; then
                (cd "$plugin_dir" && uv sync --group dev)
                (cd "$plugin_dir" && uv run --no-sync --group dev ty check .)
                (cd "$plugin_dir" && uv run --no-sync --group dev vulture provider.py --ignore-names type,job_complete)
              else
                (cd "$plugin_dir" && uv sync)
              fi
            fi

            rm -rf "${OUTPUT_ROOT:?}/${plugin_name}"
            mkdir -p "${OUTPUT_ROOT}/${plugin_name}"
            (cd "$plugin_dir" && gestaltd plugin release --version "${VALIDATION_VERSION}" --output "${OUTPUT_ROOT}/${plugin_name}")

            if ! find "${OUTPUT_ROOT}/${plugin_name}" -mindepth 1 -maxdepth 1 -type f | grep -q .; then
              echo "ERROR: ${plugin_name} produced no packaged artifacts"
              exit 1
            fi

            echo "::endgroup::"
          done < <(find . -mindepth 2 -maxdepth 2 -name plugin.yaml | sort)
