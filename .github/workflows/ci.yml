name: Validate Plugins

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/scripts/**'
      - 'registry/**'
      - 'agent/**'
      - 'runtime/**'
      - 'apps/**'
      - 'auth/**'
      - 'authorization/**'
      - 'externalcredentials/**'
      - 's3/**'
      - 'indexeddb/**'
      - 'workflow/**'
      - 'cache/**'
      - 'secrets/**'
      - 'ui/**'
      - 'provider-index.yaml'
      - 'registry/catalog.json'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/scripts/**'
      - 'registry/**'
      - 'agent/**'
      - 'runtime/**'
      - 'apps/**'
      - 'auth/**'
      - 'authorization/**'
      - 'externalcredentials/**'
      - 's3/**'
      - 'indexeddb/**'
      - 'workflow/**'
      - 'cache/**'
      - 'secrets/**'
      - 'ui/**'
      - 'provider-index.yaml'
      - 'registry/catalog.json'

permissions:
  contents: read

env:
  GESTALT_REPOSITORY: valon-technologies/gestalt
  GESTALT_REF: main
  VALIDATION_VERSION: 0.0.1-alpha.1

jobs:
  validate-provider-index:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install registry tooling dependencies
        run: python3 -m pip install -r .github/scripts/provider_registry_requirements.txt
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN"
          echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "$GESTALT_REF"
          (cd "$toolchain_dir/gestaltd" && go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - name: Validate provider registry files
        run: python3 .github/scripts/generate_provider_index.py --check
      - name: Validate provider registry CLI contract
        run: python3 .github/scripts/validate_provider_registry_contract.py

  discover:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.discover.outputs.apps }}
      count: ${{ steps.discover.outputs.count }}
      scope: ${{ steps.discover.outputs.scope }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Discover apps to validate
        id: discover
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          discovery_output="$(python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          repo = Path(".")
          package_roots = ("agent", "runtime", "apps", "auth", "authorization", "externalcredentials", "s3", "indexeddb", "workflow", "cache", "secrets")
          all_apps = []
          for root_name in package_roots:
              root = repo / root_name
              if not root.is_dir():
                  continue
              for path in sorted(root.glob("*/manifest.yaml")):
                  package_dir = path.parent
                  has_go = any(candidate.suffix == ".go" for candidate in package_dir.glob("*.go"))
                  has_typescript = False
                  package_json = package_dir / "package.json"
                  if package_json.is_file():
                      try:
                          package_data = json.loads(package_json.read_text(encoding="utf-8"))
                      except json.JSONDecodeError:
                          package_data = {}
                      provider = (package_data.get("gestalt") or {}).get("provider")
                      has_typescript = bool(provider)
                  all_apps.append(
                      {
                          "dir": str(package_dir.as_posix()),
                          "name": f"{root_name}/{package_dir.name}",
                          "root": root_name,
                          "has_go": has_go,
                          "has_python": (package_dir / "pyproject.toml").is_file(),
                          "has_rust": (package_dir / "Cargo.toml").is_file(),
                          "has_typescript": has_typescript,
                      }
                  )
          packages_by_root = {}
          for app in all_apps:
              packages_by_root.setdefault(app["root"], set()).add(app["dir"])
          shared_prefixes = (".github/scripts/",)

          event_name = os.environ["EVENT_NAME"]
          run_all = event_name != "pull_request"
          selected = set()

          if event_name == "pull_request":
              base = os.environ["PR_BASE_SHA"]
              head = os.environ["PR_HEAD_SHA"]
              changed_files = subprocess.check_output(
                  ["git", "diff", "--name-only", f"{base}..{head}"],
                  text=True,
              ).splitlines()

              for path in changed_files:
                  if not path:
                      continue
                  if path.startswith(shared_prefixes):
                      run_all = True
                      break
                  parts = Path(path).parts
                  if len(parts) >= 2 and parts[0] == "indexeddb":
                      if parts[1] == "contracttest":
                          run_all = True
                          break
                      if parts[1] == "internal":
                          selected.update(packages_by_root.get("indexeddb", set()))
                          selected.update(packages_by_root.get("externalcredentials", set()))
                          continue
                      if parts[1] == "relationaldb":
                          selected.update(packages_by_root.get("externalcredentials", set()))
                  if len(parts) >= 2 and parts[0] == "cache":
                      if parts[1] == "internal":
                          selected.update(packages_by_root.get("cache", set()))
                          continue
                      if len(parts) == 2:
                          selected.update(packages_by_root.get("cache", set()))
                          continue
                  if len(parts) >= 3 and parts[0] in package_roots:
                      package_dir = Path(parts[0]) / parts[1]
                      if (repo / package_dir / "manifest.yaml").is_file():
                          selected.add(package_dir.as_posix())

          if run_all:
              apps = all_apps
          else:
              apps = [app for app in all_apps if app["dir"] in selected]

          print(
              json.dumps(
                  {
                      "apps": apps,
                      "count": len(apps),
                      "scope": "all" if run_all else "changed",
                  }
              )
          )
          PY
          )"

          apps_json="$(python3 -c 'import json,sys; print(json.dumps(json.loads(sys.stdin.read())["apps"]))' <<<"$discovery_output")"
          count="$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["count"])' <<<"$discovery_output")"
          scope="$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["scope"])' <<<"$discovery_output")"

          {
            echo "apps<<EOF"
            echo "$apps_json"
            echo "EOF"
            echo "count=$count"
            echo "scope=$scope"
          } >> "$GITHUB_OUTPUT"

          echo "validation scope: $scope"
          echo "app count: $count"
          echo "apps: $apps_json"

  build-gestaltd:
    needs: discover
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN"
          echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "$GESTALT_REF"
          (cd "$toolchain_dir/gestaltd" && go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - uses: actions/upload-artifact@v4
        with:
          name: gestaltd
          path: ${{ runner.temp }}/bin/gestaltd
          if-no-files-found: error

  validate:
    needs:
      - discover
      - build-gestaltd
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        app: ${{ fromJson(needs.discover.outputs.apps) }}
    name: Validate ${{ matrix.app.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        if: matrix.app.has_python
      - uses: dtolnay/rust-toolchain@1.88.0
        if: matrix.app.has_rust
      - name: Install Rust release target
        if: matrix.app.has_rust
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add "$(uname -m)-unknown-linux-musl"
      - uses: actions/setup-go@v5
        if: matrix.app.has_go
        with:
          go-version: '1.26'
      - uses: oven-sh/setup-bun@v2
        if: matrix.app.has_typescript
      - name: Install Python
        if: matrix.app.has_python
        run: uv python install 3.13 3.14
      - name: Prepare sibling Gestalt checkout for local SDK validation
        if: matrix.app.has_go || matrix.app.has_python || matrix.app.has_typescript
        run: |
          set -euo pipefail
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "$GESTALT_REF"
          echo "GESTALT_CHECKOUT=$toolchain_dir" >> "$GITHUB_ENV"
          echo "GESTALT_TYPESCRIPT_SDK_DIR=$toolchain_dir/sdk/typescript" >> "$GITHUB_ENV"
      - uses: actions/download-artifact@v4
        with:
          name: gestaltd
          path: ${{ runner.temp }}/bin
      - name: Add gestaltd to PATH
        run: |
          chmod +x "${RUNNER_TEMP}/bin/gestaltd"
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"
      - name: Validate app
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/dist
        run: |
          set -euo pipefail
          app_dir="${{ matrix.app.dir }}"
          app_name="${{ matrix.app.name }}"

          mkdir -p "$OUTPUT_ROOT"

          if [ "${{ matrix.app.has_go }}" = "true" ]; then
            case "$app_dir" in
              indexeddb/*)
                . .github/scripts/setup_go_indexeddb_test_env.sh "$app_dir"
                ;;
            esac
            case "$app_dir" in
              cache/*)
                . .github/scripts/setup_go_cache_test_env.sh "$app_dir"
                ;;
            esac
            (cd "$app_dir" && go test ./...)
          fi

          if [ "${{ matrix.app.has_rust }}" = "true" ]; then
            . .github/scripts/setup_rust_datastore_test_env.sh "$app_dir"
            (cd "$app_dir" && cargo test)
          fi

          if [ -f "${app_dir}/pyproject.toml" ]; then
            python3 .github/scripts/validate_python_app.py "$app_dir"
          fi

          if [ "${{ matrix.app.has_typescript }}" = "true" ]; then
            (cd "${GESTALT_CHECKOUT}/sdk/typescript" && bun install --frozen-lockfile)
            (cd "$app_dir" && bun install --frozen-lockfile)
            rm -rf "${app_dir}/node_modules/@valon-technologies/gestalt"
            mkdir -p "${app_dir}/node_modules/@valon-technologies"
            ln -s "${GESTALT_CHECKOUT}/sdk/typescript" "${app_dir}/node_modules/@valon-technologies/gestalt"
            (cd "$app_dir" && bun run check)
          fi

          rm -rf "${OUTPUT_ROOT:?}/${app_name}"
          mkdir -p "${OUTPUT_ROOT}/${app_name}"
          (cd "$app_dir" && gestaltd provider package --version "${VALIDATION_VERSION}" --output "${OUTPUT_ROOT}/${app_name}")
          gestaltd provider release --dist-dir "${OUTPUT_ROOT}/${app_name}" --version "${VALIDATION_VERSION}"

          if [ ! -f "${OUTPUT_ROOT}/${app_name}/provider-release.yaml" ]; then
            echo "ERROR: ${app_name} did not produce provider-release.yaml"
            exit 1
          fi

          python3 .github/scripts/write_provider_release_metadata.py \
            --manifest "${app_dir}/manifest.yaml" \
            --output-dir "${OUTPUT_ROOT}/${app_name}" \
            --version "${VALIDATION_VERSION}" \
            --metadata-path "${OUTPUT_ROOT}/${app_name}/provider-release.generated.yaml"

          if ! find "${OUTPUT_ROOT}/${app_name}" -mindepth 1 -maxdepth 1 -type f | grep -q .; then
            echo "ERROR: ${app_name} produced no packaged artifacts"
            exit 1
          fi
          if [ ! -f "${OUTPUT_ROOT}/${app_name}/provider-release.generated.yaml" ]; then
            echo "ERROR: ${app_name} did not regenerate provider-release metadata"
            exit 1
          fi

  ui-lint:
    name: UI Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ui/default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/default/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  ui-tests:
    name: UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ui/default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/default/package-lock.json
      - run: npm ci && npm run build
      - run: npx playwright install chromium --with-deps
      - name: Run UI tests (mock specs only)
        run: npx playwright test mock
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: ui-playwright-report
          path: ui/default/playwright-report/
          retention-days: 7

  ui-e2e:
    name: UI E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build gestaltd and UI
        run: |
          set -euo pipefail
          gestalt_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$gestalt_dir" "$GESTALT_REF"

          # Build UI from this repo
          (cd ui/default && npm ci && npm run build)

          # Fix IndexedDB provider SDK replace path
          sed -i "s|../../../gestalt/sdk/go|$gestalt_dir/sdk/go|" indexeddb/relationaldb/go.mod

          # Build gestaltd
          mkdir -p "${GITHUB_WORKSPACE}/../bin"
          (cd "$gestalt_dir/gestaltd" && go build -o "${GITHUB_WORKSPACE}/../bin/gestaltd" ./cmd/gestaltd)

          # Package local providers as release metadata to avoid local-source fingerprint churn
          mkdir -p "${RUNNER_TEMP}/ui-default-release" "${RUNNER_TEMP}/indexeddb-relationaldb-release" "${RUNNER_TEMP}/external-credentials-default-release"
          (cd ui/default && "${GITHUB_WORKSPACE}/../bin/gestaltd" provider package --version "${VALIDATION_VERSION}" --output "${RUNNER_TEMP}/ui-default-release")
          "${GITHUB_WORKSPACE}/../bin/gestaltd" provider release --dist-dir "${RUNNER_TEMP}/ui-default-release" --version "${VALIDATION_VERSION}"
          (cd indexeddb/relationaldb && "${GITHUB_WORKSPACE}/../bin/gestaltd" provider package --version "${VALIDATION_VERSION}" --output "${RUNNER_TEMP}/indexeddb-relationaldb-release")
          "${GITHUB_WORKSPACE}/../bin/gestaltd" provider release --dist-dir "${RUNNER_TEMP}/indexeddb-relationaldb-release" --version "${VALIDATION_VERSION}"
          (cd externalcredentials/default && "${GITHUB_WORKSPACE}/../bin/gestaltd" provider package --version "${VALIDATION_VERSION}" --output "${RUNNER_TEMP}/external-credentials-default-release")
          "${GITHUB_WORKSPACE}/../bin/gestaltd" provider release --dist-dir "${RUNNER_TEMP}/external-credentials-default-release" --version "${VALIDATION_VERSION}"

          cat >"${RUNNER_TEMP}/gestaltd-web-e2e.yaml" <<EOF
          apiVersion: gestaltd.config/v6
          server:
            public:
              port: 8080
            artifactsDir: "${RUNNER_TEMP}/prepared-artifacts"
            encryptionKey: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
            providers:
              secrets: secrets
              indexeddb: main
              externalCredentials: default
          providers:
            indexeddb:
              main:
                source: "${RUNNER_TEMP}/indexeddb-relationaldb-release/provider-release.yaml"
                config:
                  dsn: "sqlite://${RUNNER_TEMP}/gestalt-web-e2e.db"
            ui:
              default:
                path: /
                source: "${RUNNER_TEMP}/ui-default-release/provider-release.yaml"
            externalCredentials:
              default:
                source: "${RUNNER_TEMP}/external-credentials-default-release/provider-release.yaml"
                config:
                  encryptionKey: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
            secrets:
              secrets:
                source: env
          EOF
          echo "GESTALTD_CONFIG=${RUNNER_TEMP}/gestaltd-web-e2e.yaml" >>"${GITHUB_ENV}"
      - name: Start gestaltd
        run: |
          mkdir -p "${RUNNER_TEMP}/prepared-artifacts"
          "${GITHUB_WORKSPACE}/../bin/gestaltd" lock --config "${GESTALTD_CONFIG}"
          "${GITHUB_WORKSPACE}/../bin/gestaltd" sync --locked --config "${GESTALTD_CONFIG}" --artifacts-dir "${RUNNER_TEMP}/prepared-artifacts"
          "${GITHUB_WORKSPACE}/../bin/gestaltd" serve --locked --config "${GESTALTD_CONFIG}" --artifacts-dir "${RUNNER_TEMP}/prepared-artifacts" >/tmp/gestaltd.log 2>&1 &
          for _ in $(seq 1 120); do
            if curl -sf http://localhost:8080/health; then break; fi
            sleep 0.5
          done
          if ! curl -sf http://localhost:8080/health; then
            echo "::error::gestaltd did not become ready"
            cat /tmp/gestaltd.log
            exit 1
          fi
      - name: Run E2E tests
        working-directory: ui/default
        env:
          GESTALT_BASE_URL: http://localhost:8080
        run: |
          npm ci
          npx playwright install chromium --with-deps
          npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: ui-e2e-playwright-report
          path: ui/default/playwright-report/
          retention-days: 7
