name: Validate Plugins

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/scripts/**'
      - 'plugins/**'
      - 'auth/**'
      - 'files/**'
      - 'indexeddb/**'
      - 'secrets/**'
      - 'web/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - '.github/scripts/**'
      - 'plugins/**'
      - 'auth/**'
      - 'files/**'
      - 'indexeddb/**'
      - 'secrets/**'
      - 'web/**'

permissions:
  contents: read

env:
  GESTALT_REPOSITORY: valon-technologies/gestalt
  LEGACY_GESTALT_REF: gestaltd/v0.0.1-alpha.7
  PROVIDER_GESTALT_REF: gestaltd/v0.0.1-alpha.7
  FILES_GESTALT_REF: codex/fileapi-provider
  VALIDATION_VERSION: 0.0.1-alpha.1
  GOPRIVATE: github.com/valon-technologies/*
  GONOSUMDB: github.com/valon-technologies/*
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  UV_PYTHON: "3.14"

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      plugins: ${{ steps.discover.outputs.plugins }}
      count: ${{ steps.discover.outputs.count }}
      scope: ${{ steps.discover.outputs.scope }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Discover plugins to validate
        id: discover
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          discovery_output="$(python3 - <<'PY'
          import json
          import os
          import subprocess
          from pathlib import Path

          repo = Path(".")
          package_roots = ("plugins", "auth", "files", "indexeddb", "secrets")
          gestalt_ref_by_root = {
              "plugins": os.environ["LEGACY_GESTALT_REF"],
              "auth": os.environ["PROVIDER_GESTALT_REF"],
              "files": os.environ["FILES_GESTALT_REF"],
              "indexeddb": os.environ["PROVIDER_GESTALT_REF"],
              "secrets": os.environ["PROVIDER_GESTALT_REF"],
          }
          toolchain_by_root = {
              "plugins": "legacy",
              "auth": "provider",
              "files": "provider",
              "indexeddb": "provider",
              "secrets": "provider",
          }
          all_plugins = []
          for root_name in package_roots:
              root = repo / root_name
              if not root.is_dir():
                  continue
              for path in sorted(root.glob("*/manifest.yaml")):
                  package_dir = path.parent
                  has_go = any(candidate.suffix == ".go" for candidate in package_dir.glob("*.go"))
                  all_plugins.append(
                      {
                          "dir": str(package_dir.as_posix()),
                          "name": f"{root_name}/{package_dir.name}",
                          "root": root_name,
                          "has_go": has_go,
                          "has_python": (package_dir / "pyproject.toml").is_file(),
                          "has_rust": (package_dir / "Cargo.toml").is_file(),
                          "gestalt_ref": gestalt_ref_by_root[root_name],
                          "gestaltd_artifact": f"gestaltd-{toolchain_by_root[root_name]}",
                      }
                  )
          indexeddb_packages = {
              plugin["dir"]
              for plugin in all_plugins
              if plugin["root"] == "indexeddb"
          }
          shared_prefixes = (".github/workflows/", ".github/scripts/")

          event_name = os.environ["EVENT_NAME"]
          run_all = event_name != "pull_request"
          selected = set()

          if event_name == "pull_request":
              base = os.environ["PR_BASE_SHA"]
              head = os.environ["PR_HEAD_SHA"]
              changed_files = subprocess.check_output(
                  ["git", "diff", "--name-only", f"{base}..{head}"],
                  text=True,
              ).splitlines()

              for path in changed_files:
                  if not path:
                      continue
                  if path.startswith(shared_prefixes):
                      run_all = True
                      break
                  parts = Path(path).parts
                  if len(parts) >= 2 and parts[0] == "indexeddb":
                      if parts[1] == "contracttest":
                          run_all = True
                          break
                      if parts[1] == "internal":
                          selected.update(indexeddb_packages)
                          continue
                  if len(parts) >= 3 and parts[0] in package_roots:
                      package_dir = Path(parts[0]) / parts[1]
                      if (repo / package_dir / "manifest.yaml").is_file():
                          selected.add(package_dir.as_posix())

          if run_all:
              plugins = all_plugins
          else:
              plugins = [plugin for plugin in all_plugins if plugin["dir"] in selected]

          print(
              json.dumps(
                  {
                      "plugins": plugins,
                      "count": len(plugins),
                      "scope": "all" if run_all else "changed",
                  }
              )
          )
          PY
          )"

          plugins_json="$(python3 -c 'import json,sys; print(json.dumps(json.loads(sys.stdin.read())["plugins"]))' <<<"$discovery_output")"
          count="$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["count"])' <<<"$discovery_output")"
          scope="$(python3 -c 'import json,sys; print(json.loads(sys.stdin.read())["scope"])' <<<"$discovery_output")"

          {
            echo "plugins<<EOF"
            echo "$plugins_json"
            echo "EOF"
            echo "count=$count"
            echo "scope=$scope"
          } >> "$GITHUB_OUTPUT"

          echo "validation scope: $scope"
          echo "plugin count: $count"
          echo "plugins: $plugins_json"

  build-gestaltd:
    needs: discover
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        toolchain:
          - name: legacy
            gestalt_ref: gestaltd/v0.0.1-alpha.7
          - name: provider
            gestalt_ref: gestaltd/v0.0.1-alpha.7
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Configure private Gestalt repository access
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          .github/scripts/configure_private_github.sh
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN"
          echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ matrix.toolchain.gestalt_ref }}"
          (cd "$toolchain_dir/gestaltd" && go build -o "$GOBIN/gestaltd-${{ matrix.toolchain.name }}" ./cmd/gestaltd)
      - uses: actions/upload-artifact@v4
        with:
          name: gestaltd-${{ matrix.toolchain.name }}
          path: ${{ runner.temp }}/bin/gestaltd-${{ matrix.toolchain.name }}
          if-no-files-found: error

  validate:
    needs:
      - discover
      - build-gestaltd
    if: needs.discover.outputs.count != '0'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        plugin: ${{ fromJson(needs.discover.outputs.plugins) }}
    name: Validate ${{ matrix.plugin.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        if: matrix.plugin.has_python
      - uses: dtolnay/rust-toolchain@1.88.0
        if: matrix.plugin.has_rust
      - uses: actions/setup-go@v5
        if: matrix.plugin.has_go
        with:
          go-version: '1.26'
      - name: Install Python
        if: matrix.plugin.has_python
        run: uv python install 3.14
      - name: Configure private Gestalt repository access
        if: matrix.plugin.has_go || matrix.plugin.has_python || matrix.plugin.has_rust
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          .github/scripts/configure_private_github.sh
      - name: Prepare sibling Gestalt checkout for local Go replaces
        if: matrix.plugin.has_go
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ matrix.plugin.gestalt_ref }}"
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.plugin.gestaltd_artifact }}
          path: ${{ runner.temp }}/bin
      - name: Add gestaltd to PATH
        run: |
          mv "${RUNNER_TEMP}/bin/${{ matrix.plugin.gestaltd_artifact }}" "${RUNNER_TEMP}/bin/gestaltd"
          chmod +x "${RUNNER_TEMP}/bin/gestaltd"
          echo "${RUNNER_TEMP}/bin" >> "$GITHUB_PATH"
      - name: Validate plugin
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/dist
        run: |
          set -euo pipefail
          plugin_dir="${{ matrix.plugin.dir }}"
          plugin_name="${{ matrix.plugin.name }}"

          mkdir -p "$OUTPUT_ROOT"

          if [ "${{ matrix.plugin.has_go }}" = "true" ]; then
            . .github/scripts/setup_go_indexeddb_test_env.sh "$plugin_dir"
            (cd "$plugin_dir" && go test ./...)
          fi

          if [ "${{ matrix.plugin.has_rust }}" = "true" ]; then
            . .github/scripts/setup_rust_datastore_test_env.sh "$plugin_dir"
            (cd "$plugin_dir" && cargo test)
          fi

          if [ -f "${plugin_dir}/pyproject.toml" ]; then
            python3 .github/scripts/validate_python_plugin.py "$plugin_dir"
          fi

          rm -rf "${OUTPUT_ROOT:?}/${plugin_name}"
          mkdir -p "${OUTPUT_ROOT}/${plugin_name}"
          (cd "$plugin_dir" && gestaltd provider release --version "${VALIDATION_VERSION}" --output "${OUTPUT_ROOT}/${plugin_name}")

          if ! find "${OUTPUT_ROOT}/${plugin_name}" -mindepth 1 -maxdepth 1 -type f | grep -q .; then
            echo "ERROR: ${plugin_name} produced no packaged artifacts"
            exit 1
          fi

  web-lint:
    name: Web UI Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web/default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/default/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  web-ui-tests:
    name: Web UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web/default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/default/package-lock.json
      - run: npm ci && npm run build
      - run: npx playwright install chromium --with-deps
      - name: Run UI tests (mock specs only)
        run: npx playwright test mock
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: web-ui-playwright-report
          path: web/default/playwright-report/
          retention-days: 7

  web-e2e:
    name: Web E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Configure private Gestalt repository access
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: .github/scripts/configure_private_github.sh
      - name: Build gestaltd and UI
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          gestalt_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$gestalt_dir" "main"

          # Build UI from this repo
          (cd web/default && npm ci && npm run build)

          # Fix IndexedDB provider SDK replace path
          sed -i "s|../../../gestalt/sdk/go|$gestalt_dir/sdk/go|" indexeddb/relationaldb/go.mod

          # Build gestaltd
          mkdir -p "${GITHUB_WORKSPACE}/../bin"
          (cd "$gestalt_dir/gestaltd" && go build -o "${GITHUB_WORKSPACE}/../bin/gestaltd" ./cmd/gestaltd)

          cat >"${RUNNER_TEMP}/gestaltd-web-e2e.yaml" <<EOF
          server:
            public:
              port: 8080
            encryptionKey: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
            indexeddb: main
          providers:
            indexeddbs:
              main:
                source:
                  path: "${GITHUB_WORKSPACE}/indexeddb/relationaldb/manifest.yaml"
                config:
                  dsn: "sqlite://${RUNNER_TEMP}/gestalt-web-e2e.db"
            ui:
              default:
                path: /
                source:
                  path: "${GITHUB_WORKSPACE}/web/default/manifest.yaml"
            secrets:
              source: env
          EOF
          echo "GESTALTD_CONFIG=${RUNNER_TEMP}/gestaltd-web-e2e.yaml" >>"${GITHUB_ENV}"
      - name: Start gestaltd
        run: |
          ${GITHUB_WORKSPACE}/../bin/gestaltd serve --config "${GESTALTD_CONFIG}" >/tmp/gestaltd.log 2>&1 &
          for i in $(seq 1 120); do
            if curl -sf http://localhost:8080/health; then break; fi
            sleep 0.5
          done
          if ! curl -sf http://localhost:8080/health; then
            echo "::error::gestaltd did not become ready"
            cat /tmp/gestaltd.log
            exit 1
          fi
      - name: Run E2E tests
        working-directory: web/default
        env:
          GESTALT_BASE_URL: http://localhost:8080
        run: |
          npm ci
          npx playwright install chromium --with-deps
          npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: web-e2e-playwright-report
          path: web/default/playwright-report/
          retention-days: 7
