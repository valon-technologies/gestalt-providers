name: Validate Providers

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
  push:
    branches:
      - main
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  VALIDATION_VERSION: 0.0.1-alpha.1

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      plugins: ${{ steps.discover.outputs.plugins }}
      count: ${{ steps.discover.outputs.count }}
      scope: ${{ steps.discover.outputs.scope }}
      run_validate: ${{ steps.discover.outputs.run_validate }}
      run_ui_lint: ${{ steps.discover.outputs.run_ui_lint }}
      run_ui_tests: ${{ steps.discover.outputs.run_ui_tests }}
      run_ui_e2e: ${{ steps.discover.outputs.run_ui_e2e }}
      run_integration: ${{ steps.discover.outputs.run_integration }}
      gestaltd_version: ${{ steps.pin.outputs.gestaltd }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read pinned versions
        id: pin
        run: |
          # shellcheck disable=SC1091
          source .gestalt-sdk-version
          echo "gestaltd=${GESTALTD}" >> "$GITHUB_OUTPUT"
      - name: Discover providers to validate
        id: discover
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          python3 .github/scripts/discover_changed_providers.py \
            --event-name "$EVENT_NAME" \
            --base-sha "${PR_BASE_SHA:-}" \
            --head-sha "${PR_HEAD_SHA:-}" \
            --repo-root .

  validate:
    needs: discover
    if: needs.discover.outputs.run_validate == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        plugin: ${{ fromJson(needs.discover.outputs.plugins) }}
    name: Validate provider ${{ matrix.plugin.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        if: matrix.plugin.has_python
      - uses: dtolnay/rust-toolchain@1.88.0
        if: matrix.plugin.has_rust
      - uses: actions/setup-go@v5
        if: matrix.plugin.has_go
        with:
          go-version: '1.26'
      - name: Install Python
        if: matrix.plugin.has_python
        run: uv python install 3.13 3.14
      - name: Prepare sibling Gestalt checkout (legacy holdouts only)
        if: matrix.plugin.needs_sibling_gestalt
        run: |
          set -euo pipefail
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "main"
      - uses: ./.github/actions/setup-gestaltd
        with:
          version: ${{ needs.discover.outputs.gestaltd_version }}
          github-token: ${{ secrets.GH_RELEASE_DOWNLOAD_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Validate provider
        env:
          OUTPUT_ROOT: ${{ runner.temp }}/dist
        run: |
          set -euo pipefail
          plugin_dir="${{ matrix.plugin.dir }}"
          plugin_name="${{ matrix.plugin.name }}"

          mkdir -p "$OUTPUT_ROOT"

          if [ "${{ matrix.plugin.has_go }}" = "true" ]; then
            case "$plugin_dir" in
              indexeddb/relationaldb) . .github/scripts/setup_test_env.sh postgres mysql sqlserver ;;
              indexeddb/mongodb)      . .github/scripts/setup_test_env.sh mongodb ;;
              indexeddb/dynamodb)     . .github/scripts/setup_test_env.sh dynamodb ;;
              cache/valkey)           . .github/scripts/setup_test_env.sh valkey ;;
            esac
            (cd "$plugin_dir" && go test ./...)
          fi

          if [ "${{ matrix.plugin.has_rust }}" = "true" ]; then
            (cd "$plugin_dir" && cargo test)
          fi

          if [ -f "${plugin_dir}/pyproject.toml" ]; then
            python3 .github/scripts/validate_python_plugin.py "$plugin_dir"
          fi

          rm -rf "${OUTPUT_ROOT:?}/${plugin_name}"
          mkdir -p "${OUTPUT_ROOT}/${plugin_name}"
          (cd "$plugin_dir" && gestaltd provider release --version "${VALIDATION_VERSION}" --output "${OUTPUT_ROOT}/${plugin_name}")

          if [ ! -f "${OUTPUT_ROOT}/${plugin_name}/provider-release.yaml" ]; then
            echo "ERROR: ${plugin_name} did not produce provider-release.yaml"
            exit 1
          fi

          python3 .github/scripts/write_provider_release_metadata.py \
            --manifest "${plugin_dir}/manifest.yaml" \
            --output-dir "${OUTPUT_ROOT}/${plugin_name}" \
            --version "${VALIDATION_VERSION}" \
            --metadata-path "${OUTPUT_ROOT}/${plugin_name}/provider-release.generated.yaml"

          if ! find "${OUTPUT_ROOT}/${plugin_name}" -mindepth 1 -maxdepth 1 -type f | grep -q .; then
            echo "ERROR: ${plugin_name} produced no packaged artifacts"
            exit 1
          fi
          if [ ! -f "${OUTPUT_ROOT}/${plugin_name}/provider-release.generated.yaml" ]; then
            echo "ERROR: ${plugin_name} did not regenerate provider-release metadata"
            exit 1
          fi

  integration:
    needs: discover
    if: needs.discover.outputs.run_integration == 'true'
    name: Cross-provider integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Run integration tests
        working-directory: integration
        run: go test ./...

  ui-lint:
    needs: discover
    if: needs.discover.outputs.run_ui_lint == 'true'
    name: UI Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ui/default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/default/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint

  ui-tests:
    needs: discover
    if: needs.discover.outputs.run_ui_tests == 'true'
    name: UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ui/default
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/default/package-lock.json
      - run: npm ci && npm run build
      - run: npx playwright install chromium --with-deps
      - name: Run UI tests (mock specs only)
        run: npx playwright test mock
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: ui-playwright-report
          path: ui/default/playwright-report/
          retention-days: 7

  ui-e2e:
    needs: discover
    if: needs.discover.outputs.run_ui_e2e == 'true'
    name: UI E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: ./.github/actions/setup-gestaltd
        with:
          version: ${{ needs.discover.outputs.gestaltd_version }}
          github-token: ${{ secrets.GH_RELEASE_DOWNLOAD_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Build UI and package providers
        run: |
          set -euo pipefail
          (cd ui/default && npm ci && npm run build)

          mkdir -p "${RUNNER_TEMP}/ui-default-release" "${RUNNER_TEMP}/indexeddb-relationaldb-release" "${RUNNER_TEMP}/external-credentials-default-release"
          (cd ui/default && gestaltd provider release --version "${VALIDATION_VERSION}" --output "${RUNNER_TEMP}/ui-default-release")
          (cd indexeddb/relationaldb && gestaltd provider release --version "${VALIDATION_VERSION}" --output "${RUNNER_TEMP}/indexeddb-relationaldb-release")
          (cd external_credentials/default && gestaltd provider release --version "${VALIDATION_VERSION}" --output "${RUNNER_TEMP}/external-credentials-default-release")

          cat >"${RUNNER_TEMP}/gestaltd-web-e2e.yaml" <<EOF
          apiVersion: gestaltd.config/v4
          server:
            public:
              port: 8080
            artifactsDir: "${RUNNER_TEMP}/prepared-artifacts"
            encryptionKey: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
            providers:
              secrets: secrets
              indexeddb: main
              externalCredentials: default
          providers:
            indexeddb:
              main:
                source: "${RUNNER_TEMP}/indexeddb-relationaldb-release/provider-release.yaml"
                config:
                  dsn: "sqlite://${RUNNER_TEMP}/gestalt-web-e2e.db"
            ui:
              default:
                path: /
                source: "${RUNNER_TEMP}/ui-default-release/provider-release.yaml"
            externalCredentials:
              default:
                source: "${RUNNER_TEMP}/external-credentials-default-release/provider-release.yaml"
                config:
                  encryptionKey: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
            secrets:
              secrets:
                source: env
          EOF
          echo "GESTALTD_CONFIG=${RUNNER_TEMP}/gestaltd-web-e2e.yaml" >>"${GITHUB_ENV}"
      - name: Start gestaltd
        run: |
          mkdir -p "${RUNNER_TEMP}/prepared-artifacts"
          gestaltd lock --config "${GESTALTD_CONFIG}"
          gestaltd sync --locked --config "${GESTALTD_CONFIG}" --artifacts-dir "${RUNNER_TEMP}/prepared-artifacts"
          gestaltd serve --locked --config "${GESTALTD_CONFIG}" --artifacts-dir "${RUNNER_TEMP}/prepared-artifacts" >/tmp/gestaltd.log 2>&1 &
          for _ in $(seq 1 120); do
            if curl -sf http://localhost:8080/health; then break; fi
            sleep 0.5
          done
          if ! curl -sf http://localhost:8080/health; then
            echo "::error::gestaltd did not become ready"
            cat /tmp/gestaltd.log
            exit 1
          fi
      - name: Run E2E tests
        working-directory: ui/default
        env:
          GESTALT_BASE_URL: http://localhost:8080
        run: |
          npm ci
          npx playwright install chromium --with-deps
          npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: ui-e2e-playwright-report
          path: ui/default/playwright-report/
          retention-days: 7
