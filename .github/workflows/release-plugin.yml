name: Release Provider Package

on:
  push:
    tags:
      - 'agent/*/v*'
      - 'runtime/*/v*'
      - 'plugins/*/v*'
      - 'auth/*/v*'
      - 'authorization/*/v*'
      - 'external_credentials/*/v*'
      - 's3/*/v*'
      - 'indexeddb/*/v*'
      - 'workflow/*/v*'
      - 'cache/*/v*'
      - 'secrets/*/v*'
      - 'ui/*/v*'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      plugin-name: ${{ steps.parse.outputs.plugin-name }}
      plugin-dir: ${{ steps.validate.outputs.plugin-dir }}
      plugin-version: ${{ steps.parse.outputs.plugin-version }}
      is-plugin: ${{ steps.validate.outputs.is-plugin }}
      gestaltd-version: ${{ steps.validate.outputs.gestaltd-version }}
      needs-sibling-gestalt: ${{ steps.validate.outputs.needs-sibling-gestalt }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          PLUGIN_PATH="${TAG%/v*}"
          PLUGIN_NAME="${PLUGIN_PATH##*/}"
          PLUGIN_VERSION="${TAG##*/v}"
          {
            echo "plugin-name=${PLUGIN_NAME}"
            echo "plugin-version=${PLUGIN_VERSION}"
          } >> "$GITHUB_OUTPUT"
      - name: Validate plugin directory
        id: validate
        run: |
          PLUGIN_DIR="${GITHUB_REF_NAME%/v*}"
          PLUGIN_ROOT="${PLUGIN_DIR%%/*}"
          if [ "$PLUGIN_DIR" = "gestaltd" ]; then
            echo "Detected gestaltd bootstrap tag; skipping provider package release workflow."
            echo "is-plugin=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -d "$PLUGIN_DIR" ]; then
            echo "ERROR: ${PLUGIN_DIR} does not exist"
            exit 1
          fi
          if [ ! -f "${PLUGIN_DIR}/manifest.yaml" ]; then
            echo "ERROR: ${PLUGIN_DIR}/manifest.yaml not found"
            exit 1
          fi

          case "$PLUGIN_ROOT" in
            agent|runtime|plugins|auth|authorization|external_credentials|s3|indexeddb|workflow|cache|secrets|ui) ;;
            *)
              echo "ERROR: unsupported plugin root ${PLUGIN_ROOT}"
              exit 1
              ;;
          esac

          # Read pinned gestaltd version from workspace pin file.
          # shellcheck disable=SC1091
          source .gestalt-sdk-version
          if [ -z "${GESTALTD:-}" ]; then
            echo "ERROR: GESTALTD pin missing from .gestalt-sdk-version"
            exit 1
          fi

          # Detect whether this provider still uses the sibling-checkout pattern.
          NEEDS_SIBLING=false
          if [ -f "${PLUGIN_DIR}/go.mod" ] && grep -qE '^\s*replace\s+github\.com/valon-technologies/gestalt/sdk/go\s*=>' "${PLUGIN_DIR}/go.mod"; then
            NEEDS_SIBLING=true
          fi

          {
            echo "plugin-dir=${PLUGIN_DIR}"
            echo "is-plugin=true"
            echo "gestaltd-version=${GESTALTD}"
            echo "needs-sibling-gestalt=${NEEDS_SIBLING}"
          } >> "$GITHUB_OUTPUT"

  release:
    needs: prepare
    if: needs.prepare.outputs.is-plugin == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/release-plugin-reusable.yml
    secrets: inherit
    with:
      plugin-dir: ${{ needs.prepare.outputs.plugin-dir }}
      version: ${{ needs.prepare.outputs.plugin-version }}
      gestaltd-version: ${{ needs.prepare.outputs.gestaltd-version }}
      needs-sibling-gestalt: ${{ needs.prepare.outputs.needs-sibling-gestalt == 'true' }}
