name: Release Plugin

on:
  push:
    tags:
      - 'plugins/*/v*'
      - 'auth/*/v*'
      - 'datastore/*/v*'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      plugin-name: ${{ steps.parse.outputs.plugin-name }}
      plugin-dir: ${{ steps.validate.outputs.plugin-dir }}
      plugin-version: ${{ steps.parse.outputs.plugin-version }}
      is-plugin: ${{ steps.validate.outputs.is-plugin }}
      gestalt-ref: ${{ steps.validate.outputs.gestalt-ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          PLUGIN_PATH="${TAG%/v*}"
          PLUGIN_NAME="${PLUGIN_PATH##*/}"
          PLUGIN_VERSION="${TAG##*/v}"
          echo "plugin-name=${PLUGIN_NAME}" >> "$GITHUB_OUTPUT"
          echo "plugin-version=${PLUGIN_VERSION}" >> "$GITHUB_OUTPUT"
      - name: Validate plugin directory
        id: validate
        run: |
          PLUGIN_DIR="${GITHUB_REF_NAME%/v*}"
          PLUGIN_ROOT="${PLUGIN_DIR%%/*}"
          if [ "$PLUGIN_DIR" = "gestaltd" ]; then
            echo "Detected gestaltd bootstrap tag; skipping plugin release workflow."
            echo "is-plugin=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -d "$PLUGIN_DIR" ]; then
            echo "ERROR: ${PLUGIN_DIR} does not exist"
            exit 1
          fi
          if [ ! -f "${PLUGIN_DIR}/plugin.yaml" ]; then
            echo "ERROR: ${PLUGIN_DIR}/plugin.yaml not found"
            exit 1
          fi

          case "$PLUGIN_ROOT" in
            plugins)
              GESTALT_REF="df496400d6e12e754c0c8f6d97784f69198f52cf"
              ;;
            auth|datastore)
              GESTALT_REF="5e51b85c74948eaedca698d89ae1e2ac7f49aa7e"
              ;;
            *)
              echo "ERROR: unsupported plugin root ${PLUGIN_ROOT}"
              exit 1
              ;;
          esac

          echo "plugin-dir=${PLUGIN_DIR}" >> "$GITHUB_OUTPUT"
          echo "is-plugin=true" >> "$GITHUB_OUTPUT"
          echo "gestalt-ref=${GESTALT_REF}" >> "$GITHUB_OUTPUT"

  release:
    needs: prepare
    if: needs.prepare.outputs.is-plugin == 'true'
    uses: ./.github/workflows/release-plugin-reusable.yml
    secrets: inherit
    with:
      plugin-dir: ${{ needs.prepare.outputs.plugin-dir }}
      version: ${{ needs.prepare.outputs.plugin-version }}
      gestalt-ref: ${{ needs.prepare.outputs.gestalt-ref }}
