name: Codex Rerelease Python Provider Assets

on:
  workflow_dispatch:
    inputs:
      plugin-dir:
        description: Provider directory, for example plugins/slack
        required: true
        type: string
      version:
        description: Existing release version to patch
        required: true
        type: string
      gestalt-ref:
        description: Pinned Gestalt git ref used to build gestaltd
        required: true
        default: main
        type: string

permissions:
  contents: write

jobs:
  rerelease-darwin-amd64:
    runs-on: macos-15-intel
    timeout-minutes: 30
    env:
      GESTALT_REPOSITORY: valon-technologies/gestalt
      GOPRIVATE: github.com/valon-technologies/*
      GONOSUMDB: github.com/valon-technologies/*
      UV_PYTHON: "3.14"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare tagged provider source
        id: source
        run: |
          set -euo pipefail
          tag="${{ inputs.plugin-dir }}/v${{ inputs.version }}"
          git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"
          source_root="${RUNNER_TEMP}/provider-source"
          rm -rf "${source_root}"
          mkdir -p "${source_root}"
          git archive "${tag}" "${{ inputs.plugin-dir }}" | tar -x -C "${source_root}"
          source_dir="${source_root}/${{ inputs.plugin-dir }}"
          if [ ! -f "${source_dir}/manifest.yaml" ]; then
            echo "missing manifest for ${tag}" >&2
            exit 1
          fi
          if [ ! -f "${source_dir}/pyproject.toml" ]; then
            echo "${tag} is not a Python provider" >&2
            exit 1
          fi
          {
            echo "dir=${source_dir}"
            echo "tag=${tag}"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Install Python
        run: uv python install 3.14
      - name: Configure private Gestalt repository access
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: .github/scripts/configure_private_github.sh
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN" && echo "$GOBIN" >> "$GITHUB_PATH"
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "${{ inputs.gestalt-ref }}"
          (cd "$toolchain_dir/gestaltd" && CGO_ENABLED=0 go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - name: Build darwin/amd64 archive
        run: |
          set -euo pipefail
          cd "${{ steps.source.outputs.dir }}"
          rm -rf dist .venv
          uv sync
          GESTALT_PYTHON_DARWIN_AMD64="$PWD/.venv/bin/python" \
            gestaltd provider release --version "${{ inputs.version }}" --platform darwin/amd64
      - name: Patch existing release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.source.outputs.tag }}"
          patch_dir="${RUNNER_TEMP}/release-patch"
          rm -rf "${patch_dir}"
          mkdir -p "${patch_dir}"
          gh release download "${tag}" --pattern '*.tar.gz' --dir "${patch_dir}"
          asset_names="$(gh release view "${tag}" --json assets --jq '.assets[].name')"
          if printf '%s\n' "${asset_names}" | grep -Fxq 'provider-release.yaml'; then
            gh release download "${tag}" --pattern 'provider-release.yaml' --dir "${patch_dir}"
            template_flag=(--template-metadata "${patch_dir}/provider-release.yaml")
          else
            template_flag=(--manifest "${{ steps.source.outputs.dir }}/manifest.yaml")
          fi
          cp "${{ steps.source.outputs.dir }}/dist/"*_darwin_amd64.tar.gz "${patch_dir}/"
          python3 .github/scripts/write_provider_release_metadata.py \
            "${template_flag[@]}" \
            --output-dir "${patch_dir}" \
            --version "${{ inputs.version }}"
          (
            cd "${patch_dir}"
            LC_ALL=C shasum -a 256 ./*.tar.gz > checksums.txt
          )
          gh release upload "${tag}" "${patch_dir}"/*_darwin_amd64.tar.gz "${patch_dir}/checksums.txt" "${patch_dir}/provider-release.yaml" --clobber
