name: Codex Rerelease Python Provider Assets

on:
  workflow_dispatch:
    inputs:
      app-dir:
        description: Provider directory, for example app/slack
        required: true
        type: string
      version:
        description: Existing release version to patch
        required: true
        type: string
      gestalt-ref:
        description: Optional Gestalt git ref used to build gestaltd; defaults to .github/gestalt-ref
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  rerelease-darwin-amd64:
    runs-on: macos-15-intel
    timeout-minutes: 30
    concurrency:
      group: provider-registry-index
      cancel-in-progress: false
    env:
      GESTALT_REPOSITORY: valon-technologies/gestalt
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Prepare tagged provider source
        id: source
        run: |
          set -euo pipefail
          tag="${{ inputs.app-dir }}/v${{ inputs.version }}"
          git fetch --force origin "refs/tags/${tag}:refs/tags/${tag}"
          source_root="${RUNNER_TEMP}/provider-source"
          rm -rf "${source_root}"
          mkdir -p "${source_root}"
          git archive "${tag}" "${{ inputs.app-dir }}" | tar -x -C "${source_root}"
          source_dir="${source_root}/${{ inputs.app-dir }}"
          if [ ! -f "${source_dir}/manifest.yaml" ]; then
            echo "missing manifest for ${tag}" >&2
            exit 1
          fi
          if [ ! -f "${source_dir}/pyproject.toml" ]; then
            echo "${tag} is not a Python provider" >&2
            exit 1
          fi
          {
            echo "dir=${source_dir}"
            echo "tag=${tag}"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
      - name: Install Python
        run: uv python install 3.13 3.14
      - name: Install gestaltd
        env:
          GOBIN: ${{ runner.temp }}/bin
        run: |
          set -euo pipefail
          mkdir -p "$GOBIN" && echo "$GOBIN" >> "$GITHUB_PATH"
          gestalt_ref="${{ inputs.gestalt-ref }}"
          if [ -z "$gestalt_ref" ]; then
            gestalt_ref="$(cat .github/gestalt-ref)"
          fi
          toolchain_dir="${GITHUB_WORKSPACE}/../gestalt"
          .github/scripts/checkout_gestalt_ref.sh "$toolchain_dir" "$gestalt_ref"
          (cd "$toolchain_dir/gestaltd" && CGO_ENABLED=0 go build -o "$GOBIN/gestaltd" ./cmd/gestaltd)
      - name: Build darwin/amd64 archive
        run: |
          set -euo pipefail
          cd "${{ steps.source.outputs.dir }}"
          rm -rf dist .venv
          uv sync --frozen --no-dev
          GESTALT_PYTHON_DARWIN_AMD64="$PWD/.venv/bin/python" \
            gestaltd provider package --version "${{ inputs.version }}" --platform darwin/amd64
      - name: Patch existing release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ steps.source.outputs.tag }}"
          patch_dir="${RUNNER_TEMP}/release-patch"
          rm -rf "${patch_dir}"
          mkdir -p "${patch_dir}"
          gh release download "${tag}" --pattern '*.tar.gz' --dir "${patch_dir}"
          cp "${{ steps.source.outputs.dir }}/dist/"*_darwin_amd64.tar.gz "${patch_dir}/"
          gestaltd provider release --dist-dir "${patch_dir}" --version "${{ inputs.version }}"
          gh release upload "${tag}" "${patch_dir}"/*_darwin_amd64.tar.gz "${patch_dir}/checksums.txt" "${patch_dir}/provider-release.yaml" --clobber
      - name: Update provider registry index
        run: |
          bash .github/scripts/update_provider_registry_release.sh \
            "${{ inputs.app-dir }}" \
            "${{ steps.source.outputs.tag }}" \
            "${{ steps.source.outputs.dir }}/manifest.yaml" \
            "${RUNNER_TEMP}/release-patch/provider-release.yaml"
