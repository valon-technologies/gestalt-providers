name: Release Provider Package

on:
  push:
    tags:
      - 'agent/*/v*'
      - 'runtime/*/v*'
      - 'app/*/v*'
      - 'auth/*/v*'
      - 'authorization/*/v*'
      - 'externalcredentials/*/v*'
      - 's3/*/v*'
      - 'indexeddb/*/v*'
      - 'workflow/*/v*'
      - 'cache/*/v*'
      - 'secrets/*/v*'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      app-name: ${{ steps.parse.outputs.app-name }}
      app-dir: ${{ steps.validate.outputs.app-dir }}
      app-version: ${{ steps.parse.outputs.app-version }}
      is-app: ${{ steps.validate.outputs.is-app }}
      gestalt-ref: ${{ steps.validate.outputs.gestalt-ref }}
    steps:
      - uses: actions/checkout@v4
      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF_NAME}"
          APP_PATH="${TAG%/v*}"
          APP_NAME="${APP_PATH##*/}"
          APP_VERSION="${TAG##*/v}"
          {
            echo "app-name=${APP_NAME}"
            echo "app-version=${APP_VERSION}"
          } >> "$GITHUB_OUTPUT"
      - name: Validate app directory
        id: validate
        run: |
          APP_DIR="${GITHUB_REF_NAME%/v*}"
          APP_ROOT="${APP_DIR%%/*}"
          if [ "$APP_DIR" = "gestaltd" ]; then
            echo "Detected gestaltd bootstrap tag; skipping provider package release workflow."
            echo "is-app=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -d "$APP_DIR" ]; then
            echo "ERROR: ${APP_DIR} does not exist"
            exit 1
          fi
          if [ ! -f "${APP_DIR}/manifest.yaml" ]; then
            echo "ERROR: ${APP_DIR}/manifest.yaml not found"
            exit 1
          fi

          case "$APP_ROOT" in
            agent|runtime|app|auth|authorization|externalcredentials|s3|indexeddb|workflow|cache|secrets)
              if [ ! -s .github/gestalt-ref ]; then
                echo "ERROR: .github/gestalt-ref is required"
                exit 1
              fi
              GESTALT_REF="$(tr -d '[:space:]' < .github/gestalt-ref)"
              ;;
            *)
              echo "ERROR: unsupported app root ${APP_ROOT}"
              exit 1
              ;;
          esac

          {
            echo "app-dir=${APP_DIR}"
            echo "is-app=true"
            echo "gestalt-ref=${GESTALT_REF}"
          } >> "$GITHUB_OUTPUT"

  release:
    needs: prepare
    if: needs.prepare.outputs.is-app == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/release-app-reusable.yml
    secrets: inherit
    with:
      app-dir: ${{ needs.prepare.outputs.app-dir }}
      version: ${{ needs.prepare.outputs.app-version }}
      gestalt-ref: ${{ needs.prepare.outputs.gestalt-ref }}
