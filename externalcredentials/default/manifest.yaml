source: github.com/valon-technologies/gestalt-providers/externalcredentials/default
version: 0.0.1-alpha.1
displayName: Default External Credentials
description: External credentials provider backed by the host IndexedDB service.
kind: externalcredentials
build:
  command:
    - sh
    - -c
    - |
      if [ -n "${RELEASE_PLATFORM:-}" ] && [ -z "${GOOS:-}" ]; then
        export GOOS="${RELEASE_PLATFORM%%/*}"
        export GOARCH="${RELEASE_PLATFORM#*/}"
      fi
      mkdir -p .gestalt/build
      go build -trimpath -o .gestalt/build/provider ./cmd/provider
entrypoint:
  artifactPath: .gestalt/build/provider
spec: {}
