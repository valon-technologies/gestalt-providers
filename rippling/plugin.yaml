source: github.com/valon-technologies/gestalt-plugins/rippling
version: 0.0.1-alpha.2
display_name: Rippling
description: Access company, worker, org structure, and leave data from Rippling's REST API.
icon_file: assets/icon.svg
provider:
  connections:
    default:
      auth:
        type: bearer
        credentials:
          - name: token
            label: API Token
            description: "Create one in [Rippling API Tokens](https://app.rippling.com/developer/api-tokens)"
  surfaces:
    rest:
      base_url: https://rest.ripplingapis.com
      operations:
        - name: list_companies
          description: List companies available to the authorized Rippling token
          method: GET
          path: /companies/
          parameters:
            - name: expand
              type: string
              in: query
              description: Comma-separated related resources to expand in the response
            - name: order_by
              type: string
              in: query
              description: Sort order for the results
            - name: cursor
              type: string
              in: query
              description: Cursor returned by a previous companies response
        - name: get_company
          description: List companies available to the authorized Rippling token
          method: GET
          path: /companies/
          parameters:
            - name: expand
              type: string
              in: query
              description: Comma-separated related resources to expand in the response
            - name: order_by
              type: string
              in: query
              description: Sort order for the results
            - name: cursor
              type: string
              in: query
              description: Cursor returned by a previous companies response
        - name: list_departments
          description: List departments for the authorized company
          method: GET
          path: /departments/
          parameters:
            - name: expand
              type: string
              in: query
              description: Comma-separated related resources to expand in the response
            - name: order_by
              type: string
              in: query
              description: Sort order for the results
            - name: cursor
              type: string
              in: query
              description: Cursor returned by a previous departments response
        - name: list_employees
          description: List workers for the authorized company
          method: GET
          path: /workers/
          parameters:
            - name: filter
              type: string
              in: query
              description: Filter expression for workers
            - name: expand
              type: string
              in: query
              description: Comma-separated related resources to expand in the response
            - name: order_by
              type: string
              in: query
              description: Sort order for the results
            - name: cursor
              type: string
              in: query
              description: Cursor returned by a previous workers response
        - name: list_employees_including_terminated
          description: List workers, including terminated workers when requested via the filter query
          method: GET
          path: /workers/
          parameters:
            - name: filter
              type: string
              in: query
              description: Filter expression for workers
            - name: expand
              type: string
              in: query
              description: Comma-separated related resources to expand in the response
            - name: order_by
              type: string
              in: query
              description: Sort order for the results
            - name: cursor
              type: string
              in: query
              description: Cursor returned by a previous workers response
        - name: get_employee
          description: Get a single worker by ID
          method: GET
          path: /workers/{employee_id}/
          parameters:
            - name: employee_id
              type: string
              in: path
              required: true
              description: Unique identifier for the worker within Rippling
            - name: expand
              type: string
              in: query
              description: Comma-separated related resources to expand in the response
        - name: get_current_user
          description: Get SSO identity data for the Rippling user tied to the token
          method: GET
          path: /sso-me/
          parameters:
            - name: expand
              type: string
              in: query
              description: Comma-separated related resources to expand in the response
        - name: list_work_locations
          description: List work locations for the authorized company
          method: GET
          path: /work-locations/
          parameters:
            - name: order_by
              type: string
              in: query
              description: Sort order for the results
            - name: cursor
              type: string
              in: query
              description: Cursor returned by a previous work locations response
        - name: list_custom_fields
          description: List custom fields for the authorized company
          method: GET
          path: /custom-fields/
          parameters:
            - name: order_by
              type: string
              in: query
              description: Sort order for the results
            - name: cursor
              type: string
              in: query
              description: Cursor returned by a previous custom fields response
        - name: list_teams
          description: List teams for the authorized company
          method: GET
          path: /teams/
          parameters:
            - name: expand
              type: string
              in: query
              description: Comma-separated related resources to expand in the response
            - name: order_by
              type: string
              in: query
              description: Sort order for the results
            - name: cursor
              type: string
              in: query
              description: Cursor returned by a previous teams response
        - name: list_levels
          description: List levels for the authorized company
          method: GET
          path: /levels/
          parameters:
            - name: expand
              type: string
              in: query
              description: Comma-separated related resources to expand in the response
            - name: order_by
              type: string
              in: query
              description: Sort order for the results
            - name: cursor
              type: string
              in: query
              description: Cursor returned by a previous levels response
        - name: list_leave_requests
          description: List leave requests with optional filtering
          method: GET
          path: /leave-requests/
          parameters:
            - name: filter
              type: string
              in: query
              description: Filter expression for leave requests
            - name: expand
              type: string
              in: query
              description: Comma-separated related resources to expand in the response
            - name: order_by
              type: string
              in: query
              description: Sort order for the results
            - name: cursor
              type: string
              in: query
              description: Cursor returned by a previous leave requests response
        - name: list_company_leave_types
          description: List leave types configured for the authorized company
          method: GET
          path: /leave-types/
          parameters:
            - name: filter
              type: string
              in: query
              description: Filter expression for leave types
            - name: order_by
              type: string
              in: query
              description: Sort order for the results
            - name: cursor
              type: string
              in: query
              description: Cursor returned by a previous leave types response
        - name: list_leave_balances
          description: List leave balances for employees
          method: GET
          path: /leave-balances/
          parameters:
            - name: filter
              type: string
              in: query
              description: Filter expression for leave balances
            - name: expand
              type: string
              in: query
              description: Comma-separated related resources to expand in the response
            - name: order_by
              type: string
              in: query
              description: Sort order for the results
            - name: cursor
              type: string
              in: query
              description: Cursor returned by a previous leave balances response
        - name: get_leave_balance
          description: Get a single leave balance by ID
          method: GET
          path: /leave-balances/{leave_balance_id}/
          parameters:
            - name: leave_balance_id
              type: string
              in: path
              required: true
              description: Unique identifier for the leave balance
            - name: expand
              type: string
              in: query
              description: Comma-separated related resources to expand in the response
