source: github.com/valon-technologies/gestalt-providers/runtime/nebius
version: 0.0.1-alpha.1
displayName: Nebius Runtime
description: Hosted executable-plugin runtime backed by Nebius Compute VMs.
kind: runtime
build:
  command:
    - sh
    - -c
    - |
      if [ -n "${RELEASE_PLATFORM:-}" ] && [ -z "${GOOS:-}" ]; then
        export GOOS="${RELEASE_PLATFORM%%/*}"
        export GOARCH="${RELEASE_PLATFORM#*/}"
      fi
      mkdir -p .gestalt/build
      go build -trimpath -o .gestalt/build/provider ./cmd/provider
entrypoint:
  artifactPath: .gestalt/build/provider
spec:
  configSchemaPath: schemas/config.schema.yaml
