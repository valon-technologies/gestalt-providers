type: object
additionalProperties: false
properties:
  namespace:
    type: string
    description: Kubernetes namespace where SandboxClaims or Sandboxes are created.
  container:
    type: string
    description: Container name inside the sandbox pod.
  kubeconfig:
    type: string
    description: Optional kubeconfig path. Defaults to in-cluster config, then default kubeconfig.
  context:
    type: string
    description: Optional kubeconfig context.
  gke:
    type: object
    additionalProperties: false
    description: Optional GKE cluster discovery configuration. Uses Google application default credentials and cannot be combined with kubeconfig or context.
    properties:
      projectID:
        type: string
        description: Google Cloud project ID that owns the GKE cluster.
      location:
        type: string
        description: GKE cluster location, such as us-east4 for a regional cluster.
      cluster:
        type: string
        description: GKE cluster name.
      endpoint:
        type: string
        enum:
          - private
          - public
        description: GKE API endpoint to use. Defaults to private when gke config is present.
  pluginPort:
    type: integer
    minimum: 1
    maximum: 65535
    description: TCP port exposed by the hosted plugin gRPC server inside the sandbox.
  connectionMode:
    type: string
    enum:
      - portForward
      - podIP
      - serviceDNS
    description: How gestaltd connects back to the hosted plugin. Use serviceDNS when gestaltd runs inside the same cluster/network as the sandbox service.
  sandboxReadyTimeout:
    type: string
    description: Go duration to wait for Sandbox readiness.
  pluginReadyTimeout:
    type: string
    description: Go duration to wait for the plugin gRPC endpoint.
  execTimeout:
    type: string
    description: Go duration for plugin launch exec calls.
  cleanupTimeout:
    type: string
    description: Go duration for best-effort cleanup calls.
  direct:
    type: object
    additionalProperties: false
    description: Direct Sandbox creation defaults used when no SandboxTemplate is selected.
    properties:
      runtimeClassName:
        type: string
      command:
        type: array
        items:
          type: string
      args:
        type: array
        items:
          type: string
      cpuRequest:
        type: string
      memoryRequest:
        type: string
      cpuLimit:
        type: string
      memoryLimit:
        type: string
      runAsUser:
        type: integer
