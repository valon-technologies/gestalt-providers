type: object
additionalProperties: false
properties:
  namespace:
    type: string
    description: Kubernetes namespace where runtime Pods are created.
  container:
    type: string
    description: Container name inside the runtime Pod that receives exec calls.
  kubeconfig:
    type: string
    description: Optional kubeconfig path. Defaults to in-cluster config, then default kubeconfig.
  context:
    type: string
    description: Optional kubeconfig context.
  gke:
    type: object
    additionalProperties: false
    description: Optional GKE cluster discovery configuration. Uses Google application default credentials and cannot be combined with kubeconfig or context.
    properties:
      projectID:
        type: string
      location:
        type: string
      cluster:
        type: string
      endpoint:
        type: string
        enum:
          - private
          - public
  pluginPort:
    type: integer
    minimum: 1
    maximum: 65535
    description: TCP port exposed by the hosted provider gRPC socket bridge inside the runtime Pod.
  connectionMode:
    type: string
    enum:
      - portForward
      - podIP
      - serviceDNS
    description: How gestaltd connects back to the hosted provider.
  sessionReadyTimeout:
    type: string
    description: Go duration to wait for the runtime Pod to become ready.
  pluginReadyTimeout:
    type: string
    description: Go duration to wait for the hosted provider gRPC endpoint.
  execTimeout:
    type: string
    description: Go duration for provider launch exec calls.
  cleanupTimeout:
    type: string
    description: Go duration for best-effort runtime cleanup calls.
  hostnameEgress:
    type: object
    additionalProperties: false
    properties:
      mode:
        type: string
        enum:
          - disabled
          - publicProxy
        description: Hostname egress support. publicProxy requires Kubernetes NetworkPolicy enforcement.
  podDefaults:
    type: object
    additionalProperties: false
    description: Defaults used when execution.runtime.image is selected instead of a PodTemplate.
    properties:
      serviceAccountName:
        type: string
      runtimeClassName:
        type: string
      command:
        type: array
        items:
          type: string
      args:
        type: array
        items:
          type: string
      imagePullPolicy:
        type: string
        enum:
          - Always
          - IfNotPresent
          - Never
      nodeSelector:
        type: object
        additionalProperties:
          type: string
      tolerations:
        type: array
        items:
          type: object
          additionalProperties: false
          properties:
            key:
              type: string
            operator:
              type: string
            value:
              type: string
            effect:
              type: string
      cpuRequest:
        type: string
      memoryRequest:
        type: string
      cpuLimit:
        type: string
      memoryLimit:
        type: string
      runAsUser:
        type: integer
