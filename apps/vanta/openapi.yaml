  "/controls/add-from-library":
    post:
      tags:
      - Manage Vanta > controls > add-from-library
      summary: Add control from Vanta library
      description: Add a control from the Vanta library to your organization's controls.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                controlId: string
              properties:
                controlId:
                  type: string
      security:
      - bearerAuth: []
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                id: a2f7e1b9d0c3f4e5a6c7b8d9
                externalId: CRY-104
                name: Data encryption utilized
                description: Access reviews are performed to ensure that access is
                  appropriate for the user's role and responsibilities.
                source: Vanta
                domains:
                - CRYPTOGRAPHIC_PROTECTIONS
                owner:
                  id: 65e1efde08e8478f143a8ff9
                  emailAddress: example-person@email.com
                  displayName: Example Owner
                role: CONTROLLER
                customFields:
                - label: Additional context
                  value: This control is critical for GDPR compliance
                creationDate: 
                modificationDate: 
      operationId: AddControlFromVantaLibrary
