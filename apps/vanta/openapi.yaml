        example: application/json
      - name: pageSize
        in: query
        schema:
          type: integer
        example: '10'
      - name: pageCursor
        in: query
        schema:
          type: string
        example: string
      responses:
        '200':
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                results:
