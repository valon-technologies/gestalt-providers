paths:
  "/resources/user_account":
    get:
      tags:
      - Build Integrations > Account Resource Type
      summary: Get User Accounts
      security:
      - bearerAuth: []
      parameters:
      - name: resourceId
        in: query
        schema:
          type: string
        example: "{{accountResourceId}}"
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
      operationId: GetUserAccounts
    put:
      tags:
      - Build Integrations > Account Resource Type
      summary: Sync User Accounts
      requestBody:
        content:
          "*/*":
            schema:
              type: string
              example: '"{\r\n  \"resourceId\": \"{{accountResourceId}}\",\r\n  \"resources\":
                [\r\n    {\r\n      \"permissionLevel\": \"ADMIN\",\r\n      \"status\":
                \"ACTIVE\",\r\n      \"mfaEnabled\": true,\r\n      \"mfaMethods\":
                [\r\n        \"PUSH_PROMPT\",\r\n        \"HARDWARE_TOKEN\"\r\n      ],\r\n      \"authMethod\":
                \"BIOMETRIC\",\r\n      \"groupIds\": [\r\n        \"ADMIN\",\r\n        \"EDITOR\"\r\n      ],\r\n      \"displayName\":
                \"Test User\",\r\n      \"uniqueId\": \"test_user_1\",\r\n      \"externalUrl\":
                \"https://www.vanta.com\",\r\n      \"fullName\": \"Austin Powers\",\r\n      \"accountName\":
                \"apowers79\",\r\n      \"email\": \"austin.powers@vanta.com\",\r\n      \"createdTimestamp\":
                \"2022-06-15T12:32:44Z\",\r\n      \"roleDescription\": \"ADMIN\",\r\n      \"updatedTimestamp\":
                \"2023-07-15T12:32:44Z\",\r\n      \"lastLoginTimestamp\": \"2023-07-19T12:32:44Z\",\r\n      \"lastPasswordResetTimestamp\":
                \"2022-10-17T12:32:44Z\"\r\n    }\r\n  ]\r\n}"'
      security:
      - bearerAuth: []
      parameters:
      - name: accept
        in: header
        schema:
          type: string
        example: application/json
      - name: content-type
        in: header
        schema:
          type: string
        example: application/json
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
      operationId: SyncUserAccounts
  "/resources/custom_resource":
    get:
      tags:
      - Build Integrations > Custom Resource Type
      summary: Get Custom Resource - Server
      security:
      - bearerAuth: []
      parameters:
      - name: resourceId
        in: query
        schema:
          type: string
        example: "{{customResourceId}}"
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
      operationId: GetCustomResourceServer
    put:
      tags:
      - Build Integrations > Custom Resource Type
      summary: Sync Custom Resource - Server
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                resourceId: "{{customResourceId}}"
                resources:
                - displayName: PS-PROD-US-LINUX-01
                  uniqueId: PS-PROD-US-0001
                  externalUrl: myprivate.app/ps-prod-us-0001
                  customProperties:
                    name: My Server Name
                    active: true
                    memory: 512
              properties:
                resourceId:
                  type: string
                resources:
                  type: array
                  items:
                    type: object
                    properties:
                      displayName:
                        type: string
                      uniqueId:
                        type: string
                      externalUrl:
                        type: string
                      customProperties:
                        type: object
                        properties:
                          name:
                            type: string
                          active:
                            type: boolean
                          memory:
                            type: integer
      security:
      - bearerAuth: []
      responses:
        '200':
          description: Successful response
          content:
            application/json: {}
      operationId: SyncCustomResourceServer
