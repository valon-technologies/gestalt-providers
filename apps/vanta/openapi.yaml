      summary: Add control to document mapping
      description: Add a document to a control.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              example:
                documentId: string
              properties:
                documentId:
                  type: string
      security:
      - bearerAuth: []
      parameters:
      - name: Content-Type
        in: header
        schema:
          type: string
        example: application/json
      - name: Accept
        in: header
        schema:
          type: string
        example: application/json
      - name: controlId
        in: path
        schema:
          type: string
        required: true
        example: string
      responses:
        '200':
          description: OK
          headers:
            Content-Type:
              schema:
                type: string
                example: application/json
          content:
            application/json:
              schema:
                type: object
              example:
                control:
                  id: a2f7e1b9d0c3f4e5a6c7b8d9
                  externalId: CRY-104
                  name: Data encryption utilized
                  description: Access reviews are performed to ensure that access
                    is appropriate for the user's role and responsibilities.
                  source: Vanta
                  domains:
                  - CRYPTOGRAPHIC_PROTECTIONS
                  owner:
                    id: 65e1efde08e8478f143a8ff9
                    emailAddress: example-person@email.com
