type: object
properties:
  defaultModel:
    type: string
    description: Default model identifier to use when a run omits `model` (for example `openai/gpt-4.1-mini` or `anthropic/<model>`).
  aliases:
    type: object
    description: Optional model aliases resolved before dispatch.
    additionalProperties:
      type: string
  providerOptions:
    type: object
    description: Default backend request options merged before per-turn provider_options. Nested `openai`, `anthropic`, and provider-prefix blocks are supported.
    additionalProperties: true
  maxSteps:
    type: integer
    minimum: 1
    description: Maximum model/tool loop iterations per turn.
  timeoutSeconds:
    type: number
    exclusiveMinimum: 0
    description: Per-model-call timeout in seconds.
  systemPrompt:
    type: string
    description: Optional system prompt prepended to every run.
  anthropicApiKey:
    type: string
    description: Optional Anthropic API key to expose to the Anthropic SDK as ANTHROPIC_API_KEY.
  openaiApiKey:
    type: string
    description: Optional OpenAI API key to expose to the OpenAI SDK as OPENAI_API_KEY.
  resume:
    type: object
    description: Durable turn resume settings backed by IndexedDB transactions.
    properties:
      enabled:
        type: boolean
        default: true
      startupScanLimit:
        type: integer
        minimum: 1
        default: 100
      workerLeaseSeconds:
        type: number
        exclusiveMinimum: 0
        default: 60
      legacyRunningPolicy:
        type: string
        enum:
          - fail
          - ignore
        default: fail
    additionalProperties: false
additionalProperties: false
