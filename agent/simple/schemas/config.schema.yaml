type: object
properties:
  runStore:
    type: string
    description: IndexedDB object store prefix used for provider-owned turn state. The provider also derives `${runStore}_sessions` and `${runStore}_events`.
  idempotencyStore:
    type: string
    description: IndexedDB object store prefix used for provider-owned turn and session idempotency records.
  defaultModel:
    type: string
    description: Default model identifier to use when a run omits `model` (for example `openai/gpt-4.1-mini` or `anthropic/<model>`).
  aliases:
    type: object
    description: Optional model aliases resolved before dispatch.
    additionalProperties:
      type: string
  maxSteps:
    type: integer
    minimum: 1
    description: Maximum model/tool loop iterations per turn.
  timeoutSeconds:
    type: number
    exclusiveMinimum: 0
    description: Per-model-call timeout in seconds.
  systemPrompt:
    type: string
    description: Optional system prompt prepended to every run.
  anthropicApiKey:
    type: string
    description: Optional Anthropic API key to expose to the Anthropic SDK as ANTHROPIC_API_KEY.
  openaiApiKey:
    type: string
    description: Optional OpenAI API key to expose to the OpenAI SDK as OPENAI_API_KEY.
additionalProperties: false
