type: object
additionalProperties: false
properties:
  defaultModel:
    type: string
    default: claude-sonnet-4-5-20250929
  cliPath:
    type: string
  workingDirectory:
    type: string
  timeoutSeconds:
    type: number
    exclusiveMinimum: 0
  systemPrompt:
    type: string
  permissionMode:
    type: string
    default: dontAsk
    enum:
      - default
      - acceptEdits
      - bypassPermissions
      - dontAsk
      - plan
  anthropicApiKey:
    type: string
    description: Optional Anthropic API key passed only to the Claude SDK.
  settingSources:
    type: array
    items:
      type: string
      enum:
        - user
        - project
        - local
  disableAutoMemory:
    type: boolean
    default: true
  skillDiscovery:
    type: string
    default: none
    enum:
      - none
      - all
  skills:
    type: array
    description: Skill names to enable, as bare names or plugin:skill qualified names. Mutually exclusive with skillDiscovery.
    items:
      type: string
  plugins:
    type: array
    items:
      type: string
  allowedTools:
    type: array
    items:
      type: string
