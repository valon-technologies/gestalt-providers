source: github.com/valon-technologies/gestalt-providers/agent/codex
version: 0.0.1-alpha.1
displayName: Codex MCP Agent
description: Agent provider that runs Codex CLI through its MCP harness with Gestalt MCP catalog tools scoped to the current turn.
iconFile: assets/icon.svg
kind: agent
install:
  command: [uv, sync, --frozen]
build:
  command: [uv, run, python, -m, gestalt._build]
entrypoint:
  artifactPath: gestalt-app-codex
spec:
  configSchemaPath: schemas/config.schema.yaml
