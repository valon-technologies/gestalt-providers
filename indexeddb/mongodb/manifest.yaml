source: github.com/valon-technologies/gestalt-providers/indexeddb/mongodb
version: 0.0.1-alpha.1
displayName: MongoDB
description: MongoDB datastore provider.
kind: indexeddb
build:
  command:
    - sh
    - -c
    - |
      if [ -n "${RELEASE_PLATFORM:-}" ] && [ -z "${GOOS:-}" ]; then
        export GOOS="${RELEASE_PLATFORM%%/*}"
        export GOARCH="${RELEASE_PLATFORM#*/}"
      fi
      mkdir -p .gestalt/build
      go build -trimpath -o .gestalt/build/provider ./cmd/provider
entrypoint:
  artifactPath: .gestalt/build/provider
spec: {}
