source: github.com/valon-technologies/gestalt-providers/plugins/jira
version: 0.0.1-alpha.1
displayName: Jira Cloud
description: Atlassian Jira Cloud project and issue management
iconFile: assets/icon.svg
kind: plugin
spec:
  surfaces:
    rest:
      baseUrl: https://api.atlassian.com/ex/jira/{cloud_id}/rest/api/3
      operations:
      - name: list_projects
        description: List all accessible projects
        method: GET
        path: /project
        parameters:
        - name: maxResults
          type: int
          in: query
      - name: get_issue
        description: Get a Jira issue by key
        method: GET
        path: /issue/{issueIdOrKey}
        parameters:
        - name: issueIdOrKey
          type: string
          in: path
          required: true
        - name: fields
          type: string
          in: query
      - name: search_issues
        description: Search issues using JQL
        method: POST
        path: /search
        parameters:
        - name: jql
          type: string
          in: body
          required: true
        - name: maxResults
          type: int
          in: body
        - name: startAt
          type: int
          in: body
        - name: fields
          type: array
          in: body
      - name: create_issue
        description: Create a new issue
        method: POST
        path: /issue
        parameters:
        - name: fields
          type: object
          in: body
          required: true
      - name: add_comment
        description: Add a comment to an issue
        method: POST
        path: /issue/{issueIdOrKey}/comment
        parameters:
        - name: issueIdOrKey
          type: string
          in: path
          required: true
        - name: body
          type: object
          in: body
          required: true
      - name: get_transitions
        description: Get available transitions for an issue
        method: GET
        path: /issue/{issueIdOrKey}/transitions
        parameters:
        - name: issueIdOrKey
          type: string
          in: path
          required: true
      - name: transition_issue
        description: Transition an issue to a new status
        method: POST
        path: /issue/{issueIdOrKey}/transitions
        parameters:
        - name: issueIdOrKey
          type: string
          in: path
          required: true
        - name: transition
          type: object
          in: body
          required: true
  connections:
    default:
      auth:
        type: oauth2
        authorizationUrl: https://auth.atlassian.com/authorize
        tokenUrl: https://auth.atlassian.com/oauth/token
        scopes:
        - read:me
        - read:jira-work
        - write:jira-work
        - offline_access
        authorizationParams:
          audience: api.atlassian.com
          prompt: consent
      params:
        cloud_id:
          required: true
          description: Jira Cloud site identifier (discovered automatically)
          from: discovery
      discovery:
        url: https://api.atlassian.com/oauth/token/accessible-resources
        idPath: id
        namePath: name
        metadata:
          cloud_id: id
