source: github.com/valon-technologies/gestalt-providers/plugins/github
version: 0.0.1-alpha.1
displayName: GitHub
description: Repository, issue, pull request, workflow, and code search operations.
iconFile: assets/icon.svg
kind: plugin
spec:
  defaultConnection: default
  configSchemaPath: schemas/config.schema.yaml
  surfaces:
    openapi:
      connection: default
      document: https://raw.githubusercontent.com/github/rest-api-description/main/descriptions/api.github.com/api.github.com.yaml
    graphql:
      connection: default
      url: https://api.github.com/graphql
  connections:
    default:
      auth:
        type: oauth2
        authorizationUrl: https://github.com/login/oauth/authorize
        tokenUrl: https://github.com/login/oauth/access_token
        acceptHeader: application/json
        scopes:
        - repo
