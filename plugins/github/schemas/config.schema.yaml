type: object
properties:
  clientId:
    type: string
    description: GitHub OAuth client ID.
  clientSecret:
    type: string
    description: GitHub OAuth client secret.
  appId:
    type: string
    description: GitHub App ID used for bot webhooks and installation-token API calls.
  appPrivateKey:
    type: string
    description: PEM-encoded GitHub App private key. GITHUB_APP_PRIVATE_KEY is also supported.
  appPrivateKeyEnv:
    type: string
    description: Environment variable containing the PEM-encoded GitHub App private key.
  appPrivateKeyPath:
    type: string
    description: >-
      Filesystem path to the PEM-encoded GitHub App private key.
      GITHUB_APP_PRIVATE_KEY_PATH is also supported.
  apiBaseUrl:
    type: string
    description: GitHub REST API base URL. Defaults to https://api.github.com.
  webBaseUrl:
    type: string
    description: GitHub web base URL used to build commit links. Defaults to https://github.com.
  webhookEvents:
    type: array
    description: >-
      GitHub webhook event types that should signal workflow runs. Defaults to
      check_run, check_suite, issue_comment, issues, pull_request,
      pull_request_review, pull_request_review_comment, and workflow_run.
    items:
      type: string
  webhookPolicies:
    type: array
    description: >-
      Ordered webhook policies. When present, the first matching policy selects
      the workflow/agent target and GitHub bot operations exposed to the agent.
      If no policy matches, the webhook is acknowledged and ignored.
    items:
      type: object
      additionalProperties: false
      required:
        - id
      properties:
        id:
          type: string
          pattern: '^[A-Za-z0-9._-]+$'
          minLength: 1
          description: Stable policy identifier used in workflow keys.
        match:
          type: object
          additionalProperties: false
          description: >-
            GitHub-shaped match fields. Empty fields are wildcards; values within
            a field are ORed and fields are ANDed.
          properties:
            events:
              type: array
              items:
                type: string
            actions:
              type: array
              items:
                type: string
            statuses:
              type: array
              items:
                type: string
            conclusions:
              type: array
              items:
                type: string
            repositories:
              type: array
              items:
                type: string
            branches:
              type: array
              items:
                type: string
            checkNames:
              type: array
              items:
                type: string
            workflowNames:
              type: array
              items:
                type: string
        workflow:
          type: object
          additionalProperties: false
          properties:
            provider:
              type: string
              description: Workflow provider override for this policy.
        agent:
          type: object
          additionalProperties: false
          properties:
            provider:
              type: string
              description: Agent provider override for this policy.
            model:
              type: string
              description: Agent model override for this policy.
            systemPrompt:
              type: string
              description: Additional system prompt for this policy.
            providerOptions:
              type: object
              description: Provider-specific options for this policy.
              additionalProperties: true
        action:
          type: object
          additionalProperties: false
          properties:
            mode:
              type: string
              enum:
                - observe
                - comment
                - branch_commit
                - pull_request
              description: Semantic remediation mode for this policy.
            allowedOperations:
              type: array
              description: >-
                Exact GitHub bot operation allowlist. If omitted, operations are
                derived from mode. An explicit empty list grants no tools.
              items:
                type: string
                enum:
                  - bot.getCheckRun
                  - bot.listCheckRunAnnotations
                  - bot.getWorkflowRun
                  - bot.listWorkflowRunJobs
                  - bot.createIssueComment
                  - bot.commitFiles
                  - bot.openPullRequest
                  - bot.createPullRequest
  workflow:
    type: object
    description: Workflow provider used for GitHub App webhook dispatch.
    additionalProperties: false
    properties:
      provider:
        type: string
        minLength: 1
        description: Workflow provider name that receives GitHub App webhook events.
    required:
      - provider
  ignoreBotSender:
    type: boolean
    description: >-
      Ignore webhook payloads sent by the derived GitHub App bot login.
      Defaults to true.
  agent:
    type: object
    description: Agent configuration for GitHub App webhook-triggered turns.
    additionalProperties: false
    properties:
      provider:
        type: string
        description: Agent provider used for GitHub App webhook-triggered turns.
      model:
        type: string
        description: Agent model used for GitHub App webhook-triggered turns.
      systemPrompt:
        type: string
        description: Additional system prompt appended for GitHub App webhook-triggered turns.
      providerOptions:
        type: object
        description: Provider-specific options for GitHub App webhook-triggered turns.
        additionalProperties: true
required:
  - workflow
additionalProperties: false
