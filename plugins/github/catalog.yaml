    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: pull_number
    type: integer
    description: Pull request number
    required: true
  - name: body
    type: string
    description: Pull request review body
    required: true
  - name: comments
    type: array
    description: Inline review comments. Each item accepts path, body, line, side,
      start_line, start_side, and position.
    required: true
  - name: commit_id
    type: string
    description: Optional commit SHA to review. Defaults to GitHub's latest PR commit.
    default: ''
  - name: installation_id
    type: integer
    description: GitHub App installation ID. If omitted, it is resolved from
      external_identity or the legacy webhook service account subject.
    default: 0
- id: bot.listPullRequestReviewThreads
