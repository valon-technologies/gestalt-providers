    description: Repository name
    required: true
  - name: pull_number
    type: integer
    description: Pull request number
    required: true
  - name: per_page
    type: integer
    description: Results per page, from 1 through 100
    default: 0
  - name: page
    type: integer
    description: Page number, starting at 1
    default: 0
  - name: installation_id
    type: integer
