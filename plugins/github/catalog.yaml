    required: true
  - name: pull_number
    type: integer
    description: Pull request number
    required: true
  - name: first
    type: integer
    description: Number of review threads to fetch, from 1 through 100
    default: 100
  - name: after
    type: string
    description: Optional GitHub GraphQL reviewThreads page cursor
    default: ''
  - name: comments_first
    type: integer
    description: Number of comments to fetch per thread, from 1 through 50
    default: 20
  - name: installation_id
    type: integer
    description: GitHub App installation ID. If omitted, it is taken from the webhook
      service account subject.
    default: 0
- id: bot.resolvePullRequestReviewThread
