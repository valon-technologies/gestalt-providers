name: github
operations:
- id: events.handle
  method: POST
  description: Handle GitHub App webhook callbacks and delegate repository events
    to configured Gestalt workflow targets
  visible: false
- id: reviewPullRequest
  method: POST
  description: Review the latest GitHub pull_request workflow signal and post validated
    inline comments
  tags: [pr, prs, review]
  parameters:
  - name: agentProvider
    type: string
    description: Agent provider used to inspect the pull request diff
    default: ''
  - name: model
    type: string
    description: Agent model used to inspect the pull request diff
    default: ''
  - name: systemPrompt
    type: string
    description: System prompt for the pull request review agent
    default: ''
  - name: maxComments
    type: integer
    description: Maximum inline review comments to post
    default: 10
  - name: maxFiles
    type: integer
    description: Maximum changed files to inspect
    default: 50
  - name: maxPatchChars
    type: integer
    description: Maximum patch characters per changed file to send to the agent
    default: 80000
  - name: changedLinesOnly
    type: boolean
    description: Only allow comments on added RIGHT-side diff lines
    default: true
  - name: dryRun
    type: boolean
    description: Return validated findings without posting a GitHub review
    default: false
  - name: autoResolveStaleFindings
    type: boolean
    description: Resolve prior provider-owned inline comments when the latest review
      no longer reports the same finding
    default: true
  - name: publishCheckRun
    type: boolean
    description: Publish a GitHub check run for the review result
    default: false
  - name: checkRunName
    type: string
    description: GitHub check run name to create when publishCheckRun is enabled
    default: Gestalt Review
  - name: turnTimeoutMs
    type: integer
    description: Maximum time to wait for the review agent turn
    default: 180000
  - name: pollIntervalMs
    type: integer
    description: Polling interval while waiting for the review agent turn
    default: 1000
- id: actionPreferences.get
  method: GET
  description: Get this caller's GitHub webhook action preferences for a policy
  parameters:
  - name: repository
    type: string
    description: Repository full name, owner/repo
    required: true
  - name: policy_id
    type: string
    description: GitHub webhook policy id
    required: true
  - name: identity_kind
    type: string
    description: >-
      Preference identity kind: external_subject_id or subject_id. Defaults to
      the caller's linked GitHub identity when present.
    default: ''
- id: actionPreferences.listTargets
  method: GET
  description: List repositories and GitHub webhook action controls this caller can configure
  parameters:
  - name: identity_kind
    type: string
    description: >-
      Preference identity kind: external_subject_id or subject_id. Defaults to
      the caller's linked GitHub identity when present.
    default: ''
- id: actionPreferences.set
  method: POST
  description: Set this caller's GitHub webhook action preferences for a policy
  parameters:
  - name: repository
    type: string
    description: Repository full name, owner/repo
    required: true
  - name: policy_id
    type: string
    description: GitHub webhook policy id
    required: true
  - name: identity_kind
    type: string
    description: >-
      Preference identity kind: external_subject_id or subject_id. Defaults to
      the caller's linked GitHub identity when present.
    default: ''
  - name: allow_code_review_comments
    type: boolean
    description: >-
      Whether this caller allows inline code review comments for this policy.
      Null leaves the policy default in effect.
    default: null
  - name: allow_self_fix
    type: boolean
    description: >-
      Deprecated boolean self-fix preference. False disables self-fix; true/null
      leave self_fix_mode in effect.
    default: null
  - name: self_fix_mode
    type: string
    description: >-
      Self-fix mode: disabled, suggest, branch_commit, pull_request, or null for
      policy default.
    default: null
- id: actionPreferences.delete
  method: POST
  description: Delete this caller's GitHub webhook action preferences for a policy
  parameters:
  - name: repository
    type: string
    description: Repository full name, owner/repo
    required: true
  - name: policy_id
    type: string
    description: GitHub webhook policy id
    required: true
  - name: identity_kind
    type: string
    description: >-
      Preference identity kind: external_subject_id or subject_id. Defaults to
      the caller's linked GitHub identity when present.
    default: ''
- id: bot.resolveInstallation
  method: GET
  description: Resolve the GitHub App installation and runAs identities for a repository
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
- id: bot.commitFiles
  method: POST
  description: Create a Git commit on a branch using a GitHub App installation token
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: message
    type: string
    description: Commit message
    required: true
  - name: files
    type: array
    description: Files to create, update, or delete. Each item accepts path, content,
      content_base64, delete, and executable.
    required: true
  - name: branch
    type: string
    description: Branch to create or update. Defaults to a generated branch.
    default: ''
  - name: base_branch
    type: string
    description: Base branch for a newly-created branch. Defaults to the repository
      default branch.
    default: ''
  - name: installation_id
    type: integer
    description: GitHub App installation ID. If omitted, it is resolved from
      external_identity or the legacy webhook service account subject.
    default: 0
  - name: coauthors
    type: array
    description: Co-authors to append as commit trailers. Each item accepts name and
      email.
  - name: include_bot_coauthor
    type: boolean
    description: Append the GitHub App bot as a co-author when its no-reply identity
      can be derived
    default: true
  - name: author_name
    type: string
    description: Optional Git commit author name. Delegated agent calls use the invoking user's linked GitHub identity instead when available.
    default: ''
  - name: author_email
    type: string
    description: Optional Git commit author email. Delegated agent calls use the invoking user's linked GitHub identity instead when available.
    default: ''
  - name: committer_name
    type: string
    description: Optional Git commit committer name
    default: ''
  - name: committer_email
    type: string
    description: Optional Git commit committer email
    default: ''
  - name: force
    type: boolean
    description: Force-update the branch ref
    default: false
  - name: allow_base_update
    type: boolean
    description: Allow updating the base branch directly
    default: false
- id: bot.openPullRequest
  method: POST
  description: Open a pull request using a GitHub App installation token
  tags: [pr, prs]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: title
    type: string
    description: Pull request title
    required: true
  - name: head
    type: string
    description: Head branch name
    required: true
  - name: base
    type: string
    description: Base branch name
    required: true
  - name: body
    type: string
    description: Pull request body
    default: ''
  - name: installation_id
    type: integer
    description: GitHub App installation ID. If omitted, it is resolved from
      external_identity or the legacy webhook service account subject.
    default: 0
  - name: head_owner
    type: string
    description: Optional owner for cross-repository pull requests
    default: ''
  - name: draft
    type: boolean
    description: Create the pull request as a draft
    default: false
  - name: maintainer_can_modify
    type: boolean
    description: Allow maintainers to modify the pull request branch
    default: true
- id: bot.closePullRequest
  method: POST
  description: Close a pull request using a GitHub App installation token
