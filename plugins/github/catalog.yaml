    type: string
    description: Reaction target type, one of issue, pull_request, issue_comment,
      or pull_request_review_comment
    required: true
  - name: content
    type: string
    description: Reaction content, one of +1, -1, laugh, confused, heart, hooray,
      rocket, or eyes
    required: true
  - name: issue_number
    type: integer
    description: Issue number when subject_type is issue
    default: 0
  - name: pull_number
    type: integer
    description: Pull request number when subject_type is pull_request
    default: 0
  - name: comment_id
    type: integer
    description: Comment ID when subject_type is issue_comment or pull_request_review_comment
    default: 0
  - name: installation_id
    type: integer
    description: GitHub App installation ID. If omitted, it is taken from the webhook
      service account subject.
    default: 0
