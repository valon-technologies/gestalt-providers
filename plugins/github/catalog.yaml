  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: pull_number
    type: integer
    description: Pull request number
    required: true
  - name: installation_id
    type: integer
    description: GitHub App installation ID. If omitted, it is taken from the webhook
      service account subject.
    default: 0
- id: bot.createPullRequest
  method: POST
  description: Commit file changes to a branch and open a pull request using a GitHub
    App installation token
  tags: [pr, prs]
  parameters:
  - name: owner
    type: string
    description: Repository owner
    required: true
  - name: repo
    type: string
    description: Repository name
    required: true
  - name: title
    type: string
    description: Pull request title
    required: true
  - name: message
    type: string
    description: Commit message
    required: true
  - name: files
    type: array
    description: Files to create, update, or delete. Each item accepts path, content,
      content_base64, delete, and executable.
    required: true
  - name: body
    type: string
    description: Pull request body
    default: ''
  - name: branch
    type: string
    description: Head branch to create or update. Defaults to a generated branch.
    default: ''
  - name: base
    type: string
    description: Base branch. Defaults to the repository default branch.
    default: ''
  - name: installation_id
    type: integer
    description: GitHub App installation ID. If omitted, it is resolved from
      external_identity or the legacy webhook service account subject.
    default: 0
  - name: coauthors
    type: array
    description: Co-authors to append as commit trailers. Each item accepts name and
      email.
  - name: include_bot_coauthor
    type: boolean
    description: Append the GitHub App bot as a co-author when its no-reply identity
      can be derived
    default: true
  - name: author_name
    type: string
    description: Optional Git commit author name. Delegated agent calls use the invoking user's linked GitHub identity instead when available.
    default: ''
  - name: author_email
    type: string
    description: Optional Git commit author email. Delegated agent calls use the invoking user's linked GitHub identity instead when available.
    default: ''
  - name: committer_name
    type: string
    description: Optional Git commit committer name
    default: ''
  - name: committer_email
    type: string
    description: Optional Git commit committer email
    default: ''
  - name: force
    type: boolean
    description: Force-update the head branch ref
    default: false
  - name: draft
    type: boolean
    description: Create the pull request as a draft
    default: false
  - name: maintainer_can_modify
    type: boolean
    description: Allow maintainers to modify the pull request branch
    default: true
