source: github.com/valon-technologies/gestalt-providers/plugins/rippling
version: 0.0.1-alpha.4
displayName: Rippling
description: Access company, employee, org structure, identity, leave, and time data from Rippling's REST API.
iconFile: assets/icon.svg
kind: plugin
spec:
  surfaces:
    openapi:
      connection: default
      document: openapi.yaml
  allowedOperations:
    Companies.Get:
      alias: Companies.List
      description: Get the current company context available to the authorized Rippling token
    Employees.ListIncludingTerminated:
      alias: Employees.List
      description: List employees, including terminated workers when requested via the filter query
  connections:
    default:
      auth:
        type: bearer
        credentials:
        - name: token
          label: API Token
          description: Create one in [Rippling API Tokens](https://app.rippling.com/developer/api-tokens)
