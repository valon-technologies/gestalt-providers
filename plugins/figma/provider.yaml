source: github.com/valon-technologies/gestalt-providers/plugins/figma
version: 0.0.1-alpha.2
display_name: Figma
description: Access files, components, comments, and team projects.
icon_file: assets/icon.svg
provider:
  config_schema_path: schemas/config.schema.yaml
  connections:
    default:
      auth:
        type: oauth2
        authorization_url: https://www.figma.com/oauth
        token_url: https://api.figma.com/v1/oauth/token
        client_auth: header
        pkce: true
        scopes:
          - current_user:read
          - file_content:read
          - file_metadata:read
          - file_versions:read
          - file_comments:read
          - file_comments:write
          - file_dev_resources:read
          - file_dev_resources:write
          - projects:read
          - library_assets:read
          - library_content:read
          - team_library_content:read
          - webhooks:read
          - webhooks:write
  surfaces:
    openapi:
      document: https://raw.githubusercontent.com/figma/rest-api-spec/main/openapi/openapi.yaml
