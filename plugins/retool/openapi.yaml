  /users/{userId}/user_attributes/{attributeName}:
    delete:
      summary: Delete a user attribute
      description: Deletes a user attribute and returns the updated user metadata. Requires the `users:write` or `user_attributes:write` scope.
      tags:
      - User Attributes
      x-badges:
      - color: green
        label: Business
      - color: blue
        label: Enterprise
      parameters:
      - schema:
          type: string
          pattern: user_([a-z0-9]+)
          description: The unique identifier for the user.
          example: user_1234
        required: true
        name: userId
        in: path
      - schema:
          type: string
          description: The name of the user attribute to delete.
        required: true
        name: attributeName
        in: path
      responses:
        '200':
          description: The updated user metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                    - true
                    description: Whether the API request was successful.
                  data:
                    type: object
                    properties:
                      metadata:
                        type: object
                        additionalProperties:
                          nullable: true
                        default: {}
                        description: The updated user metadata, without the deleted attribute.
                    required:
                    - metadata
                required:
                - success
                - data
