      - color: blue
        label: Enterprise
      parameters:
      - schema:
          type: string
          enum:
          - PENDING
          - APPROVED
          - DENIED
          description: The status of the access request
        required: false
        name: status
        in: query
      - schema:
          type: integer
          minimum: 1
          maximum: 100
          description: 'Maximum number of items to return per page. If not provided, all items are returned. When provided, enables pagination and the response will include next_token for retrieving subsequent pages. Valid range: 1-100.'
          example: 50
        required: false
        name: limit
        in: query
      - schema:
          type: string
          description: Cursor token for retrieving the next page of results. Obtained from the next_token field of a previous paginated response. Only valid when the limit parameter is also provided.
          example: eyJsYXN0SWQiOjEyM30...
        required: false
        name: next_token
        in: query
      responses:
        '200':
          description: A list of access requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                    - true
                    description: Whether the API request was successful.
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: number
                        status:
                          type: string
                          enum:
                          - PENDING
                          - APPROVED
                          - DENIED
                        legacy_id:
                          type: number
                        requesting_email:
                          type: string
                        updated_by_id:
                          type: string
                          nullable: true
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                      required:
                      - id
                      - status
                      - legacy_id
                      - requesting_email
                      - updated_by_id
                      - created_at
                      - updated_at
                      description: Access Request
                    description: An array of requested items.
                  total_count:
                    type: number
                    description: Total number of items in the response.
                  next_token:
                    type: string
                    nullable: true
                    description: A token to retrieve the next page of items in the collection.
                  has_more:
                    type: boolean
                    description: Whether there are more items in the collection.
