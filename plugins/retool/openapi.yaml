                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        pattern: user_([a-z0-9]+)
                        description: The ID of the user.
                        example: user_1234
                      legacy_id:
                        type: number
                        description: The legacy ID of the user.
                      email:
                        type: string
                        format: email
                        description: The email of the user.
                      active:
                        type: boolean
                        description: Whether the user is active or not.
                      created_at:
                        type: string
                        format: date-time
                        description: The timestamp when the user was created.
                        example: '2019-02-08T11:45:48.899Z'
                      last_active:
                        type: string
                        nullable: true
                        format: date-time
                        description: The timestamp when the user was last active.
                        example: '2019-02-08T11:45:48.899Z'
                      first_name:
                        type: string
                        nullable: true
                        minLength: 1
                        maxLength: 36
                        description: The first name of the user.
                      last_name:
                        type: string
                        nullable: true
                        minLength: 1
                        maxLength: 36
                        description: The last name of the user.
                      metadata:
                        type: object
                        additionalProperties:
                          nullable: true
                        default: {}
                        description: Custom metadata associated with the user.
                      is_admin:
                        type: boolean
                        description: Whether the user is an admin or not.
                      user_type:
                        type: string
                        enum:
                        - default
                        - mobile
                        - embed
                        description: The user type.
                      two_factor_auth_enabled:
                        type: boolean
                        description: Whether two-factor authentication is enabled for this user.
                      groups:
                        type: array
                        items:
                          type: object
                          properties:
                            legacy_id:
                              type: number
                              nullable: true
                              description: The legacy ID of the group.
                            id:
                              type: number
                              nullable: true
