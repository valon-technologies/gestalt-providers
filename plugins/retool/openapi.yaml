openapi: 3.0.0
info:
  version: 3.387.0
  title: Retool API
  description: "The Retool API enables you to programmatically perform actions across your organization and its spaces. You can perform RESTful requests to manage a wide range of objects, such as adding users or updating resource configurations.\n\n## Base URL\n\nAll endpoints are relative to your Retool instance URL:\n\n```\nhttps://{your-retool-instance}/api/v2\n```\n\n## Authentication\n\nThe Retool API uses HTTP Bearer authentication scheme with API tokens to authenticate requests. Users with sufficient permissions can create API tokens in the organization's [Retool API settings](/auth/login?redirectOnLogin=settings/api). Each token can be scoped to specific permissions\u2014only grant the scopes needed for your use case.\n\n```\nAuthorization: Bearer YOUR_API_TOKEN\n```\n\n## Versioning\n\nThe API version corresponds to the Retool release version in which it was shipped. This means the API version reflects the features and endpoints available in that release. When you upgrade your Retool\
    \ instance, the API version updates alongside it and any new endpoints or capabilities introduced in that release become available."
externalDocs:
  description: Retool API Documentation
  url: /reference
servers:
- url: https://api.retool.com/api/v2
security:
- BearerAuth: []
tags:
- name: Users
  description: Manage user accounts at the organization level. Users are created in the organization and must be granted access to specific spaces through `groups`.
- name: Groups
  description: Manage permission groups for the organization or specific spaces. Groups control which users have access to certain functions and features, such as `apps`, `resources`, and `workflows`. Add or remove users from groups to grant or revoke access.
- name: Folders
  description: Manage app, workflow, resource, agent, and library folders within your organization.
- name: Spaces
  description: Manage spaces within your organization. Spaces enable organizations to implement isolated, multitenant experiences without the need for multiple instances. Create spaces, copy elements between spaces, and manage space settings. User access to spaces is controlled through `groups`.
- name: Apps
  description: Manage apps within your organization.
- name: Workflows
  description: Manage workflows within your organization.
- name: Resources
  description: Manage resources within your organization.
- name: Resource Configurations
  description: Manage environment-specific configurations for resources. Resource configurations allow you to define different settings for a resource based on the environment (e.g., development, staging, production) in which it is used.
- name: Permissions
  description: Manage access permissions for `apps` and `folders`. Grant or revoke permissions for `groups`, and retrieve access lists for specific objects.
- name: User Attributes
  description: Manage custom attributes for users in your organization. User attributes store additional metadata about users and can be used to control access and personalize app behavior.
- name: User Invites
  description: Manage pending invitations to your organization. Create, retrieve, and delete user invites, and manage user attributes on invites before users accept.
- name: Access Tokens
  description: Manage API access tokens for your organization. Access tokens authenticate API requests and can be scoped to specific permissions.
- name: Access Requests
  description: Manage requests from users who need access to `apps` or other resources. Approve or deny pending access requests within your organization.
- name: Environments
  description: Manage environments within your organization. Environments allow you to run `resources` against different configurations, such as development, staging, and production.
- name: Configuration Variables
  description: Manage configuration variables across your organization. Config variables store environment-specific values that can be referenced by `resources` and queries.
- name: SSO
  description: Manage single sign-on (SSO) configuration for your organization. Configure and remove identity provider settings to control how users authenticate.
- name: Custom Component Libraries
  description: Manage custom component libraries in your organization. Custom component libraries extend the Retool component set with reusable components built with standard web technologies.
- name: Source Control
  description: Manage source control configuration and deployments for your organization. Connect a Git provider, deploy changes, and track deployment history.
- name: Release Management
  description: Manage release manifests and versioned releases for `apps` within your organization. Release manifests define which version of each app is promoted to production.
- name: App Themes
  description: Manage app themes within your organization. Themes define the visual style of your apps, including colors, typography, and component defaults.
- name: Organization
  description: Manage your Retool organization. An organization is a distinct collection of users and data. They operate separately from one another, have their own configuration settings, and are where users share access to work.
- name: Usage
  description: Retrieve usage data for your organization. Access summaries and detailed breakdowns of page views, active users, and app activity across organizations.
- name: User Tasks
  description: Manage user tasks generated by `workflows`. List, submit, cancel, and reassign tasks assigned to users or `groups`.
- name: Workflow Runs
  description: Retrieve details about individual workflow run executions.
- name: Processes
  description: Trigger and manage process runs within your organization.
- name: Observability
  description: Manage observability configurations for your organization. Connect an observability provider to receive error events and monitor your Retool instance.
- name: Info
  description: Retrieve system information for your Retool instance, such as IP allowlists by region.
components:
  schemas:
    user:
      type: object
      properties:
        id:
          type: string
          pattern: user_([a-z0-9]+)
          description: The ID of the user.
          example: user_1234
        legacy_id:
          type: number
          description: The legacy ID of the user.
        email:
          type: string
          format: email
          description: The email of the user.
        active:
          type: boolean
          description: Whether the user is active or not.
        created_at:
          type: string
          format: date-time
          description: The timestamp when the user was created.
          example: '2019-02-08T11:45:48.899Z'
        last_active:
          type: string
          nullable: true
          format: date-time
          description: The timestamp when the user was last active.
          example: '2019-02-08T11:45:48.899Z'
        first_name:
          type: string
          nullable: true
          minLength: 1
          maxLength: 36
          description: The first name of the user.
        last_name:
          type: string
          nullable: true
          minLength: 1
          maxLength: 36
          description: The last name of the user.
        metadata:
          type: object
          additionalProperties:
            nullable: true
          default: {}
          description: Custom metadata associated with the user.
        is_admin:
          type: boolean
          description: Whether the user is an admin or not.
        user_type:
          type: string
          enum:
          - default
          - mobile
          - embed
          description: The user type.
        two_factor_auth_enabled:
          type: boolean
          description: Whether two-factor authentication is enabled for this user.
      required:
      - id
      - legacy_id
      - email
      - active
      - created_at
      - last_active
      - first_name
      - last_name
      - metadata
      - is_admin
      - user_type
      - two_factor_auth_enabled
      additionalProperties: false
      description: This object represents a user.
    group:
      type: object
      properties:
        id:
          type: number
          nullable: true
          description: The ID of the group. Currently this is the same legacy_id but will change in the future.
        legacy_id:
          type: number
          nullable: true
          description: The legacy ID of the group.
        name:
          type: string
          description: The name of the group.
        members:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                pattern: user_([a-z0-9]+)
                description: The unique identifier for the user.
                example: user_1234
              email:
                type: string
                format: email
                description: The email of the user.
              is_group_admin:
                type: boolean
                default: false
                description: Whether the user is a group admin.
            required:
            - id
            - email
            - is_group_admin
          description: The members of the group.
        universal_app_access:
          type: string
          enum:
          - none
          - use
          - edit
          - own
          description: The universal app access level for the group. This denotes the access level that this group has for all apps.
        universal_resource_access:
          type: string
          enum:
          - none
          - use
          - edit
          - own
          description: The universal resource access level for the group. This denotes the access level that this group has for all resources.
        universal_workflow_access:
          type: string
          enum:
          - none
          - use
          - edit
          - own
          description: The universal workflow access level for the group. This denotes the access level that this group has for all workflows.
        universal_query_library_access:
          type: string
          enum:
          - none
          - use
          - edit
          description: Level of access that the group has to the Query Library.
        user_invites:
          type: array
          items:
            type: object
            properties:
              id:
                type: number
              legacy_id:
                type: number
              invited_by:
                type: string
              invited_email:
                type: string
                format: email
              expires_at:
                type: string
              claimed_by:
                type: string
                nullable: true
              claimed_at:
                type: string
                nullable: true
              user_type:
                type: string
                nullable: true
                enum:
                - default
                - mobile
                - external
              metadata:
                type: object
                nullable: true
                additionalProperties:
                  nullable: true
                default: {}
              created_at:
                type: string
              invite_link:
                type: string
                format: uri
                description: User invite link expires 7 days after generation.
              groups:
                type: array
                items:
                  type: object
                  properties:
                    legacy_id:
                      type: number
                    id:
                      type: number
                    name:
                      type: string
                  required:
                  - legacy_id
                  - id
                  - name
                description: The groups that the user is invited to
            required:
            - id
            - legacy_id
            - invited_by
            - invited_email
            - expires_at
            - claimed_by
            - claimed_at
            - user_type
            - metadata
            - created_at
            description: User Invite
          description: A list of user invites that will be added to the group.
        user_list_access:
          type: boolean
          description: Whether the group has access to the user list.
        audit_log_access:
          type: boolean
          description: Whether the group has access to the audit log.
        unpublished_release_access:
          type: boolean
          description: Whether the group has access to unpublished releases.
        usage_analytics_access:
          type: boolean
          description: Whether the group has access to usage analytics.
        theme_access:
          type: boolean
          description: Whether the group has access to edit themes.
        account_details_access:
          type: boolean
          description: Whether the group has access to account details.
        landing_page_app_id:
          type: string
          nullable: true
          format: uuid
          description: The app ID of the landing page.
        created_at:
          type: string
          example: '2019-02-08T11:45:48.899Z'
        updated_at:
          type: string
          example: '2019-02-24T18:28:18.790Z'
      required:
      - id
      - legacy_id
      - name
      - members
      - universal_app_access
      - universal_resource_access
      - universal_workflow_access
      - universal_query_library_access
      - user_invites
      - user_list_access
      - audit_log_access
      - unpublished_release_access
      - usage_analytics_access
      - theme_access
      - account_details_access
      - landing_page_app_id
      - created_at
      - updated_at
      description: This object represents a permission group. A permission group is a list of users by which to restrict access. You add users to one or more groups and then configure the group's level of access. This applies the same permissions to all group members. See https://docs.retool.com/org-users/concepts/permission-groups or more information.
    folder:
      type: object
      properties:
        id:
          type: string
          pattern: ^(app|workflow|resource|agent|library)_([0-9]\d*)$
          description: The id of the folder. Currently this is the same as legacy_id but will be different in the future.
        legacy_id:
          type: string
          pattern: ^(app|workflow|resource|agent|library)_([0-9]\d*)$
          description: The legacy id of the folder.
        name:
          type: string
          description: The name of the folder
        parent_folder_id:
          type: string
          nullable: true
          pattern: ^(app|workflow|resource|agent|library)_([0-9]\d*)$
          description: The id of the parent folder
        is_system_folder:
          type: boolean
          description: Whether the folder is a system folder
        folder_type:
          type: string
          enum:
          - app
          - workflow
          - resource
          - agent
          - library
          description: The type of the folder
        created_at:
          type: string
          example: '2019-02-08T11:45:48.899Z'
        updated_at:
          type: string
          example: '2019-02-24T18:28:18.790Z'
      required:
      - id
      - legacy_id
      - name
      - is_system_folder
      - folder_type
      - created_at
      - updated_at
      description: This object represents app, resource and workflows folders.
    space:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The id of the space.
        name:
          type: string
          minLength: 1
        domain:
          type: string
          minLength: 1
        created_at:
          type: string
          format: date-time
          example: '2019-02-08T11:45:48.899Z'
        updated_at:
          type: string
          format: date-time
          example: '2019-02-24T18:28:18.790Z'
      required:
      - id
      - name
      - domain
      - created_at
      - updated_at
      additionalProperties: false
      description: This object represents a space. Spaces can be used to separate your organization's data.
    source_control_configuration:
      anyOf:
      - type: object
        properties:
          config:
            anyOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                  - App
                app_id:
                  type: string
                  description: The GitHub App ID.
                installation_id:
                  type: string
                  description: The GitHub installation ID. This can be found at the end of the installation URL.
                private_key:
                  type: string
                  description: The base64-encoded private key.
                url:
                  type: string
                  description: The domain used to access your self-hosted GitHub instance.
                enterprise_api_url:
                  type: string
                  description: The REST API route for your self-hosted GitHub instance. Defaults to https://[hostname]/api/v3.
              required:
              - type
              - app_id
              - installation_id
              - private_key
              additionalProperties: false
            - type: object
              properties:
                type:
                  type: string
                  enum:
                  - Personal
                personal_access_token:
                  type: string
                  description: "The GitHub project access token to authenticate to the GitHub API.\t"
                url:
                  type: string
                  description: The domain used to access your self-hosted GitHub instance.
                enterprise_api_url:
                  type: string
                  description: The REST API route for your self-hosted GitHub instance. Defaults to https://[hostname]/api/v3.
              required:
              - type
              - personal_access_token
              additionalProperties: false
          provider:
            type: string
            enum:
            - GitHub
          org:
            type: string
            description: The user or organization to which the repository belongs to.
          repo:
            type: string
            description: The name of the repository you created to use with Retool.
          default_branch:
            type: string
            description: The default branch, e.g., main.
          repo_version:
            type: string
            description: Repositories using Toolscript are 2.0.0. Repositories using legacy YAML are 1.0.0.
        required:
        - config
        - provider
        - org
        - repo
        - default_branch
        title: GitHub
      - type: object
        properties:
          config:
            type: object
            properties:
              project_id:
                type: number
                description: The numerical project ID for your GitLab project. Find this ID listed below the project's name on the project's homepage.
              url:
                type: string
                description: Your base GitLab URL. On GitLab Cloud, this is always https://gitlab.com. On GitLab self-managed, this is the URL where your instance is hosted.
              project_access_token:
                type: string
                description: The GitLab project access token to authenticate to the GitLab API.
            required:
            - project_id
            - url
            - project_access_token
            additionalProperties: false
          provider:
            type: string
            enum:
            - GitLab
          org:
            type: string
            description: The user or organization to which the repository belongs to.
          repo:
            type: string
            description: The name of the repository you created to use with Retool.
          default_branch:
            type: string
            description: The default branch, e.g., main.
          repo_version:
            type: string
            description: Repositories using Toolscript are 2.0.0. Repositories using legacy YAML are 1.0.0.
        required:
        - config
        - provider
        - org
        - repo
        - default_branch
        title: GitLab
      - type: object
        properties:
          config:
            type: object
            properties:
              url:
                type: string
                description: The domain used to access your self-hosted AWS CodeCommit instance.
              region:
                type: string
                description: The region of the CodeCommit repository.
              access_key_id:
                type: string
                description: The Access key ID from your AWSCodeCommitFullAccess policy.
              secret_access_key:
                type: string
                description: The Secret Access Key from your AWSCodeCommitFullAccess policy
              https_username:
                type: string
                description: The HTTPS username from your security credentials.
              https_password:
                type: string
                description: The HTTPS password from your security credentials.
            required:
            - url
            - region
            - access_key_id
            - secret_access_key
            - https_username
            - https_password
            additionalProperties: false
          provider:
            type: string
            enum:
            - AWS CodeCommit
          org:
            type: string
            description: The user or organization to which the repository belongs to.
          repo:
            type: string
            description: The name of the repository you created to use with Retool.
          default_branch:
            type: string
            description: The default branch, e.g., main.
          repo_version:
            type: string
            description: Repositories using Toolscript are 2.0.0. Repositories using legacy YAML are 1.0.0.
        required:
        - config
        - provider
        - org
        - repo
        - default_branch
        title: AWS CodeCommit
      - type: object
        properties:
          config:
            anyOf:
            - type: object
              properties:
                type:
                  type: string
                  enum:
                  - AppPassword
                username:
                  type: string
                  description: Your Bitbucket username.
                app_password:
                  type: string
                  description: Your Bitbucket app password.
                url:
                  type: string
                  description: The domain used to access your self-hosted Bitbucket instance. Defaults to https://bitbucket.org/.
                enterprise_api_url:
                  type: string
                  description: "The REST API route for your self-hosted Bitbucket instance. Defaults to https://api.bitbucket.org/2.0.\t"
              required:
              - type
              - username
              - app_password
              additionalProperties: false
            - type: object
              properties:
                type:
                  type: string
                  enum:
                  - Token
                token:
                  type: string
                  description: Your Bitbucket API token.
                url:
                  type: string
                  description: The domain used to access your self-hosted Bitbucket instance. Defaults to https://bitbucket.org/.
                enterprise_api_url:
                  type: string
                  description: "The REST API route for your self-hosted Bitbucket instance. Defaults to https://api.bitbucket.org/2.0.\t"
              required:
              - type
              - token
              additionalProperties: false
          provider:
            type: string
            enum:
            - Bitbucket
          org:
            type: string
            description: The user or organization to which the repository belongs to.
          repo:
            type: string
            description: The name of the repository you created to use with Retool.
          default_branch:
            type: string
            description: The default branch, e.g., main.
          repo_version:
            type: string
            description: Repositories using Toolscript are 2.0.0. Repositories using legacy YAML are 1.0.0.
        required:
        - config
        - provider
        - org
        - repo
        - default_branch
        title: Bitbucket
      - type: object
        properties:
          config:
            type: object
            properties:
              url:
                type: string
                description: Your base Azure URL. For Azure Cloud, this is always http://dev.azure.com. For Azure self-managed, this is the URL where your instance is hosted.
              project:
                type: string
                description: Your new or existing Azure DevOps project.
              user:
                type: string
                description: The Azure Repos username.
              personal_access_token:
                type: string
                description: The Azure project access tokens to authenticate to the Azure API.
              use_basic_auth:
                type: boolean
                description: Set this to true if you are using self-hosted Azure Repos.
            required:
            - url
            - project
            - user
            - personal_access_token
            - use_basic_auth
            additionalProperties: false
          provider:
            type: string
            enum:
            - Azure Repos
          org:
            type: string
            description: The user or organization to which the repository belongs to.
          repo:
            type: string
            description: The name of the repository you created to use with Retool.
          default_branch:
            type: string
            description: The default branch, e.g., main.
          repo_version:
            type: string
            description: Repositories using Toolscript are 2.0.0. Repositories using legacy YAML are 1.0.0.
        required:
        - config
        - provider
        - org
        - repo
        - default_branch
        title: Azure Repos
      description: This object represents the Source Control provider configuration for the organization or space. See [docs](https://docs.retool.com/source-control) for more information.
    source_control_settings:
      type: object
      properties:
        auto_branch_naming_enabled:
          type: boolean
          description: When enabled, Retool automatically suggests a branch name on branch creation. Defaults to true.
        custom_pull_request_template_enabled:
          type: boolean
          description: When enabled, Retool will use the template specified to create pull requests. Defaults to false.
        custom_pull_request_template:
          type: string
          description: Pull requests created from Retool will use the template specified.
        version_control_locked:
          type: boolean
          description: When set to true, creates a read-only instance of Retool, where app editing is disabled. Defaults to false.
        force_uuid_mapping:
          type: boolean
          description: When set to true, creates a uuid mapping for protected elements to be used in the source control repo. Defaults to false.
        auto_cleanup_branches_enabled:
          type: boolean
          description: When set to true, Retool will automatically delete branches after changes are merged if the remote branch no longer exists and there are no uncommitted changes. Defaults to true.
      required:
      - auto_branch_naming_enabled
      - custom_pull_request_template_enabled
      - custom_pull_request_template
      - version_control_locked
      - force_uuid_mapping
      - auto_cleanup_branches_enabled
    app_theme:
      type: object
      properties:
        id:
          type: number
        legacy_id:
          type: number
        name:
          type: string
          description: The name of the app theme.
        theme:
          type: object
          additionalProperties:
            nullable: true
          description: The theme object.
        created_at:
          type: string
          format: date-time
          description: Date and time when the app theme was created.
        updated_at:
          type: string
          format: date-time
          description: Date and time when the app theme was last updated.
      required:
      - id
      - legacy_id
      - name
      - theme
      - created_at
      - updated_at
      description: This object represents an app theme. App themes allow you to customize the look of your app. See https://docs.retool.com/apps/web/concepts/themes for more information.
    app:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The app ID.
        name:
          type: string
          description: The name of the App
        description:
          type: string
          nullable: true
          description: The description of the App
        folder_id:
          type: string
          pattern: ^(app|workflow|resource|agent|library)_([0-9]\d*)$
          description: The id of the folder
        protected:
          type: boolean
          description: Whether the App is protected
        synced:
          type: boolean
          description: Whether the App is synced
        shortlink:
          type: string
          nullable: true
          description: The shortlink of the App
        is_module:
          type: boolean
          description: Whether the App is a module
        is_mobile_app:
          type: boolean
          description: Whether the App is a mobile app
        created_at:
          type: string
          example: '2019-02-08T11:45:48.899Z'
        updated_at:
          type: string
          example: '2019-02-24T18:28:18.790Z'
        release_version:
          type: string
          description: The live release version of the app. 'latest' if releases are disabled or the app has no live release yet
      required:
      - id
      - name
      - description
      - folder_id
      - protected
      - synced
      - shortlink
      - is_module
      - is_mobile_app
      - created_at
      - updated_at
      - release_version
      description: This object represents an app.
    sso_configuration:
      oneOf:
      - type: object
        properties:
          config_type:
            type: string
            enum:
            - google
          google_client_id:
            type: string
          google_client_secret:
            type: string
          disable_email_password_login:
            type: boolean
        required:
        - config_type
        - google_client_id
        - google_client_secret
        - disable_email_password_login
        additionalProperties: false
        title: Google
      - type: object
        properties:
          config_type:
            type: string
            enum:
            - oidc
          oidc_client_id:
            type: string
            minLength: 1
          oidc_client_secret:
            type: string
            minLength: 1
          oidc_scopes:
            type: string
            minLength: 1
          oidc_auth_url:
            type: string
            minLength: 1
          oidc_token_url:
            type: string
            minLength: 1
          oidc_userinfo_url:
            type: string
            minLength: 1
          oidc_audience:
            type: string
          oidc_end_session_url:
            type: string
            minLength: 1
          jwt_email_key:
