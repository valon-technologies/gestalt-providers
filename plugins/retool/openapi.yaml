                    - email
                    - active
                    - created_at
                    - last_active
                    - first_name
                    - last_name
                    - metadata
                    - is_admin
                    - user_type
                    - two_factor_auth_enabled
                    additionalProperties: false
                    description: This object represents a user.
                required:
                - success
                - data
                description: A single user.
