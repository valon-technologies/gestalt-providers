  /users/reset2fa/{userId}:
    put:
      summary: Reset a user's two-factor authentication
      description: Disables all two-factor authentication methods for the specified user. Requires the `users:write` scope.
      tags:
      - Users
      x-badges:
      - color: blue
        label: Enterprise
      parameters:
      - schema:
          type: string
          pattern: user_([a-z0-9]+)
          description: The unique identifier for the user.
          example: user_1234
        required: true
        name: userId
        in: path
      responses:
        '204':
          description: Two-factor authentication has been successfully reset.
      operationId: users.resetUsersTwoFactorAuthentication
  /users/{userId}/logout:
    post:
      summary: Log out a user
      description: Terminates all active Retool sessions for the specified user. Optionally initiates an RP-initiated logout with the configured OIDC SSO provider by returning an `sso_logout_url` that the caller must redirect the user's browser to. Requires the `users:write` scope.
      tags:
      - Users
      parameters:
      - schema:
          type: string
          pattern: user_([a-z0-9]+)
          description: The unique identifier for the user.
          example: user_1234
        required: true
        name: userId
        in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                sso_logout:
                  type: boolean
                  default: false
                  description: If true, also initiates an RP-initiated logout with the configured SSO provider.
                post_logout_redirect_uri:
                  type: string
                  format: uri
                  description: URI to redirect the user to after SSO logout completes. Only valid when sso_logout is true. Must be registered in your SSO provider.
              additionalProperties: false
              description: Body of request to log out a user.
      responses:
        '200':
          description: The user has been logged out.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                    - true
                    description: Whether the API request was successful.
                  data:
                    type: object
                    properties:
                      sso_logout:
                        type: boolean
                        description: Whether SSO logout was initiated.
                      sso_logout_url:
                        type: string
                        description: URL to redirect the user browser to for IdP session logout.
                      warning:
                        type: string
                        description: Warning message if SSO logout could not be performed.
                    required:
                    - sso_logout
                    additionalProperties: false
                    description: Response data from logging out a user.
                required:
                - success
                - data
      operationId: users.logOutUser
  /users/{userId}/user_attributes:
    post:
      summary: Create or update a user attribute
      description: Creates or updates a user attribute and returns the updated user metadata. Requires the `users:write` or `user_attributes:write` scope.
      tags:
      - User Attributes
      x-badges:
      - color: green
        label: Business
      - color: blue
        label: Enterprise
      parameters:
      - schema:
          type: string
          pattern: user_([a-z0-9]+)
          description: The unique identifier for the user.
          example: user_1234
        required: true
        name: userId
        in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the user attribute. Must match an existing attribute exactly.
                value:
                  type: string
                  nullable: true
                  description: The value of the user attribute.
              required:
              - name
              - value
              additionalProperties: false
              description: The body of a request to add a user attribute to a user or update an existing user attribute.
      responses:
        '200':
          description: The updated user metadata.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    enum:
                    - true
                    description: Whether the API request was successful.
                  data:
                    type: object
                    properties:
                      metadata:
                        type: object
                        additionalProperties:
                          nullable: true
                        default: {}
                        description: The updated user metadata, containing the new attribute value.
                    required:
                    - metadata
                required:
                - success
                - data
