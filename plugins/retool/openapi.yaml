                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        org_id:
                          type: string
                          description: The id of the organization
                        host:
                          type: string
                          description: The host of the organization
                        last_active:
                          type: string
                          format: date-time
                          example: '2019-02-08T11:45:48.899Z'
