                              nullable: true
                            claimed_at:
                              type: string
                              nullable: true
                            user_type:
                              type: string
                              nullable: true
                              enum:
                              - default
                              - mobile
                              - external
                            metadata:
                              type: object
                              nullable: true
                              additionalProperties:
                                nullable: true
                              default: {}
                            created_at:
                              type: string
