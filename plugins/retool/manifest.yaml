source: github.com/valon-technologies/gestalt-providers/plugins/retool
version: 0.0.1-alpha.1
displayName: Retool
description: Manage Retool Cloud users, groups, spaces, apps, resources, source control, releases, workflows, and CLI automation.
iconFile: assets/icon.svg
kind: plugin
spec:
  defaultConnection: default
  surfaces:
    openapi:
      connection: default
      document: openapi.yaml
  allowedOperations:
    users.getUser: {}
    users.deleteUser: {}
    users.updateUser: {}
    users.listUsers: {}
    users.createUser: {}
    users.resetUsersTwoFactorAuthentication: {}
    users.logOutUser: {}
    userAttributes.createUpdateUserAttribute: {}
    userAttributes.deleteUserAttribute: {}
    groups.deleteGroup: {}
    groups.getGroup: {}
    groups.updateGroup: {}
    groups.replaceGroup: {}
    groups.listGroups: {}
    groups.createGroup: {}
