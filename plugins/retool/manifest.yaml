    groups.removeUserFromGroup: {}
    groups.removeUserInviteFromGroup: {}
    folders.listFolders: {}
    folders.createFolder: {}
    folders.getFolder: {}
    folders.deleteFolder: {}
    folders.updateFolder: {}
    spaces.createSpace: {}
    spaces.listSpaces: {}
    spaces.getSpace: {}
    spaces.updateSpace: {}
    spaces.deleteSpace: {}
    spaces.copyElementsAnotherSpace: {}
    sourceControl.getSourceControlConfiguration: {}
    sourceControl.createSourceControlConfiguration: {}
    sourceControl.setSourceControlConfiguration: {}
    sourceControl.deleteSourceControlConfiguration: {}
    sourceControl.testSourceControlConnection: {}
    sourceControl.testSourceControlChanges: {}
    sourceControl.deployLatestChanges: {}
    sourceControl.getDeployment: {}
    sourceControl.listSourceControlDeployments: {}
    sourceControl.getSourceControlSettings: {}
    sourceControl.setSourceControlSettings: {}
    releaseManagement.listReleaseManifests: {}
    releaseManagement.getReleaseManifest: {}
    releaseManagement.setReleaseManifest: {}
    releaseManagement.deleteReleaseManifest: {}
    releaseManagement.setReleaseVersionElementManifest: {}
    releaseManagement.deleteElementFromReleaseManifest: {}
    releaseManagement.listAllAvailableReleasesGivenElement: {}
    releaseManagement.createReleaseArtifact: {}
    appThemes.getAppTheme: {}
    appThemes.deleteAppTheme: {}
    appThemes.listAppThemes: {}
    appThemes.createAppTheme: {}
    appThemes.updateAppTheme: {}
    apps.deleteApp: {}
    apps.getApp: {}
    apps.listApps: {}
    apps.cloneApp: {}
    sso.setSsoConfiguration: {}
    sso.removeSsoConfiguration: {}
    sso.getSsoConfiguration: {}
    userAttributes.listOrganizationUserAttributes: {}
    userAttributes.createOrganizationUserAttribute: {}
    userAttributes.updateOrganizationUserAttribute: {}
    userAttributes.deleteOrganizationUserAttribute: {}
    permissions.getAccessList: {}
    permissions.listObjectsGroupCanAccess: {}
    permissions.grantPermissions: {}
    permissions.revokePermissions: {}
    permissions.listRoles: {}
    permissions.createRole: {}
    permissions.deleteRole: {}
    permissions.updateRole: {}
    permissions.deleteRoleGrant: {}
    permissions.createRoleGrant: {}
    permissions.listRoleGrants: {}
    permissions.getRoleGrantsSubject: {}
    permissions.deleteRoleGrantSubject: {}
    accessRequests.listAccessRequests: {}
    accessRequests.getAccessRequest: {}
    accessRequests.approveDenyAccessRequest: {}
    accessTokens.listAccessTokens: {}
    accessTokens.createAccessToken: {}
    accessTokens.getAccessToken: {}
    userInvites.listUserInvites: {}
    userInvites.createUserInvite: {}
    userInvites.getUserInvite: {}
    userInvites.deleteUserInvite: {}
    userInvites.addUpdateUserAttributesOnUserInvite: {}
    userInvites.deleteUserAttributeOnUserInvite: {}
    resources.listResources: {}
    resources.createResource: {}
    resources.getResource: {}
    resources.updateResource: {}
    resources.deleteResource: {}
    resourceConfigurations.listResourceConfigurations: {}
    resourceConfigurations.createResourceConfiguration: {}
    resourceConfigurations.getResourceConfiguration: {}
    resourceConfigurations.deleteResourceConfiguration: {}
    resourceConfigurations.updateResourceConfiguration: {}
    environments.listEnvironments: {}
    environments.createEnvironment: {}
    environments.getEnvironment: {}
    environments.updateEnvironment: {}
    environments.deleteEnvironment: {}
    customComponentLibraries.getCustomComponentLibrary: {}
    customComponentLibraries.createCustomComponentLibrary: {}
    customComponentLibraries.listCustomComponentLibraries: {}
    customComponentLibraries.createCustomComponentLibraryRevision: {}
    customComponentLibraries.listRevisionsCustomComponentLibrary: {}
    customComponentLibraries.listFilesCustomComponentLibraryRevision: {}
    configurationVariables.listConfigurationVariablesTheirValues: {}
    configurationVariables.createConfigurationVariable: {}
    configurationVariables.getConfigurationVariable: {}
    configurationVariables.updateConfigurationVariable: {}
    configurationVariables.deleteConfigurationVariable: {}
    observability.createObservabilityConfiguration: {}
    observability.listObservabilityConfigurations: {}
    observability.updateObservabilityConfiguration: {}
    observability.deleteObservabilityConfiguration: {}
    observability.sendTestErrorEvent: {}
    usage.listOrganizations: {}
    usage.getUsageSummary: {}
    usage.getAppUsageSummaries: {}
    usage.getAppUsageDetails: {}
    usage.getUserUsageSummaries: {}
    usage.getUserUsageDetails: {}
    userTasks.listUserTasks: {}
    userTasks.submitUserTask: {}
    userTasks.cancelUserTask: {}
    userTasks.reassignUserTask: {}
