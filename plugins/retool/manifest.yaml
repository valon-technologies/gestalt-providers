    organization.updateOrgLevelCodeExecutorResourceSettings: {}
    workflows.listWorkflows: {}
    workflows.getWorkflow: {}
    workflows.deleteWorkflow: {}
    workflows.updateWorkflow: {}
    info.getIpAllowlistRegion: {}
  connections:
    default:
      mode: user
      auth:
        type: bearer
        credentials:
        - name: token
          label: Retool API Token
          description: Create a scoped access token in Retool under Settings > Retool API.
    cliSession:
      mode: user
      auth:
        type: manual
        credentials:
        - name: origin
          label: Retool Origin
          description: Retool org URL, for example https://your-org.retool.com.
        - name: access_token
          label: Retool accessToken Cookie
          description: Browser cookie named accessToken from your Retool org session.
        - name: xsrf_token
          label: Retool xsrfToken Cookie
          description: Browser cookie named xsrfToken from your Retool org session.
  responseMapping:
    dataPath: data
    pagination:
      hasMore:
        source: body
        path: has_more
      cursor:
        source: body
        path: next_token
  pagination:
    style: cursor
    cursorParam: next_token
    cursor:
      source: body
      path: next_token
    defaultLimit: 100
    resultsPath: data
