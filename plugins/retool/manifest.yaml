    organization.getOrganizationSettings: {}
    organization.updateOrganizationSettings: {}
    organization.invalidateAllSessions: {}
    organization.getOrganizationAiSettings: {}
    organization.updateOrganizationAiSettings: {}
    organization.getOrganizationAnalyticsIntegrations: {}
