source: github.com/valon-technologies/gestalt-providers/plugins/google_docs
version: 0.0.1-alpha.1
displayName: Google Docs
description: Read, create, and edit Google Docs documents.
iconFile: assets/icon.svg
kind: plugin
spec:
  configSchemaPath: schemas/config.schema.yaml
  surfaces:
    openapi:
      document: https://www.googleapis.com/discovery/v1/apis/docs/v1/rest
  allowedOperations:
    docs.documents.get:
      alias: get
    docs.documents.create:
      alias: create
    docs.documents.batchUpdate:
      alias: batchUpdate
  connections:
    default:
      auth:
        type: oauth2
        authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
        tokenUrl: https://oauth2.googleapis.com/token
        scopes:
        - https://www.googleapis.com/auth/documents
        authorizationParams:
          access_type: offline
          prompt: consent
