source: github.com/valon-technologies/gestalt-providers/ramp
version: 0.0.1-alpha.2
display_name: Ramp
description: Manage corporate cards, transactions, and reimbursements.
icon_file: assets/icon.svg
provider:
  config_schema_path: schemas/config.schema.yaml
  connections:
    default:
      auth:
        type: oauth2
        authorization_url: https://app.ramp.com/v1/authorize
        token_url: https://api.ramp.com/developer/v1/token
        client_auth: header
        scopes:
          - transactions:read
          - cards:read
          - cards:write
          - users:read
          - users:write
          - departments:read
          - reimbursements:read
          - receipts:read
          - limits:read
          - spend_programs:read
          - spend_programs:write
  surfaces:
    openapi:
      document: https://docs.ramp.com/openapi/developer-api.json
