source: github.com/valon-technologies/gestalt-providers/plugins/ramp
version: 0.0.1-alpha.3
displayName: Ramp
description: Manage corporate cards, transactions, and reimbursements.
iconFile: assets/icon.svg
kind: plugin
spec:
  configSchemaPath: schemas/config.schema.yaml
  surfaces:
    openapi:
      connection: oauth
      document: https://docs.ramp.com/openapi/developer-api.json
    mcp:
      connection: mcp
      url: https://mcp.ramp.com/mcp
  connections:
    oauth:
      displayName: OAuth
      mode: user
      auth:
        type: oauth2
        authorizationUrl: https://app.ramp.com/v1/authorize
        tokenUrl: https://api.ramp.com/developer/v1/token
        clientAuth: header
        scopes:
        - transactions:read
        - cards:read
        - cards:write
        - users:read
        - users:write
        - departments:read
        - reimbursements:read
        - receipts:read
        - limits:read
        - spend_programs:read
        - spend_programs:write
    mcp:
      displayName: MCP
      mode: user
      auth:
        type: mcp_oauth
