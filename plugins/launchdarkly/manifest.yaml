source: github.com/valon-technologies/gestalt-providers/plugins/launchdarkly
version: 0.0.1-alpha.1
displayName: LaunchDarkly
description: Manage feature flags and targeting rules.
iconFile: assets/icon.svg
kind: plugin
spec:
  surfaces:
    openapi:
      connection: default
      document: https://github.com/launchdarkly/ld-openapi/releases/download/16.1.1/openapi.json
  connections:
    default:
      mode: user
      auth:
        type: manual
        credentials:
        - name: token
          label: API Access Token
          description: See [Authorization](https://app.launchdarkly.com/settings/authorization) to create an access token
    identity:
      mode: identity
      auth:
        type: manual
        credentials:
        - name: token
          label: API Access Token
          description: See [Authorization](https://app.launchdarkly.com/settings/authorization) to create an access token
