name: vercel
operations:
- id: blob.put
  method: POST
  description: Upload a payload to Vercel Blob storage
  parameters:
  - name: pathname
    type: string
    description: Blob pathname inside the store
    required: true
  - name: access
    type: string
    description: 'Blob access mode: private or public'
    required: true
  - name: body
    type: string
    description: UTF-8 text payload to upload
    default: ''
  - name: body_base64
    type: string
    description: Base64-encoded payload to upload
    default: ''
  - name: content_type
    type: string
    description: Optional content type
    default: ''
  - name: add_random_suffix
    type: boolean
    description: Whether to append a random suffix to the pathname
    default: false
  - name: overwrite
    type: boolean
    description: Whether to overwrite an existing blob with the same pathname
    default: false
  - name: cache_control_max_age
    type: integer
    description: Optional cache-control max age in seconds
    default: null
- id: blob.get
  method: POST
  description: Download a blob from Vercel Blob storage
  parameters:
  - name: url_or_path
    type: string
    description: Blob URL or pathname
    required: true
  - name: access
    type: string
    description: 'Blob access mode: private or public'
    required: true
  - name: if_none_match
    type: string
    description: Optional ETag precondition
    default: ''
  - name: timeout_seconds
    type: number
    description: Optional request timeout in seconds
    default: null
  - name: use_cache
    type: boolean
    description: Whether the SDK should use cached content
    default: true
- id: blob.head
  method: POST
  description: Fetch metadata for a Vercel Blob object
  parameters:
  - name: url_or_path
    type: string
    description: Blob URL or pathname
    required: true
- id: blob.list
  method: POST
  description: List Vercel Blob objects in the configured store
  parameters:
  - name: prefix
    type: string
    description: Optional pathname prefix
    default: ''
  - name: limit
    type: integer
    description: Optional page size
    default: null
  - name: cursor
    type: string
    description: Optional pagination cursor
    default: ''
  - name: mode
    type: string
    description: Optional list mode, such as expanded or folded
    default: ''
- id: blob.delete
  method: POST
  description: Delete one or more Vercel Blob objects
  parameters:
  - name: targets
    type: array
    description: Blob URLs or pathnames to delete
    required: true
- id: blob.copy
  method: POST
  description: Copy a blob to a new pathname in the same Vercel Blob store
  parameters:
  - name: source_url_or_path
    type: string
    description: Source blob URL or pathname
    required: true
  - name: destination_path
    type: string
    description: Destination pathname inside the store
    required: true
  - name: access
    type: string
    description: 'Blob access mode for the copied object: private or public'
    required: true
  - name: content_type
    type: string
    description: Optional content type for the copied object
    default: ''
  - name: add_random_suffix
    type: boolean
    description: Whether to append a random suffix to the destination pathname
    default: false
  - name: overwrite
    type: boolean
    description: Whether to overwrite an existing destination blob
    default: false
  - name: cache_control_max_age
    type: integer
    description: Optional cache-control max age in seconds
    default: null
