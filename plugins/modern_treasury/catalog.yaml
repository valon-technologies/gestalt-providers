name: modern_treasury
operations:
  - id: counterparties.list
    method: GET
    description: List Modern Treasury counterparties.
    parameters:
      - name: after_cursor
        type: string
        description: Pagination cursor returned by a previous Modern Treasury list
          request.
        default: null
      - name: per_page
        type: integer
        description: Maximum number of records to return.
        default: null
      - name: query_json
        type: string
        description: Optional JSON object of additional official query parameters
          to pass through unchanged.
        default: ''
    read_only: true
  - id: externalAccounts.list
    method: GET
    description: List Modern Treasury external accounts.
    parameters:
      - name: after_cursor
        type: string
        description: Pagination cursor returned by a previous Modern Treasury list
          request.
        default: null
      - name: per_page
        type: integer
        description: Maximum number of records to return.
        default: null
      - name: query_json
        type: string
        description: Optional JSON object of additional official query parameters
          to pass through unchanged.
        default: ''
    read_only: true
  - id: externalAccounts.get
    method: GET
    description: Get a single Modern Treasury external account.
    parameters:
      - name: id
        type: string
        description: Modern Treasury object ID.
        required: true
    read_only: true
  - id: externalAccounts.create
    method: POST
    description: Create a Modern Treasury external account.
    parameters:
      - name: counterparty_id
        type: string
        description: Counterparty ID that will own the external account.
        required: true
      - name: idempotency_key
        type: string
        description: Idempotency key for the create request.
        required: true
      - name: name
        type: string
        description: Display name for the external account.
        default: ''
      - name: account_type
        type: string
        description: Depository account type, for example checking or savings.
        default: ''
      - name: party_name
        type: string
        description: Name of the account holder.
        default: ''
      - name: party_type
        type: string
        description: Counterparty party type.
        default: ''
      - name: account_number
        type: string
        description: Bank account number. Required unless plaid_processor_token is
          supplied.
        default: ''
      - name: account_number_type
        type: string
        description: Modern Treasury account number type, usually other.
        default: other
      - name: routing_number
        type: string
        description: Routing number. Required unless plaid_processor_token is supplied.
        default: ''
      - name: routing_number_type
        type: string
        description: Routing number type such as aba or swift.
        default: ''
      - name: payment_type
        type: string
        description: Optional payment rail hint for the routing detail.
        default: ''
      - name: plaid_processor_token
        type: string
        description: Plaid processor token used instead of direct account and routing
          details.
        default: ''
      - name: external_id
        type: string
        description: Optional external ID.
        default: ''
      - name: metadata_json
        type: string
        description: Optional JSON object of metadata to attach to the external account.
        default: ''
      - name: party_address_json
        type: string
        description: Optional JSON object matching Modern Treasury's party_address
          shape.
        default: ''
      - name: payload_json
        type: string
        description: Optional full JSON payload. When provided, it is sent as-is and
          other fields are ignored.
        default: ''
  - id: paymentOrders.list
    method: GET
    description: List Modern Treasury payment orders.
    parameters:
      - name: after_cursor
        type: string
        description: Pagination cursor returned by a previous Modern Treasury list
          request.
        default: null
      - name: per_page
        type: integer
        description: Maximum number of records to return.
        default: null
      - name: query_json
        type: string
        description: Optional JSON object of additional official query parameters
          to pass through unchanged.
        default: ''
    read_only: true
  - id: paymentOrders.get
    method: GET
    description: Get a single Modern Treasury payment order.
    parameters:
      - name: id
        type: string
        description: Modern Treasury object ID.
        required: true
    read_only: true
  - id: paymentOrders.create
    method: POST
    description: Create a Modern Treasury payment order.
    parameters:
      - name: idempotency_key
        type: string
        description: Idempotency key for the create request.
        required: true
      - name: amount
        type: integer
        description: Amount in the currency's smallest unit, for example cents.
        required: true
      - name: direction
        type: string
        description: Payment direction, such as credit or debit.
        required: true
      - name: originating_account_id
        type: string
        description: Originating internal account ID.
        required: true
      - name: type
        type: string
        description: Payment order type, such as ach, wire, or check.
        required: true
      - name: currency
        type: string
        description: ISO currency code.
        default: USD
      - name: receiving_account_id
        type: string
        description: Receiving account ID.
        default: ''
      - name: description
        type: string
        description: Payment description.
        default: ''
      - name: effective_date
        type: string
        description: Effective date in YYYY-MM-DD format.
        default: ''
      - name: process_after
        type: string
        description: Process-after timestamp in ISO-8601 format.
        default: ''
      - name: metadata_json
        type: string
        description: Optional JSON object of payment metadata.
        default: ''
      - name: remittance_information
        type: string
        description: Optional remittance information for ACH and wire payments.
        default: ''
      - name: statement_descriptor
        type: string
        description: Optional statement descriptor for check payments.
        default: ''
      - name: external_id
        type: string
        description: Optional external ID.
        default: ''
      - name: priority
        type: string
        description: Optional payment priority.
        default: ''
      - name: ledger_transaction_id
        type: string
        description: Optional ledger transaction ID.
        default: ''
      - name: payload_json
        type: string
        description: Optional full JSON payload. When provided, it is sent as-is and
          other fields are ignored.
        default: ''
  - id: paymentOrders.cancel
    method: PATCH
    description: Cancel a Modern Treasury payment order by setting its status to cancelled.
    parameters:
      - name: id
        type: string
        description: Payment order ID.
        required: true
  - id: transactions.list
    method: GET
    description: List Modern Treasury transactions.
    parameters:
      - name: after_cursor
        type: string
        description: Pagination cursor returned by a previous Modern Treasury list
          request.
        default: null
      - name: per_page
        type: integer
        description: Maximum number of records to return.
        default: null
      - name: query_json
        type: string
        description: Optional JSON object of additional official query parameters
          to pass through unchanged.
        default: ''
    read_only: true
  - id: transactions.get
    method: GET
    description: Get a single Modern Treasury transaction.
    parameters:
      - name: id
        type: string
        description: Modern Treasury object ID.
        required: true
    read_only: true
  - id: returns.list
    method: GET
    description: List Modern Treasury returns.
    parameters:
      - name: after_cursor
        type: string
        description: Pagination cursor returned by a previous Modern Treasury list
          request.
        default: null
      - name: per_page
        type: integer
        description: Maximum number of records to return.
        default: null
      - name: query_json
        type: string
        description: Optional JSON object of additional official query parameters
          to pass through unchanged.
        default: ''
    read_only: true
  - id: incomingPaymentDetails.list
    method: GET
    description: List Modern Treasury incoming payment details.
    parameters:
      - name: after_cursor
        type: string
        description: Pagination cursor returned by a previous Modern Treasury list
          request.
        default: null
      - name: per_page
        type: integer
        description: Maximum number of records to return.
        default: null
      - name: query_json
        type: string
        description: Optional JSON object of additional official query parameters
          to pass through unchanged.
        default: ''
    read_only: true
  - id: incomingPaymentDetails.get
    method: GET
    description: Get a single Modern Treasury incoming payment detail.
    parameters:
      - name: id
        type: string
        description: Modern Treasury object ID.
        required: true
    read_only: true
  - id: balanceReports.list
    method: GET
    description: List Modern Treasury balance reports.
    parameters:
      - name: after_cursor
        type: string
        description: Pagination cursor returned by a previous Modern Treasury list
          request.
        default: null
      - name: per_page
        type: integer
        description: Maximum number of records to return.
        default: null
      - name: query_json
        type: string
        description: Optional JSON object of additional official query parameters
          to pass through unchanged.
        default: ''
    read_only: true
  - id: routingNumbers.validate
    method: GET
    description: Validate a routing number through Modern Treasury.
    parameters:
      - name: routing_number
        type: string
        description: Routing number to validate.
        required: true
      - name: routing_number_type
        type: string
        description: Routing number type such as aba.
        required: true
    read_only: true
