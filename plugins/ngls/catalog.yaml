name: ngls
operations:
  - id: connection.test
    method: POST
    description: Open an SFTP session to the configured NGLS endpoint.
  - id: remote.listFiles
    method: POST
    description: List files in any remote NGLS directory.
    parameters:
      - name: remote_dir
        type: string
        description: Remote directory to list
        default: ''
      - name: pattern
        type: string
        description: Optional filename glob pattern
        default: ''
      - name: recursive
        type: boolean
        description: List files recursively
        default: false
      - name: include_dirs
        type: boolean
        description: Include directories in the result set
        default: false
      - name: max_items
        type: integer
        description: Maximum number of entries to return
        default: 500
    read_only: true
  - id: remote.downloadFile
    method: POST
    description: Download a file from any remote NGLS path.
    parameters:
      - name: remote_path
        type: string
        description: Remote file path
        required: true
      - name: decode_text
        type: boolean
        description: Decode the file as text instead of returning base64
        default: false
      - name: encoding
        type: string
        description: Text encoding used when decode_text is true
        default: utf-8
    read_only: true
  - id: remote.uploadFile
    method: POST
    description: Upload a file to any remote NGLS path.
    parameters:
      - name: remote_path
        type: string
        description: Remote destination path
        required: true
      - name: content_text
        type: string
        description: Plain-text content to upload
        default: ''
      - name: content_base64
        type: string
        description: Base64-encoded file content to upload
        default: ''
      - name: ensure_parent_dirs
        type: boolean
        description: Create missing parent directories before upload
        default: false
      - name: overwrite
        type: boolean
        description: Allow replacing an existing remote file
        default: true
  - id: remote.moveFile
    method: POST
    description: Move or rename a file on the remote NGLS endpoint.
    parameters:
      - name: source_path
        type: string
        description: Existing remote path
        required: true
      - name: destination_path
        type: string
        description: New remote path
        required: true
      - name: ensure_parent_dirs
        type: boolean
        description: Create missing parent directories before moving the file
        default: false
      - name: overwrite
        type: boolean
        description: Allow replacing an existing remote file
        default: false
  - id: remote.deleteFile
    method: POST
    description: Delete a file from the remote NGLS endpoint.
    parameters:
      - name: remote_path
        type: string
        description: Remote file path to delete
        required: true
  - id: received.listFiles
    method: POST
    description: List files published by NGLS in the configured received_dir.
    parameters:
      - name: pattern
        type: string
        description: Optional filename glob pattern
        default: ''
      - name: recursive
        type: boolean
        description: List files recursively
        default: false
      - name: include_dirs
        type: boolean
        description: Include directories in the result set
        default: false
      - name: max_items
        type: integer
        description: Maximum number of entries to return
        default: 500
      - name: directory_override
        type: string
        description: Optional explicit remote directory to use instead of the configured
          connection parameter
        default: ''
    read_only: true
  - id: received.downloadFile
    method: POST
    description: Download a file from the configured received_dir.
    parameters:
      - name: file_name
        type: string
        description: File name or relative path inside the configured directory
        required: true
      - name: directory_override
        type: string
        description: Optional explicit remote directory to use instead of the configured
          connection parameter
        default: ''
      - name: decode_text
        type: boolean
        description: Decode the file as text instead of returning base64
        default: false
      - name: encoding
        type: string
        description: Text encoding used when decode_text is true
        default: utf-8
    read_only: true
  - id: inbound.uploadFile
    method: POST
    description: Upload a file to the configured inbound_dir used for outbound submissions
      to NGLS.
    parameters:
      - name: file_name
        type: string
        description: Destination file name or relative path inside the configured
          directory
        required: true
      - name: directory_override
        type: string
        description: Optional explicit remote directory to use instead of the configured
          connection parameter
        default: ''
      - name: content_text
        type: string
        description: Plain-text content to upload
        default: ''
      - name: content_base64
        type: string
        description: Base64-encoded file content to upload
        default: ''
      - name: ensure_parent_dirs
        type: boolean
        description: Create missing parent directories before upload
        default: false
      - name: overwrite
        type: boolean
        description: Allow replacing an existing remote file
        default: true
  - id: documents.uploadFile
    method: POST
    description: Upload a file to the configured insurance_documents_dir.
    parameters:
      - name: file_name
        type: string
        description: Destination file name or relative path inside the configured
          directory
        required: true
      - name: directory_override
        type: string
        description: Optional explicit remote directory to use instead of the configured
          connection parameter
        default: ''
      - name: content_text
        type: string
        description: Plain-text content to upload
        default: ''
      - name: content_base64
        type: string
        description: Base64-encoded file content to upload
        default: ''
      - name: ensure_parent_dirs
        type: boolean
        description: Create missing parent directories before upload
        default: false
      - name: overwrite
        type: boolean
        description: Allow replacing an existing remote file
        default: true
  - id: noticeResponses.uploadFile
    method: POST
    description: Upload a notice-response file to the configured notice_response_dir.
    parameters:
      - name: file_name
        type: string
        description: Destination file name or relative path inside the configured
          directory
        required: true
      - name: directory_override
        type: string
        description: Optional explicit remote directory to use instead of the configured
          connection parameter
        default: ''
      - name: content_text
        type: string
        description: Plain-text content to upload
        default: ''
      - name: content_base64
        type: string
        description: Base64-encoded file content to upload
        default: ''
      - name: ensure_parent_dirs
        type: boolean
        description: Create missing parent directories before upload
        default: false
      - name: overwrite
        type: boolean
        description: Allow replacing an existing remote file
        default: true
  - id: received.deleteFile
    method: POST
    description: Delete a processed file from the configured received_dir.
    parameters:
      - name: file_name
        type: string
        description: File name or relative path inside the configured directory
        required: true
      - name: directory_override
        type: string
        description: Optional explicit remote directory to use instead of the configured
          connection parameter
        default: ''
