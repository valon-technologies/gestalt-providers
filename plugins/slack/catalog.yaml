name: slack
operations:
- id: events.handle
  method: POST
  description: Handle Slack Events API callbacks and delegate supported user events
    to a Gestalt agent
  visible: false
- id: interactions.handle
  method: POST
  description: Handle Slack interaction callbacks and signal the matching workflow
    lane
  visible: false
- id: interactions.request
  method: POST
  description: Post a Slack message with signed button actions that signal the workflow
    lane
  parameters:
  - name: reply_ref
    type: string
    description: Opaque Slack event reply reference
    required: true
  - name: text
    type: string
    description: Slack message text shown above the actions
    required: true
  - name: actions
    type: array
    description: Button actions with id/action_id, label/text, optional value, and
      optional primary/danger style
    required: true
  - name: expires_in_seconds
    type: integer
    description: Seconds before embedded Slack interaction refs expire
    default: 86400.0
  visible: false
- id: events.reply
  method: POST
  description: Reply to the Slack event that started an agent turn; requires reply_ref
    and text
  parameters:
  - name: reply_ref
    type: string
    description: Opaque Slack event reply reference from the current Slack signal
    required: true
  - name: text
    type: string
    description: Required complete Slack message body to post in the event thread
    required: true
  visible: false
- id: events.setStatus
  method: POST
  description: Create or update a Slack status message in the event thread
  parameters:
  - name: reply_ref
    type: string
    description: Opaque Slack event reply reference
    required: true
  - name: text
    type: string
    description: Slack status message text
    required: true
  - name: status_ts
    type: string
    description: Existing status message timestamp to update
    default: ''
  - name: unfurl_links
    type: boolean
    description: Whether Slack should unfurl links for newly created statuses
    default: false
  - name: unfurl_media
    type: boolean
    description: Whether Slack should unfurl media for newly created statuses
    default: false
  visible: false
- id: events.deleteStatus
  method: POST
  description: Delete a Slack status message created for the event thread
  parameters:
  - name: reply_ref
    type: string
    description: Opaque Slack event reply reference
    required: true
  - name: status_ts
    type: string
    description: Status message timestamp to delete
    required: true
  visible: false
- id: events.addReaction
  method: POST
  description: Add an emoji reaction to the Slack event message
  parameters:
  - name: reply_ref
    type: string
    description: Opaque Slack event reply reference
    required: true
  - name: name
    type: string
    description: Emoji reaction name without colons
    required: true
  - name: target_ts
    type: string
    description: Message timestamp to react to; defaults to the source Slack event
    default: ''
  visible: false
- id: events.removeReaction
  method: POST
  description: Remove an emoji reaction from the Slack event message
  parameters:
  - name: reply_ref
    type: string
    description: Opaque Slack event reply reference
    required: true
  - name: name
    type: string
    description: Emoji reaction name without colons
    required: true
  - name: target_ts
    type: string
    description: Message timestamp to react to; defaults to the source Slack event
    default: ''
  visible: false
- id: events.setAssistantStatus
  method: POST
  description: Set Slack's native assistant loading/status indicator for the event
    thread
  parameters:
  - name: reply_ref
    type: string
    description: Opaque Slack event reply reference
    required: true
  - name: status
    type: string
    description: Native Slack assistant status text; pass an empty string to clear
    default: ''
  - name: loading_messages
    type: array
    description: Optional rotating native loading messages; Slack accepts up to 10
  - name: icon_emoji
    type: string
    description: Optional emoji to display for the assistant status
    default: ''
  - name: icon_url
    type: string
    description: Optional icon URL to display for the assistant status
    default: ''
  - name: username
    type: string
    description: Optional bot username to display for the assistant status
    default: ''
  visible: false
- id: events.clearAssistantStatus
  method: POST
  description: Clear Slack's native assistant loading/status indicator for the event
    thread
  parameters:
  - name: reply_ref
    type: string
    description: Opaque Slack event reply reference
    required: true
  visible: false
- id: events.setThreadTitle
  method: POST
  description: Set Slack's native assistant thread title for the event thread
  parameters:
  - name: reply_ref
    type: string
    description: Opaque Slack event reply reference
    required: true
  - name: title
    type: string
    description: Native Slack assistant thread title
    required: true
  visible: false
- id: events.setSuggestedPrompts
  method: POST
  description: Set Slack's native assistant suggested prompts for the event thread
  parameters:
  - name: reply_ref
    type: string
    description: Opaque Slack event reply reference
    required: true
  - name: prompts
    type: array
    description: Up to four Slack suggested prompts, each with title and message
    required: true
  - name: title
    type: string
    description: Optional title for the suggested prompt list
    default: ''
  visible: false
- id: events.startStream
  method: POST
  description: Start a native Slack streaming reply in the event thread
  parameters:
  - name: reply_ref
    type: string
    description: Opaque Slack event reply reference
    required: true
  - name: markdown_text
    type: string
    description: Initial markdown text for the streamed Slack reply
    default: ''
  - name: chunks
    type: array
    description: Optional Slack stream chunks for text, task updates, plans, or blocks
  - name: recipient_user_id
    type: string
    description: Optional Slack user receiving a streamed channel reply
    default: ''
  - name: recipient_team_id
    type: string
    description: Optional Slack team for the streamed reply recipient
    default: ''
  - name: task_display_mode
    type: string
    description: Optional Slack task display mode, timeline or plan
    default: ''
  - name: icon_emoji
    type: string
    description: Optional emoji to display for the streamed message
    default: ''
  - name: icon_url
    type: string
    description: Optional icon URL to display for the streamed message
    default: ''
  - name: username
    type: string
    description: Optional bot username to display for the streamed message
    default: ''
  visible: false
- id: events.appendStream
  method: POST
  description: Append markdown text or chunks to a native Slack streaming reply
  parameters:
  - name: reply_ref
    type: string
    description: Opaque Slack event reply reference
    required: true
  - name: stream_ts
    type: string
    description: Slack streaming message timestamp
    required: true
  - name: markdown_text
    type: string
    description: Markdown text to append to the Slack stream
    default: ''
  - name: chunks
    type: array
    description: Optional Slack stream chunks to append
  visible: false
- id: events.stopStream
  method: POST
  description: Finalize a native Slack streaming reply in the event thread
  parameters:
  - name: reply_ref
    type: string
    description: Opaque Slack event reply reference
    required: true
  - name: stream_ts
    type: string
    description: Slack streaming message timestamp
    required: true
  - name: markdown_text
    type: string
    description: Optional final markdown text for the Slack stream
    default: ''
  - name: chunks
    type: array
    description: Optional final Slack stream chunks
  - name: blocks
    type: array
    description: Optional Slack blocks rendered below the finalized stream
  - name: metadata
    type: object
    description: Optional Slack message metadata for the finalized stream
  visible: false
- id: conversations.getMessage
  method: POST
  description: Fetch a single message by Slack URL or channel and timestamp
  parameters:
  - name: url
    type: string
    description: Slack message URL
    default: ''
  - name: channel
    type: string
    description: Channel ID
    default: ''
  - name: ts
    type: string
    description: Message timestamp
    default: ''
- id: conversations.findUserMentions
  method: POST
  description: Find Slack user mentions in channel messages
  parameters:
  - name: channel
    type: string
    description: Channel ID to scan
    required: true
  - name: user_id
    type: string
    description: Optional user ID to filter mentions to
    default: ''
  - name: limit
    type: integer
    description: Number of messages to scan
    default: 100.0
  - name: oldest
    type: string
    description: Only include messages after this Unix timestamp
    default: ''
  - name: latest
    type: string
    description: Only include messages before this Unix timestamp
    default: ''
  - name: include_bots
    type: boolean
    description: Include bot messages in the scan
    default: false
- id: conversations.getThreadParticipants
  method: POST
  description: Get unique participants in a Slack thread
  parameters:
  - name: channel
    type: string
    description: Channel ID containing the thread
    required: true
  - name: ts
    type: string
    description: Parent message timestamp
    required: true
  - name: include_user_info
    type: boolean
    description: Fetch user profile details for participants
    default: false
  - name: include_bots
    type: boolean
    description: Include bot users in the participant list
    default: true
- id: conversations.getThreadContext
  method: POST
  description: Build rich Slack thread context with messages, participants, and files
  parameters:
  - name: channel
    type: string
    description: Channel ID containing the thread
    required: true
  - name: ts
    type: string
    description: Parent or root message timestamp
    required: true
  - name: cursor
    type: string
    description: Slack pagination cursor from a previous response
    default: ''
  - name: limit
    type: integer
    description: Maximum number of messages to return
    default: 15.0
  - name: include_user_info
    type: boolean
    description: Fetch user profile details for participants
    default: false
  - name: include_bots
    type: boolean
    description: Include bot messages and bot participants
    default: true
  - name: include_files
    type: boolean
    description: Include Slack file metadata attached to messages
    default: true
  - name: include_file_content
    type: boolean
    description: Download bounded text file contents
    default: false
  - name: include_image_data
    type: boolean
    description: Return image bytes as base64 when file content is requested
    default: false
  - name: max_file_bytes
    type: integer
    description: Maximum bytes to read from each Slack file
    default: 200000.0
- id: files.get
  method: POST
  description: Fetch Slack file metadata and bounded file or image content
  parameters:
  - name: file_id
    type: string
    description: Slack file ID to inspect
    default: ''
  - name: url_private
    type: string
    description: Slack private file URL to download
    default: ''
  - name: include_content
    type: boolean
    description: Download bounded file content
    default: true
  - name: max_bytes
    type: integer
    description: Maximum bytes to read from the Slack file
    default: 200000.0
