source: github.com/valon-technologies/gestalt-providers/plugins/vanta
version: 0.0.1-alpha.1
displayName: Vanta
description: Query and mutate security, compliance, audit, and vendor data via the Vanta REST API.
iconFile: assets/icon.svg
kind: plugin
spec:
  surfaces:
    openapi:
      document: https://developer.vanta.com/openapi/662bbd70a5a5d7007f0a6c64.yaml
  connections:
    default:
      mode: user
      auth:
        type: bearer
        credentials:
        - name: token
          label: Vanta API Token
          description: Create a bearer token in your Vanta account via the Developer Console.
  pagination:
    style: cursor
    cursorParam: pageCursor
    cursor:
      source: body
      path: results.pageInfo.endCursor
    limitParam: pageSize
    defaultLimit: 10
    resultsPath: results.data
