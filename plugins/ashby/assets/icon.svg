<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Ashby">
  <defs>
    <filter id="ashby-monochrome" color-interpolation-filters="sRGB">
      <feColorMatrix in="SourceGraphic" type="luminanceToAlpha" result="mask"/>
      <feComponentTransfer in="mask" result="threshold">
        <feFuncA type="discrete" tableValues="0 1"/>
      </feComponentTransfer>
      <feFlood flood-color="#000" result="ink"/>
      <feComposite in="ink" in2="threshold" operator="in"/>
    </filter>
  </defs>
  <image
    width="200"
    height="200"
    filter="url(#ashby-monochrome)"
    href="data:image/jpeg;base64,"/>
</svg>
