openapi: "3.2.0"
info:
  title: Ashby
  description: Candidates, applications, jobs, offers, interviews, departments, locations, users, and reports
servers:
  - url: https://api.ashbyhq.com
security:
  - api_key: []

paths:
  /candidate.list:
    post:
      operationId: candidate.list
      summary: List candidates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaginationParams"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"

  /candidate.info:
    post:
      operationId: candidate.info
      summary: Get a candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /candidate.search:
    post:
      operationId: candidate.search
      summary: Search candidates (max 100 results, no pagination)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                name:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /candidate.create:
    post:
      operationId: candidate.create
      summary: Create a candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateCreate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /candidate.update:
    post:
      operationId: candidate.update
      summary: Update a candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /candidate.createNote:
    post:
      operationId: candidate.createNote
      summary: Create a note on a candidate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CandidateNoteCreate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /application.list:
    post:
      operationId: application.list
      summary: List applications
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationListRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"

  /application.info:
    post:
      operationId: application.info
      summary: Get an application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /application.create:
    post:
      operationId: application.create
      summary: Create an application
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationCreate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /application.changeStage:
    post:
      operationId: application.changeStage
      summary: Change an application's interview stage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [applicationId, interviewStageId]
              properties:
                applicationId:
                  type: string
                interviewStageId:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /applicationFeedback.submit:
    post:
      operationId: applicationFeedback.submit
      summary: Submit application feedback
      description: Submit feedback for an application using an Ashby feedback form definition.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationFeedbackSubmitRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /job.list:
    post:
      operationId: job.list
      summary: List jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JobListRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"

  /job.info:
    post:
      operationId: job.info
      summary: Get a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /file.info:
    post:
      operationId: file.info
      summary: Retrieve a candidate file URL
      description: Retrieve the URL of a file associated with a candidate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileInfoRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /offer.list:
    post:
      operationId: offer.list
      summary: List offers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaginationParams"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"

  /offer.info:
    post:
      operationId: offer.info
      summary: Get an offer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /report.synchronous:
    post:
      operationId: report.synchronous
      summary: Run a saved report synchronously
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Response"

  /report.generate:
    post:
      operationId: report.generate
      summary: Start or poll an asynchronous report generation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
