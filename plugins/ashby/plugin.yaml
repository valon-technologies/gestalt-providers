source: github.com/valon-technologies/gestalt-providers/plugins/ashby
version: 0.0.1-alpha.2
display_name: Ashby
description: Candidates, applications, jobs, offers, interviews, departments, locations, users, and reports.
icon_file: assets/icon.svg
provider:
  pagination:
    style: cursor
    cursor_param: cursor
    cursor_path: nextCursor
    limit_param: limit
    default_limit: 100
    results_path: results
  allowed_operations:
    candidate.list: { paginate: true }
    candidate.info: {}
    candidate.search: {}
    candidate.create: {}
    candidate.update: {}
    candidate.createNote: {}
    application.list: { paginate: true }
    application.info: {}
    application.create: {}
    application.changeStage: {}
    job.list: { paginate: true }
    job.info: {}
    offer.list: { paginate: true }
    offer.info: {}
    report.synchronous: {}
    report.generate: {}
    interviewSchedule.list: { paginate: true }
    interview.info: {}
    interviewStage.info: {}
    department.info: {}
    department.list: { paginate: true }
    location.list: { paginate: true }
    user.list: { paginate: true }
  response_mapping:
    data_path: results
    pagination:
      has_more_path: moreDataAvailable
      cursor_path: nextCursor
  surfaces:
    openapi:
      document: openapi.yaml
