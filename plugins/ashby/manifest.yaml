source: github.com/valon-technologies/gestalt-providers/plugins/ashby
version: 0.0.1-alpha.8
displayName: Ashby
description: Candidates, applications, jobs, offers, interviews, departments, locations, users, and reports.
iconFile: assets/icon.svg
plugin:
  pagination:
    style: cursor
    cursorParam: cursor
    cursor:
      source: body
      path: nextCursor
    limitParam: limit
    default_limit: 100
    resultsPath: results
  allowedOperations:
    candidate.list: { paginate: true }
    candidate.info: {}
    candidate.search: {}
    candidate.create: {}
    candidate.update: {}
    candidate.createNote: {}
    application.list: { paginate: true }
    application.info: {}
    application.create: {}
    application.changeStage: {}
    job.list: { paginate: true }
    job.info: {}
    offer.list: { paginate: true }
    offer.info: {}
    report.synchronous: {}
    report.generate: {}
    interviewSchedule.list: { paginate: true }
    interview.info: {}
    interviewStage.info: {}
    department.info: {}
    department.list: { paginate: true }
    location.list: { paginate: true }
    user.list: { paginate: true }
  responseMapping:
    dataPath: results
    pagination:
      has_more:
        source: body
        path: moreDataAvailable
      cursor:
        source: body
        path: nextCursor
  openapi: openapi.yaml
