source: github.com/valon-technologies/gestalt-providers/plugins/carta
version: 0.0.1-alpha.1
displayName: Carta
description: Access Carta Launch, Investor, Issuer, Portfolio, corporation, compensation, open cap table, file upload, and user APIs.
iconFile: assets/icon.svg
kind: plugin
spec:
  surfaces:
    openapi:
      connection: default
      document: openapi.yaml
  connections:
    default:
      mode: user
      auth:
        type: oauth2
        authorizationUrl: https://login.app.carta.com/o/authorize/
        tokenUrl: https://login.app.carta.com/o/access_token/
        scopes:
        - read_compensation_benchmarks
        - read_corporation_info
        - read_draftissuers
        - read_investor_capitalizationtables
        - read_investor_cashbalances
        - read_investor_firms
        - read_investor_fundperformance
        - read_investor_funds
        - read_investor_investments
        - read_investor_partners
        - read_investor_securities
        - read_investor_stakeholdercapitalizationtable
        - read_issuer_capitalizationtablesummary
        - read_issuer_draftsecurities
        - read_issuer_info
        - read_issuer_interests
        - read_issuer_securities
        - read_issuer_securitiestemplates
        - read_issuer_shareclasses
        - read_issuer_stakeholdercapitalizationtable
        - read_issuer_stakeholders
        - read_issuer_valuations
        - read_opencaptables
        - read_portfolio_fundinvestmentdocuments
        - read_portfolio_info
        - read_portfolio_issuervaluations
        - read_portfolio_securities
        - read_portfolio_transactions
        - read_user_info
        - readwrite_draftissuers
        - readwrite_file_upload
        - readwrite_issuer_draftsecurities
        - readwrite_issuer_securities
        - readwrite_opencaptables
    identity:
      mode: identity
      auth:
        type: bearer
        credentials:
        - name: token
          label: OAuth Access Token
          description: Paste a Carta OAuth access token with the scopes needed for the Launch, Investor, Issuer, Portfolio, or related API Platform endpoints you plan to call.
