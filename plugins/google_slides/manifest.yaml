source: github.com/valon-technologies/gestalt-providers/plugins/google_slides
version: 0.0.1-alpha.7
displayName: Google Slides
description: Create and update Google Slides presentations.
iconFile: assets/icon.svg
plugin:
  configSchemaPath: schemas/config.schema.yaml
  connections:
    default:
      auth:
        type: oauth2
        authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
        tokenUrl: https://oauth2.googleapis.com/token
        scopes:
          - https://www.googleapis.com/auth/presentations
        authorizationParams:
          access_type: offline
          prompt: consent
  allowedOperations:
    slides.presentations.create:
      alias: presentations.create
    slides.presentations.get:
      alias: presentations.get
    slides.presentations.batchUpdate:
      alias: presentations.batchUpdate
    slides.presentations.pages.get:
      alias: pages.get
    slides.presentations.pages.getThumbnail:
      alias: pages.getThumbnail
  openapi: https://api.apis.guru/v2/specs/googleapis.com/slides/v1/openapi.json
