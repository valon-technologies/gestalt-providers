---
source: github.com/valon-technologies/gestalt-providers/plugins/linear
version: 0.0.1-alpha.1
displayName: Linear
description: Manage issues, projects, and teams.
iconFile: assets/icon.svg
kind: plugin
spec:
  surfaces:
    graphql:
      connection: OAuth
      url: https://api.linear.app/graphql
    mcp:
      connection: OAuth
      url: https://mcp.linear.app/mcp
  connections:
    OAuth:
      mode: user
      auth:
        type: oauth2
        authorizationUrl: https://linear.app/oauth/authorize
        tokenUrl: https://api.linear.app/oauth/token
        acceptHeader: application/json
        scopes:
        - read
        - write
  allowedOperations:
    issue:
      graphql:
        operationType: query
        arguments:
        - name: id
          type: String!
        selectionSet: |
          id
          identifier
          title
          url
          createdAt
          updatedAt
          description
          priority
          priorityLabel
          estimate
          state { id name type color }
          team { id name key displayName }
          assignee { id name displayName email url }
          creator { id name displayName email url }
          project { id name url slugId icon color }
    searchIssues:
      graphql:
        operationType: query
        arguments:
        - name: filter
          type: IssueFilter
          parameterType: object
        - name: before
          type: String
        - name: after
          type: String
        - name: first
          type: Int
        - name: last
          type: Int
        - name: includeArchived
          type: Boolean
        - name: orderBy
          type: PaginationOrderBy
        - name: term
          type: String!
        - name: includeComments
          type: Boolean
        - name: teamId
          type: String
        selectionSet: |
          nodes { id identifier title url createdAt updatedAt description priority priorityLabel estimate state { id name type color } team { id name key displayName } assignee { id name displayName email url } creator { id name displayName email url } project { id name url slugId icon color } }
          pageInfo { hasNextPage endCursor }
          totalCount
    issueLabels:
      graphql:
        operationType: query
        arguments:
        - name: filter
          type: IssueLabelFilter
          parameterType: object
        - name: before
          type: String
        - name: after
          type: String
        - name: first
          type: Int
        - name: last
          type: Int
        - name: includeArchived
          type: Boolean
        - name: orderBy
          type: PaginationOrderBy
        selectionSet: |
          nodes { id name description color isGroup team { id name key displayName } }
          pageInfo { hasNextPage endCursor }
    issues:
      graphql:
        operationType: query
        arguments:
        - name: filter
          type: IssueFilter
          parameterType: object
        - name: before
          type: String
        - name: after
          type: String
        - name: first
          type: Int
        - name: last
          type: Int
        - name: includeArchived
          type: Boolean
        - name: orderBy
          type: PaginationOrderBy
        - name: sort
          type: '[IssueSortInput!]'
        selectionSet: |
          nodes { id identifier title url createdAt updatedAt description priority priorityLabel estimate state { id name type color } team { id name key displayName } assignee { id name displayName email url } creator { id name displayName email url } project { id name url slugId icon color } }
