source: github.com/valon-technologies/gestalt-providers/plugins/google_sheets
version: 0.0.1-alpha.7
displayName: Google Sheets
description: Read and update Google Sheets spreadsheets and values.
iconFile: assets/icon.svg
plugin:
  configSchemaPath: schemas/config.schema.yaml
  connections:
    default:
      auth:
        type: oauth2
        authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
        tokenUrl: https://oauth2.googleapis.com/token
        scopes:
          - https://www.googleapis.com/auth/spreadsheets
        authorizationParams:
          access_type: offline
          prompt: consent
  allowedOperations:
    sheets.spreadsheets.create:
      alias: create
    sheets.spreadsheets.get:
      alias: get
    sheets.spreadsheets.values.get:
      alias: values.get
    sheets.spreadsheets.values.update:
      alias: values.update
    sheets.spreadsheets.values.append:
      alias: values.append
    sheets.spreadsheets.values.batchGet:
      alias: values.batchGet
    sheets.spreadsheets.values.batchUpdate:
      alias: values.batchUpdate
    sheets.spreadsheets.values.clear:
      alias: values.clear
    sheets.spreadsheets.batchUpdate:
      alias: batchUpdate
  openapi: https://api.apis.guru/v2/specs/googleapis.com/sheets/v4/openapi.json
