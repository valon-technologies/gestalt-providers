source: github.com/valon-technologies/gestalt-providers/plugins/pagerduty
version: 0.0.1-alpha.8
displayName: PagerDuty
description: Manage incidents, services, and on-call schedules.
iconFile: assets/icon.svg
plugin:
  configSchemaPath: schemas/config.schema.yaml
  surfaces:
    openapi:
      document: https://raw.githubusercontent.com/PagerDuty/api-schema/main/reference/REST/openapiv3.json
  connections:
    default:
      auth:
        type: oauth2
        authorizationUrl: https://identity.pagerduty.com/oauth/authorize
        tokenUrl: https://identity.pagerduty.com/oauth/token
        pkce: true
