source: github.com/valon-technologies/gestalt-providers/plugins/pagerduty
version: 0.0.1-alpha.2
display_name: PagerDuty
description: Manage incidents, services, and on-call schedules.
icon_file: assets/icon.svg
provider:
  config_schema_path: schemas/config.schema.yaml
  connections:
    default:
      auth:
        type: oauth2
        authorization_url: https://identity.pagerduty.com/oauth/authorize
        token_url: https://identity.pagerduty.com/oauth/token
        pkce: true
  surfaces:
    openapi:
      document: https://raw.githubusercontent.com/PagerDuty/api-schema/main/reference/REST/openapiv3.json
