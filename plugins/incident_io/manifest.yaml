source: github.com/valon-technologies/gestalt-providers/plugins/incident_io
version: 0.0.1-alpha.2
displayName: incident.io
description: Manage incidents, schedules, users, severities, and statuses.
iconFile: assets/icon.svg
kind: plugin
spec:
  surfaces:
    openapi:
      connection: default
      document: https://api.incident.io/v1/openapiV3.json
  allowedOperations:
    Incidents V2#List:
      alias: Incidents.List
    Incidents V2#Show:
      alias: Incidents.Show
    Users V2#List:
      alias: Users.List
    Users V2#Show:
      alias: Users.Show
    Schedules V2#List:
      alias: Schedules.List
    Schedules V2#ListScheduleEntries:
      alias: Schedules.ListScheduleEntries
    Severities V1#List:
      alias: Severities.List
    Incident Statuses V1#List:
      alias: IncidentStatuses.List
    Incidents V2#Create:
      alias: Incidents.Create
    Incidents V2#Edit:
      alias: Incidents.Edit
  connections:
    default:
      mode: user
      auth:
        type: manual
        credentials:
        - name: token
          label: API Key
          description: "Create one in [Settings \u2192 API Keys](https://app.incident.io/settings/api-keys)"
