source: github.com/valon-technologies/gestalt-providers/plugins/gmail
version: 0.0.1-alpha.1
displayName: Gmail
description: Read, send, and manage Gmail messages, threads, drafts, and labels.
iconFile: assets/icon.svg
kind: plugin
spec:
  mcp: true
  configSchemaPath: schemas/config.schema.yaml
  managedParameters:
  - in: path
    name: userId
    value: me
  surfaces:
    openapi:
      document: https://api.apis.guru/v2/specs/googleapis.com/gmail/v1/openapi.json
  allowedOperations:
    gmail.users.messages.list:
      alias: messages.list
    gmail.users.messages.get:
      alias: messages.get
    gmail.users.messages.send:
      alias: messages.sendRaw
    gmail.users.messages.trash:
      alias: messages.trash
    gmail.users.messages.modify:
      alias: messages.modify
    gmail.users.drafts.list:
      alias: drafts.list
    gmail.users.drafts.get:
      alias: drafts.get
    gmail.users.drafts.create:
      alias: drafts.create
    gmail.users.drafts.update:
      alias: drafts.update
    gmail.users.drafts.send:
      alias: drafts.send
    gmail.users.drafts.delete:
      alias: drafts.delete
    gmail.users.labels.list:
      alias: labels.list
    gmail.users.labels.patch:
      alias: labels.patch
    gmail.users.threads.get:
      alias: threads.get
    gmail.users.getProfile:
      alias: getProfile
  connections:
    default:
      auth:
        type: oauth2
        authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
        tokenUrl: https://oauth2.googleapis.com/token
        scopes:
        - https://www.googleapis.com/auth/gmail.modify
        - https://www.googleapis.com/auth/gmail.compose
        authorizationParams:
          access_type: offline
          prompt: consent
