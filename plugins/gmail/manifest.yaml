source: github.com/valon-technologies/gestalt-providers/plugins/gmail
version: 0.0.1-alpha.9
displayName: Gmail
description: Read, send, and manage Gmail messages, threads, drafts, and labels.
iconFile: assets/icon.svg
plugin:
  configSchemaPath: schemas/config.schema.yaml
  connections:
    default:
      auth:
        type: oauth2
        authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
        tokenUrl: https://oauth2.googleapis.com/token
        scopes:
          - https://www.googleapis.com/auth/gmail.modify
          - https://www.googleapis.com/auth/gmail.compose
        authorizationParams:
          access_type: offline
          prompt: consent
  managedParameters:
    - in: path
      name: userId
      value: me
  allowedOperations:
    gmail.users.messages.list:
      alias: messages.list
    gmail.users.messages.get:
      alias: messages.get
    gmail.users.messages.trash:
      alias: messages.trash
    gmail.users.messages.modify:
      alias: messages.modify
    gmail.users.labels.list:
      alias: labels.list
    gmail.users.labels.patch:
      alias: labels.patch
    gmail.users.threads.get:
      alias: threads.get
    gmail.users.getProfile:
      alias: getProfile
  surfaces:
    openapi:
      document: https://api.apis.guru/v2/specs/googleapis.com/gmail/v1/openapi.json
