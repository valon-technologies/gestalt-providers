source: github.com/valon-technologies/gestalt-providers/plugins/hex
version: 0.0.1-alpha.1
displayName: Hex
description: Manage Hex projects, runs, and cells.
iconFile: assets/icon.svg
kind: plugin
spec:
  surfaces:
    openapi:
      connection: default
      document: https://static.hex.site/openapi.json
  connections:
    default:
      auth:
        type: manual
        credentials:
        - name: token
          label: API Token
          description: Create a Personal access token in your Hex workspace settings.
