source: github.com/valon-technologies/gestalt-providers/plugins/hex
version: 0.0.1-alpha.10
displayName: Hex
description: Manage Hex projects, runs, and cells.
iconFile: assets/icon.svg
kind: plugin
spec:
  surfaces:
    openapi:
      connection: default
      document: https://static.hex.site/openapi.json
  connections:
    default:
      auth:
        type: manual
        credentials:
        - name: token
          label: API Token
          description: See [API keys](https://app.hex.tech/25b0db0a-31a0-48eb-b68d-067ca98241ba/settings/api-keys) to create a Personal access token
