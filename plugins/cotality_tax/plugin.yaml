source: github.com/valon-technologies/gestalt-providers/plugins/cotality_tax
version: 0.0.1-alpha.1
display_name: Cotality Tax
description: Exchange tax, escrow, onboarding, and return files with Cotality (CoreLogic) over SFTP.
icon_file: assets/icon.svg
provider:
  connections:
    default:
      auth:
        type: manual
        credentials:
          - name: host
            label: SFTP Host
            description: Remote SFTP hostname.
          - name: username
            label: Username
            description: Username for the remote SFTP endpoint.
          - name: password
            label: Password
            description: Password for the remote SFTP endpoint.
      params:
        port:
          description: Optional SSH port. Defaults to 22.
        host_key:
          description: Optional expected remote host key in the format "ssh-rsa AAAA...".
        path_prefix:
          description: Optional remote path prefix prepended to relative paths.
        inbound_dir:
          description: Directory used for files uploaded from your platform to Cotality.
        outbound_dir:
          description: Directory where Cotality publishes return files.
        archive_dir:
          description: Optional archive directory for processed files.
