source: github.com/valon-technologies/gestalt-providers/plugins/gcs
version: 0.0.1-alpha.1
displayName: Google Cloud Storage
description: Google Cloud Storage object management
kind: plugin
spec:
  surfaces:
    rest:
      connection: default
      baseUrl: https://storage.googleapis.com
      operations:
      - name: objects.list
        description: List objects in a Google Cloud Storage bucket
        method: GET
        path: /storage/v1/b/{bucket}/o
        parameters:
        - name: bucket
          type: string
          in: path
          required: true
        - name: prefix
          type: string
          in: query
        - name: delimiter
          type: string
          in: query
        - name: maxResults
          type: int
          in: query
        - name: pageToken
          type: string
          in: query
      - name: objects.get
        description: Get object metadata from a Google Cloud Storage bucket
        method: GET
        path: /storage/v1/b/{bucket}/o/{object}
        parameters:
        - name: bucket
          type: string
          in: path
          required: true
        - name: object
          type: string
          in: path
          required: true
      - name: objects.delete
        description: Delete an object from a Google Cloud Storage bucket
        method: DELETE
        path: /storage/v1/b/{bucket}/o/{object}
        parameters:
        - name: bucket
          type: string
          in: path
          required: true
        - name: object
          type: string
          in: path
          required: true
      - name: objects.download
        description: Download object media from a Google Cloud Storage bucket
        method: GET
        path: /storage/v1/b/{bucket}/o/{object}
        parameters:
        - name: bucket
          type: string
          in: path
          required: true
        - name: object
          type: string
          in: path
          required: true
        - name: alt
          type: string
          in: query
          required: true
  connections:
    default:
      auth:
        type: oauth2
        authorizationUrl: https://accounts.google.com/o/oauth2/v2/auth
        tokenUrl: https://oauth2.googleapis.com/token
        scopes:
        - https://www.googleapis.com/auth/devstorage.read_write
        authorizationParams:
          access_type: offline
          prompt: consent
