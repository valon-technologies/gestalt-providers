  connections:
    default:
      mode: user
      auth:
        type: manual
        tokenUrl: https://{host}/api/4.0/login
        tokenExchange: form
        acceptHeader: application/json
        tokenPrefix: "token "
        credentials:
        - name: client_id
          label: Client ID
          description: >-
            Looker API client ID for a user with API access enabled.
        - name: client_secret
          label: Client Secret
          description: >-
            Looker API client secret for the same user.
      params:
        host:
          required: true
          description: >-
            Looker API host for your instance, without the scheme
            (for example, `company.cloud.looker.com` or `looker.example.com`).
