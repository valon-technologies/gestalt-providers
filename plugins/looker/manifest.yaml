source: github.com/valon-technologies/gestalt-providers/plugins/looker
version: 0.0.1-alpha.2
displayName: Looker
description: Run queries, manage dashboards, looks, folders, users, groups, schedules, projects, content validation, and instance configuration in Looker.
iconFile: assets/icon.svg
kind: plugin
spec:
  connections:
    default:
      mode: user
      auth:
        type: manual
        credentials:
        - name: client_id
          label: Client ID
          description: >-
            Looker API client ID for the user or service account. Create API
            credentials in Looker Admin, then connect with the client ID and
            client secret; the plugin exchanges them for short-lived API tokens.
        - name: client_secret
          label: Client Secret
          description: >-
            Looker API client secret for the same API credential. The plugin
            sends this to `POST /api/4.0/login` in the request body and uses the
            returned access token for API calls.
      params:
        host:
          required: true
          description: >-
            Looker API host for your instance, without the scheme
            (for example, `company.cloud.looker.com`).
