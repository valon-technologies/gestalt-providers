    name: Intercom-Version
    value: '2.11'
  - in: header
    name: Accept
    value: application/json
  surfaces:
    openapi:
      connection: default
      document: https://raw.githubusercontent.com/intercom/Intercom-OpenAPI/main/descriptions/2.15/api.intercom.io.yaml
  allowedOperations:
    ArchiveContact: {}
