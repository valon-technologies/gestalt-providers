source: github.com/valon-technologies/gestalt-providers/workflow/temporal
version: 0.0.1-alpha.1
displayName: Temporal Workflow
description: Temporal Cloud-backed workflow provider with durable workflow state and schedules.
kind: workflow
build:
  command:
    - sh
    - -c
    - |
      if [ -n "${RELEASE_PLATFORM:-}" ] && [ -z "${GOOS:-}" ]; then
        export GOOS="${RELEASE_PLATFORM%%/*}"
        export GOARCH="${RELEASE_PLATFORM#*/}"
      fi
      mkdir -p .gestalt/build
      go build -trimpath -o .gestalt/build/provider ./cmd/provider
entrypoint:
  artifactPath: .gestalt/build/provider
spec: {}
