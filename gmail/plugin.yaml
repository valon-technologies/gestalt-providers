source: github.com/valon-technologies/gestalt-plugins/gmail
version: 0.0.1-alpha.4
display_name: Gmail
description: Read, send, and manage Gmail messages, threads, drafts, and labels.
icon_file: assets/icon.svg
provider:
  config_schema_path: schemas/config.schema.yaml
  connections:
    default:
      auth:
        type: oauth2
        authorization_url: https://accounts.google.com/o/oauth2/v2/auth
        token_url: https://oauth2.googleapis.com/token
        scopes:
          - https://www.googleapis.com/auth/gmail.modify
          - https://www.googleapis.com/auth/gmail.compose
        authorization_params:
          access_type: offline
          prompt: consent
  managed_parameters:
    - in: path
      name: userId
      value: me
  allowed_operations:
    gmail.users.messages.list:
      alias: messages.list
    gmail.users.messages.get:
      alias: messages.get
    gmail.users.messages.trash:
      alias: messages.trash
    gmail.users.messages.modify:
      alias: messages.modify
    gmail.users.labels.list:
      alias: labels.list
    gmail.users.labels.patch:
      alias: labels.patch
    gmail.users.threads.get:
      alias: threads.get
    gmail.users.getProfile:
      alias: getProfile
  surfaces:
    openapi:
      document: https://api.apis.guru/v2/specs/googleapis.com/gmail/v1/openapi.json
